<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府採購 考古題全解手冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F2EC; --paper-2:#EDEAE1; --ink:#1C2620; --ink-soft:#3A443D;
  --seal:#B0392E; --seal-deep:#8E2C23; --forest:#1E3A30; --forest-soft:#2C5347;
  --correct:#1F7A52; --correct-bg:#E7F2EA; --muted:#787268; --line:#DAD6CC;
  --line-soft:#E6E2D8; --shadow:0 1px 2px rgba(28,38,32,.06),0 6px 20px rgba(28,38,32,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.75;-webkit-font-smoothing:antialiased;padding-bottom:80px;}
.wrap{max-width:880px;margin:0 auto;padding:0 22px;}
header.hero{border-bottom:2px solid var(--ink);padding:46px 0 30px;}
.kicker{font-family:"Noto Serif TC",serif;letter-spacing:.34em;font-size:12px;color:var(--seal);
  font-weight:600;display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.kicker::before{content:"";width:30px;height:2px;background:var(--seal);display:inline-block;}
h1.title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(30px,6vw,46px);
  line-height:1.12;letter-spacing:.01em;color:var(--ink);}
h1.title .accent{color:var(--seal);}
.lede{margin-top:16px;font-size:15.5px;color:var(--ink-soft);max-width:62ch;}
.lede b{color:var(--seal-deep);font-weight:700;}
.stat-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}
.stat{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 15px;
  display:flex;align-items:baseline;gap:8px;box-shadow:var(--shadow);}
.stat .n{font-family:"Noto Serif TC",serif;font-weight:700;font-size:20px;color:var(--forest);}
.stat .l{font-size:12.5px;color:var(--muted);}
.toolbar{position:sticky;top:0;z-index:40;background:rgba(244,242,236,.93);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.toolbar-inner{max-width:880px;margin:0 auto;padding:11px 22px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
.progress-tag{font-size:13px;color:var(--ink-soft);font-weight:500;display:flex;align-items:center;gap:8px;margin-right:auto;}
.progress-bar{width:90px;height:6px;border-radius:6px;background:var(--line);overflow:hidden;}
.progress-fill{height:100%;width:0;background:var(--correct);transition:width .35s ease;}
.btn{font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--line);
  background:#fff;color:var(--ink);padding:7px 13px;border-radius:8px;transition:all .15s ease;
  display:inline-flex;align-items:center;gap:6px;}
.btn:hover{border-color:var(--forest-soft);color:var(--forest);}
.btn.active{background:var(--forest);color:#fff;border-color:var(--forest);}
.btn .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.btn.active .dot{background:#fff;}
nav.chips{padding:22px 0 4px;}
.chips-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-size:13px;text-decoration:none;color:var(--ink-soft);border:1px solid var(--line);
  background:#fff;border-radius:30px;padding:6px 14px;transition:all .15s ease;font-weight:500;}
.chip:hover{background:var(--forest);color:#fff;border-color:var(--forest);}
.chip b{color:var(--seal);font-weight:700;margin-left:4px;}
.chip:hover b{color:#fff;}
.chapter{padding-top:40px;scroll-margin-top:70px;}
.chapter-head{display:flex;align-items:flex-end;gap:14px;border-bottom:2px solid var(--forest);
  padding-bottom:10px;margin-bottom:6px;}
.chapter-num{font-family:"Noto Serif TC",serif;font-weight:900;font-size:34px;color:var(--paper);
  background:var(--forest);width:52px;height:52px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;line-height:1;}
.chapter-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:23px;color:var(--forest);}
.chapter-meta{font-size:13px;color:var(--muted);margin-bottom:3px;}
.group{margin-top:30px;scroll-margin-top:70px;}
.group-label{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.group-label h3{font-family:"Noto Serif TC",serif;font-weight:600;font-size:18px;color:var(--ink);}
.law-tag{font-size:12px;font-weight:700;color:var(--forest-soft);border:1px solid var(--forest-soft);
  border-radius:6px;padding:2px 9px;background:rgba(44,83,71,.06);white-space:nowrap;}
.memo{background:#fff;border:1px solid var(--line);border-left:4px solid var(--seal);border-radius:8px;
  padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);}
.memo-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:13.5px;color:var(--seal-deep);
  letter-spacing:.16em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.memo-title::before{content:"\270E";font-size:15px;}
.memo ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
.memo li{position:relative;padding-left:18px;font-size:14.5px;color:var(--ink-soft);}
.memo li::before{content:"\25AA";color:var(--seal);position:absolute;left:2px;top:0;}
.memo li b{color:var(--seal-deep);font-weight:700;}
.memo p{font-size:14px;color:var(--ink-soft);}
.memo .keynum{font-family:"Noto Serif TC",serif;font-weight:700;color:var(--forest);
  background:var(--correct-bg);border-radius:5px;padding:0 6px;}
.memo table{border-collapse:collapse;width:100%;margin-top:6px;font-size:13.5px;}
.memo th,.memo td{border:1px solid var(--line);padding:6px 9px;text-align:center;}
.memo th{background:var(--forest);color:#fff;font-weight:500;}
.memo td:first-child{text-align:left;color:var(--ink-soft);background:var(--paper-2);font-weight:500;}
.memo td b{color:var(--seal-deep);}
.q{background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:13px;overflow:hidden;
  box-shadow:var(--shadow);transition:border-color .2s ease,opacity .2s ease;scroll-margin-top:72px;}
.q.mastered{opacity:.62;border-color:var(--correct);}
.q-top{display:flex;align-items:flex-start;gap:12px;padding:15px 16px 12px;}
.q-badge{font-family:"Noto Serif TC",serif;font-weight:700;font-size:13px;color:#fff;background:var(--seal);
  border-radius:7px;padding:4px 9px;flex-shrink:0;line-height:1.3;text-align:center;min-width:54px;}
.q-badge small{display:block;font-size:9.5px;font-weight:500;opacity:.85;letter-spacing:.05em;}
.q-stem{font-size:15px;font-weight:500;color:var(--ink);flex:1;padding-top:1px;}
.q-mark{flex-shrink:0;cursor:pointer;border:1px solid var(--line);background:var(--paper);width:30px;height:30px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .15s ease;}
.q-mark:hover{border-color:var(--correct);color:var(--correct);}
.q.mastered .q-mark{background:var(--correct);color:#fff;border-color:var(--correct);}
.q-options{list-style:none;padding:0 16px 4px 16px;display:flex;flex-direction:column;gap:6px;}
.opt{display:flex;gap:9px;align-items:flex-start;padding:8px 11px;border-radius:7px;font-size:14px;
  color:var(--ink);border:1px solid var(--correct);background:var(--correct-bg);font-weight:500;}
.opt.wrong{border-color:transparent;background:var(--paper);color:var(--ink-soft);font-weight:400;}
.opt .onum{font-weight:700;font-family:"Noto Serif TC",serif;color:var(--correct);flex-shrink:0;}
.opt.wrong .onum{color:var(--muted);}
.opt.correct::after{content:"\2713 \6B63\89E3";margin-left:auto;color:var(--correct);font-weight:700;
  font-size:12.5px;flex-shrink:0;align-self:center;white-space:nowrap;}
.q-foot{padding:0 16px 16px;}
.explain{background:var(--paper-2);border-radius:8px;padding:13px 15px;margin-top:6px;border-left:3px solid var(--forest-soft);}
.explain .e-title{font-weight:700;font-size:12.5px;color:var(--forest);letter-spacing:.1em;margin-bottom:6px;font-family:"Noto Serif TC",serif;}
.explain p{font-size:14px;color:var(--ink-soft);}
.explain .ans-hl{color:var(--correct);font-weight:700;}
.trap{margin-top:9px;font-size:13.5px;color:var(--seal-deep);background:rgba(176,57,46,.06);
  border:1px dashed rgba(176,57,46,.4);border-radius:7px;padding:9px 12px;}
.trap b{font-family:"Noto Serif TC",serif;letter-spacing:.08em;}
.mem{margin-top:9px;font-size:13.5px;color:var(--forest);display:flex;gap:7px;align-items:baseline;}
.mem b{font-family:"Noto Serif TC",serif;letter-spacing:.08em;color:var(--forest-soft);flex-shrink:0;}
.reveal-zone{display:none;padding:0 16px 16px;}
.show-answer-btn{width:100%;border:1px dashed var(--line);background:var(--paper);color:var(--muted);
  font-family:inherit;font-size:13px;cursor:pointer;padding:10px;border-radius:8px;transition:all .15s ease;}
.show-answer-btn:hover{border-color:var(--forest-soft);color:var(--forest);}
body.selftest .q:not(.reveal) .opt{background:var(--paper);border-color:transparent;color:var(--ink-soft);font-weight:400;}
body.selftest .q:not(.reveal) .opt .onum{color:var(--muted);}
body.selftest .q:not(.reveal) .opt.correct::after{content:none;}
body.selftest .q:not(.reveal) .q-foot{display:none;}
body.selftest .q:not(.reveal) .reveal-zone{display:block;}
footer{margin-top:54px;border-top:2px solid var(--ink);padding-top:22px;font-size:13px;color:var(--muted);text-align:center;line-height:1.9;}
footer .seal-mark{font-family:"Noto Serif TC",serif;color:var(--seal);font-weight:700;border:2px solid var(--seal);
  border-radius:8px;display:inline-block;padding:4px 12px;letter-spacing:.2em;margin-bottom:10px;transform:rotate(-3deg);}
@media(max-width:560px){
  .chapter-num{width:44px;height:44px;font-size:27px;}
  .chapter-title{font-size:19px;}
  .q-stem{font-size:14.5px;}
  .opt.correct::after{display:none;}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;scroll-behavior:auto!important;}}
:focus-visible{outline:2.5px solid var(--seal);outline-offset:2px;border-radius:4px;}
</style>
</head>
<body>
<header class="hero">
  <div class="wrap">
    <div class="kicker">政府採購法 · 考古題全解</div>
    <h1 class="title">考古題<span class="accent">全解手冊</span></h1>
    <p class="lede">本手冊收錄四科考古題<b>全部題目</b>：電子採購實務、最有利標及評選優勝廠商、工程及技術服務採購、財物及勞務採購。每題附正解、為什麼、陷阱與口訣，並依<b>法條／主題</b>分組整理，可開「自測模式」遮答自我檢測。</p>
    <div class="stat-row">
      <div class="stat"><span class="n" id="statTotal">—</span><span class="l">總題數</span></div>
      <div class="stat"><span class="n">4</span><span class="l">大章節（四科）</span></div>
      <div class="stat"><span class="n">22・56</span><span class="l">高頻核心法條</span></div>
    </div>
  </div>
</header>
<div class="toolbar">
  <div class="toolbar-inner">
    <span class="progress-tag">已掌握 <span id="pcount">0</span>/<span id="ptotal">0</span>
      <span class="progress-bar"><span class="progress-fill" id="pfill"></span></span>
    </span>
    <button class="btn" id="selftestBtn"><span class="dot"></span>自測模式</button>
    <button class="btn" id="resetBtn">重設進度</button>
  </div>
</div>
<nav class="chips wrap"><div class="chips-row" id="chipsRow"></div></nav>
<main class="wrap" id="content"></main>
<footer class="wrap">
  <div class="seal-mark">考古・必勝</div>
  <div>本手冊依四科考古題全數整理，依法條／主題分組。考前以正解、陷阱與口訣為主，搭配自測模式反覆練習。</div>
</footer>
<script>
const DATA = [{"id": "ch1", "num": "壹", "chapter": "電子採購實務", "meta": "全 58 題 · 資訊公開／電子領投標／採購卡／共同供應契約", "groups": [{"topic": "資訊公開管道與刊登採購公報", "law": "第27・61・102條", "memo": "<ul>\n              <li>三種公開層級記法：<b>「公報 1 日＋網站」＝最嚴<\/b>（決標／無法決標、拒絕往來）；<b>「公開於網站，必要時得刊公報」＝較鬆<\/b>（未達公告金額決標、34 條但書、變賣出租、無償讓與等）；<b>「應公開於網站」<\/b>（49 條公開取得報價／企劃書）。<\/li>\n              <li>政府採購資訊刊登採購公報，一律 <span class=\"keynum\">1 日<\/span>。<\/li>\n              <li>委託專業服務之「公開評選」採購 → <b>應刊登政府採購公報<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 1, "law": "第102條", "stem": "採購法第102條第3項規定之廠商名稱與相關情形（拒絕往來廠商），下列何者正確？", "opts": ["應刊登採購公報1日，並公開於主管機關之政府採購資訊網站", "應公開於採購網站，必要時並得刊登採購公報", "得公開於採購網站，必要時並得刊登採購公報", "報上級機關決定公告方式"], "a": 0, "ex": "拒絕往來廠商屬重大事項，採最嚴格公開層級：<span class=\"ans-hl\">刊登採購公報1日，並公開於政府採購資訊網站<\/span>。", "mem": "拒絕往來＝公報1日＋網站（最嚴）。"}, {"n": 49, "law": "第61條", "stem": "下列政府採購資訊何者應刊登採購公報1日，並公開於主管機關之政府採購資訊網站：", "opts": ["採購法第49條公開取得廠商書面報價或企劃書之公告", "採購法第61條規定之決標結果或無法決標之公告", "採購法第100條第2項多餘不用堪用財物之無償讓與公告", "採購法第34條第1項但書規定之公開說明或公開徵求廠商提供參考資料之公告"], "a": 1, "ex": "決標結果與無法決標公告（61條）屬「公報1日＋網站」層級；<span class=\"ans-hl\">(2)為正解<\/span>。(1)、(4)屬「公開於網站，必要時刊公報」，(3)亦屬較鬆層級。", "trap": "與下一題對照：49條報價／企劃書是「應公開於網站」、61條決標是「公報1日＋網站」，層級不同。"}, {"n": 50, "law": "第49條", "stem": "下列何者資訊應公開於採購網站：", "opts": ["財物之變賣或出租公告", "與政府採購有關之法令", "採購法第49條公開取得廠商書面報價或企劃書公告", "採購申訴審議委員會之審議判斷"], "a": 2, "ex": "49條公開取得書面報價或企劃書 → <span class=\"ans-hl\">應公開於採購網站<\/span>。其餘多屬「得公開於網站，必要時刊公報」。", "mem": "49條取得報價／企劃書＝公開於網站。"}, {"n": 26, "law": "第27條", "stem": "下列那些資訊應公開於採購網站，必要時並得刊登採購公報？", "opts": ["未達公告金額採購之決標公告資訊", "與政府採購有關之法令、司法裁判、訴願決定、仲裁判斷或宣導資訊", "財物之變賣或出租公告", "多餘不用堪用財物之無償讓與公告"], "a": 3, "ex": "「公開於網站，必要時刊公報」這層級包含多餘不用堪用財物之<span class=\"ans-hl\">無償讓與公告<\/span>。其餘三者屬「應公開於網站」之較單純資訊。", "trap": "四個都跟「網站」有關，差別在『必要時並得刊公報』這層保留——無償讓與屬之。"}, {"n": 45, "law": "第34條", "stem": "下列資訊何者應公開於採購網站，必要時得刊登採購公報？", "opts": ["未達公告金額採購之決標公告資訊", "採購法第34條第1項但書之公開說明或公開徵求廠商提供參考資料之公告", "採購法第22條第1項第14款之公開審查之公告", "財物之變賣或出租公告"], "a": 1, "ex": "34條但書之公開說明或徵求參考資料 → <span class=\"ans-hl\">公開於網站，必要時刊公報<\/span>。", "mem": "34條但書／徵求參考資料＝網站＋（必要時）公報。"}, {"n": 43, "law": "第61條", "stem": "未達公告金額採購之決標公告：", "opts": ["應刊登採購公報1日，並公開於主管機關之政府採購資訊網站", "應公開於採購網站，必要時並得刊登採購公報", "得公開於採購網站，必要時並得刊登採購公報", "報上級機關決定公告方式"], "a": 2, "ex": "未達公告金額之決標公告層級最鬆：<span class=\"ans-hl\">得公開於網站，必要時並得刊公報<\/span>。", "trap": "用字是「得」公開，不是「應」；公告金額以上決標才是「應刊公報1日＋網站」。"}, {"n": 30, "law": "第27條", "stem": "機關辦理採購招標時，下列何者應於政府採購公報上刊登公告?", "opts": ["委託專業服務之公開評選採購", "集中交易市場採購財物", "屬專利權利之採購", "財物之變賣"], "a": 0, "ex": "委託專業服務之<span class=\"ans-hl\">公開評選<\/span>屬正式招標，應刊登政府採購公報。其餘多為限制性招標或得免公告之情形。", "mem": "公開評選＝要上公報。"}, {"n": 39, "law": "細則", "stem": "政府採購資訊應刊登採購公報幾日：", "opts": ["5日", "3日", "2日", "1日"], "a": 3, "ex": "政府採購資訊刊登採購公報一律 <span class=\"ans-hl\">1 日<\/span>。", "mem": "刊公報＝1日。"}]}, {"topic": "決標與無法決標公告", "law": "第48・49・61條", "memo": "<ul>\n              <li>無法決標公告：廢標後、重行招標前刊登，<b>不得逾廢標後 <span class=\"keynum\">14 天<\/span><\/b>。<\/li>\n              <li><b>開標前取消採購 → 刊「無法決標公告」<\/b>（不是更正、不是決標公告）。<\/li>\n              <li>單價決標的「決標金額」＝<b>單價 × 預估數量<\/b>。<\/li>\n              <li>複數決標：每一次決標、不同標的或底價之項目，<b>應分別刊登決標公告<\/b>。<\/li>\n              <li>決標公告得標廠商欄位<b>不含「負責人姓名」<\/b>（含名稱、地址、電話）。<\/li>\n            <\/ul>", "qs": [{"n": 6, "law": "第61條", "stem": "依政府採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標前刊登，並不得超過廢標後多少天：", "opts": ["30天", "21天", "14天", "7天"], "a": 2, "ex": "無法決標公告須於廢標後、重行招標前刊登，<span class=\"ans-hl\">不得逾廢標後14天<\/span>。", "mem": "無法決標公告＝廢標後14天內。"}, {"n": 9, "law": "第61條", "stem": "下列敘述何者錯誤?", "opts": ["機關採未經公告之限制性招標辦理議價，如議價不成無須刊登無法決標公告", "機關採限制性招標公開評選辦理專業服務，第1次公告結果只有1家廠商投標，應不予開標並刊登無法決標公告", "機關採公開招標，第1次公告結果只有1家廠商投標，應刊登無法決標公告", "機關依採購法第48條第1項第1款不予開標決標，應刊登無法決標公告"], "a": 1, "ex": "公開評選屬限制性招標，<span class=\"ans-hl\">1家即可開標<\/span>，不應不予開標，(2)錯誤。(1)未經公告之限制性招標確實免刊無法決標公告；(3)公開招標僅1家應刊無法決標公告；(4)正確。", "trap": "公開招標『1家』要廢標、刊無法決標公告；但公開評選『1家』可照常開標——別把兩者混為一談。"}, {"n": 24, "law": "第61條", "stem": "刊登決標公告時，得標廠商之應刊登項目不包括以下何者資料：", "opts": ["名稱", "地址", "聯絡電話", "負責人姓名"], "a": 3, "ex": "決標公告刊得標廠商之名稱、地址、電話即可，<span class=\"ans-hl\">不含負責人姓名<\/span>。", "mem": "得標公告：名稱、地址、電話（不揭負責人）。"}, {"n": 25, "law": "第61條", "stem": "機關如欲在開標日前取消採購，須刊登以下那一個公告：", "opts": ["更正公告", "決標公告", "定期彙送", "無法決標公告"], "a": 3, "ex": "開標前取消採購，視同無法決標，應刊登<span class=\"ans-hl\">無法決標公告<\/span>。", "trap": "不是『更正公告』，更正是改內容；取消整案要登無法決標公告。"}, {"n": 27, "law": "第61條", "stem": "機關辦理決標結果公告，以單價決標者，其決標金額為：", "opts": ["單價", "單價乘以預估數量之總金額", "底價金額", "預算金額"], "a": 1, "ex": "單價決標時，決標金額以<span class=\"ans-hl\">單價乘以預估數量之總金額<\/span>表示。", "mem": "單價決標金額＝單價×預估數量。"}, {"n": 41, "law": "第52條", "stem": "採用複數決標之方式者，其每一次決標及不同標的或底價之項目：", "opts": ["應分別刊登決標公告", "於最後一次決標時再刊登決標公告", "於第1次決標時刊登決標公告即可", "得合併刊登決標公告"], "a": 0, "ex": "複數決標每次決標、不同標的或底價之項目均須<span class=\"ans-hl\">分別刊登決標公告<\/span>，以利透明。", "mem": "複數決標＝逐次／逐項分別登。"}]}, {"topic": "招標公告應載事項與預算金額公開", "law": "第27・34條", "memo": "<ul>\n              <li>招標公告<b>不登「底價金額」<\/b>（底價應保密）；不必載「契約付款條件」。<\/li>\n              <li>採購金額在公告金額<b>十分之一以下<\/b>者，<b>無須<\/b>傳輸至政府採購資訊網站。<\/li>\n              <li>須在公告／文件「公開預算金額」的典型情形：訂有<b>特定資格（相當財力／實績等）<\/b>、認定標準第5條第3項之採購。<\/li>\n            <\/ul>", "qs": [{"n": 28, "law": "第27條", "stem": "以下何者非辦理招標公告應登載之項目：", "opts": ["底價金額", "履約期限", "投標截止期限", "投標地點"], "a": 0, "ex": "底價應保密，<span class=\"ans-hl\">不得於招標公告登載<\/span>。其餘履約期限、投標截止期限、投標地點均應登載。", "mem": "招標公告不登底價（底價要保密）。"}, {"n": 29, "law": "第27條", "stem": "機關依採購法第27條第1項辦理招標公告無須刊登：", "opts": ["招標文件領取地點", "廠商資格條件摘要", "是否屬公共工程實施技師簽證者", "契約付款條件"], "a": 3, "ex": "招標公告載招標重點即可，<span class=\"ans-hl\">契約付款條件<\/span>屬契約細節，無須於公告刊登。", "trap": "付款條件在契約裡，不在招標公告必載欄位。"}, {"n": 12, "law": "第27條", "stem": "下列事項何者無須傳輸至主管機關之政府採購資訊網站？", "opts": ["公告金額十分之一以下之採購", "未得標廠商名單", "得標廠商預估分包予中小企業之金額", "如有契約變更或加減價之情形，致原決標金額增加達公告金額者"], "a": 0, "ex": "金額在公告金額<span class=\"ans-hl\">十分之一以下<\/span>者，免傳輸至資訊網站。其餘三者皆須傳輸。", "mem": "≤公告金額1/10＝免傳網站。"}, {"n": 14, "law": "認定標準第5條", "stem": "機關依投標廠商資格與特殊或巨額採購認定標準第5條第3項規定辦理者：", "opts": ["應於招標公告或招標文件公開預算金額", "免公開預算金額", "得於招標公告或招標文件公開預算金額", "應於招標公告公開採購金額"], "a": 0, "ex": "訂特定資格者，為使廠商衡量，<span class=\"ans-hl\">應於招標公告或文件公開預算金額<\/span>。", "mem": "訂特定資格＝應公開預算金額。"}, {"n": 46, "law": "認定標準", "stem": "下列何者應於招標公告或招標文件公開預算金額？", "opts": ["公告金額以上採購", "查核金額以上採購", "巨額金額以上採購", "特殊採購規定廠商具有相當財力"], "a": 3, "ex": "訂有「相當財力」等<span class=\"ans-hl\">特定資格<\/span>者，應公開預算金額供廠商評估，(4)為正解。單純依金額級距並非公開預算金額之要件。", "trap": "關鍵不是金額大小，而是『有沒有訂特定資格』。"}]}, {"topic": "電子領標、電子投標與電子簽約", "law": "第93條之1", "memo": "<ul>\n              <li>允許電子領標 → 須於<b>「招標公告及招標文件」<\/b>同時規定。<\/li>\n              <li>電子投標後改書面簽約，內容不同時<b>以電子投標文件為準<\/b>。<\/li>\n              <li>電子投標文件<b>可以含掃描文件<\/b>；檔案格式只要<b>不限制競爭<\/b>即可（不限定自由軟體）。<\/li>\n              <li>電子開標、決標<b>「得免公開」<\/b>為之，得不通知廠商到場（非「應公開」）。<\/li>\n              <li>電子領標縮短等標期 3 日，但<b>縮短後不得少於 <span class=\"keynum\">5 日<\/span><\/b>。<\/li>\n              <li>電子投標文件須於<b>「投標截止期限前」<\/b>傳輸完成。<\/li>\n            <\/ul>", "qs": [{"n": 2, "law": "第93條之1", "stem": "電子招標文件檔案：", "opts": ["不可以壓縮", "可以壓縮", "除圖檔可以壓縮外，其餘不可壓縮", "除圖檔不可壓縮外，其餘可以壓縮"], "a": 1, "ex": "電子招標文件<span class=\"ans-hl\">可以壓縮<\/span>以利傳輸。", "mem": "電子招標文件＝可壓縮。"}, {"n": 5, "law": "第93條之1", "stem": "機關允許廠商以電子化方式辦理領標者，應於招標公告及招標文件中規定，並於招標文件中規定，廠商得以下列方式之一投標：", "opts": ["書面投標", "電子投標", "書面投標或電子投標", "以上皆是"], "a": 3, "ex": "電子領標後，投標方式可為書面或電子，故<span class=\"ans-hl\">以上皆是<\/span>。領標電子化不等於強制電子投標。", "mem": "電子領標≠強制電子投標。"}, {"n": 15, "law": "第93條之1", "stem": "機關允許廠商以電子方式領標者應於以下何者中訂明：", "opts": ["招標公告或招標文件", "招標公告", "招標文件", "招標公告及招標文件"], "a": 3, "ex": "須於<span class=\"ans-hl\">招標公告及招標文件<\/span>兩者同時訂明，廠商才能確知並準備。", "trap": "是『公告＋文件』兩者都要，不是『或』。"}, {"n": 16, "law": "第93條之1", "stem": "機關允許廠商以電子投標，決標後以書面文件辦理簽約，簽約內容應以何者為準 ?", "opts": ["書面文件", "電子投標文件", "由機關視情況決定", "由上級機關定之"], "a": 1, "ex": "投標當下提出的是電子投標文件，簽約內容如有出入，<span class=\"ans-hl\">以電子投標文件為準<\/span>。", "mem": "有出入＝以投標時電子文件為準。"}, {"n": 17, "law": "第93條之1", "stem": "機關辦理採購，其與廠商間作為，下列4項作業(A)通知(B)重新報價(C)協商(D)說明。那些得以電子資料傳輸方式辦理：", "opts": ["AB", "ABC", "ABD", "ABCD"], "a": 3, "ex": "通知、重新報價、協商、說明<span class=\"ans-hl\">皆得以電子資料傳輸<\/span>辦理。", "mem": "通知／報價／協商／說明＝全可電子。"}, {"n": 20, "law": "第93條之1", "stem": "機關允許廠商以電子投標者辦理開標及決標下列何者為誤？", "opts": ["得免公開為之", "得由監辦單位採書面審核監辦", "得不通知廠商到場", "電子投標文件不得含有掃描文件"], "a": 3, "ex": "電子投標文件<span class=\"ans-hl\">可以含掃描文件<\/span>，(4)為誤。電子開標決標得免公開、得書面監辦、得不通知到場均正確。", "trap": "掃描文件是允許的；(4)用『不得』就錯。"}, {"n": 21, "law": "第93條之1", "stem": "廠商電子投標者，應於何時將所有電子投標文件傳輸至主管機關指定之資訊系統：", "opts": ["開標前", "投標截止期限前", "決標前", "審標前"], "a": 1, "ex": "電子投標文件須在<span class=\"ans-hl\">投標截止期限前<\/span>傳輸完成，逾時即無效。", "mem": "電子投標＝截止前傳完。"}, {"n": 38, "law": "第93條之1", "stem": "機關及廠商以電子化方式辦理採購，依規定應簽名或蓋章者：", "opts": ["應以數位簽章為之", "得以數位簽章為之", "存成磁片並在其上加蓋關防", "以政府採購卡為之"], "a": 0, "ex": "電子化作業中，凡應簽名或蓋章者，<span class=\"ans-hl\">應以數位簽章為之<\/span>（強制，非選擇）。", "trap": "是『應』以數位簽章，不是『得』。"}, {"n": 48, "law": "第93條之1", "stem": "下列何者錯誤？", "opts": ["機關允許廠商電子投標，於招標文件中規定，決標後於期限內以書面文件辦理簽約者，書面文件內容應與電子投標文件相同，其不同者，以後者為準", "機關允許廠商電子投標者，得辦理電子開標及電子決標。其開標得免公開為之", "機關辦理採購，除我國締結之條約或協定另有規定者外，依採購法第93條之1規定辦理電子領標並於招標公告敘明者，其等標期得縮短3日。但縮短後均不得少於7日", "機關提供電子招標文件，得向廠商收取必要之成本費用，其金額由招標機關定之。其另有書面文件者，不得高於書面文件發售費用"], "a": 2, "ex": "電子領標可縮短等標期3日，但縮短後<span class=\"ans-hl\">不得少於5日<\/span>，(3)寫「7日」錯誤。其餘(1)(2)(4)均正確。", "mem": "電子領標縮3日，地板5日（非7日）。"}, {"n": 51, "law": "第93條之1", "stem": "機關辦理電子採購，下列何者錯誤：", "opts": ["機關利用主管機關指定之資訊系統辦理招標文件之公開發給、發售或公開閱覽，得免另備書面文件", "機關允許廠商電子投標者，得於招標文件中規定，以電子投標文件簽約，或決標後於期限內以書面文件辦理簽約", "機關允許廠商電子投標者，得辦理電子開標及電子決標", "電子開標及電子決標應公開為之，但得不通知投標廠商到場。其監辦方式得由監辦單位採書面審核監辦"], "a": 3, "ex": "電子開標、決標是<span class=\"ans-hl\">「得免公開」<\/span>為之，(4)寫「應公開」錯誤。其餘正確。", "trap": "與第20題同一觀念：電子開標決標『得免公開』，不是『應公開』。"}, {"n": 52, "law": "第93條之1", "stem": "機關得於招標文件中規定廠商電子投標使用之檔案格式，或廠商列印電子招標文件投標之格式，其檔案格式或列印格式為：", "opts": ["任一型態及格式", "須為自由軟體", "不應限制廠商之競爭", "不得壓縮"], "a": 2, "ex": "規定檔案／列印格式的底線是<span class=\"ans-hl\">不應限制廠商之競爭<\/span>，不可指定特定軟體。", "mem": "格式規定＝不得限制競爭。"}]}, {"topic": "電子招標文件之提供與收費", "law": "第93條之1", "memo": "<ul>\n              <li>電子招標文件得收<b>必要成本費用，金額由「招標機關」定<\/b>。<\/li>\n              <li>另有書面文件者，其費用<b>不得高於書面文件發售費用<\/b>。<\/li>\n              <li>利用指定資訊系統公開發給、發售、公開閱覽 → <b>得免另備書面文件<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 18, "law": "第93條之1", "stem": "機關提供電子招標文件，得向廠商收取必要之成本費用，其金額由招標機關定之。其另有書面文件者：", "opts": ["應高於書面文件發售費用", "不得收取費用", "應少於新臺幣1,000元", "不得高於書面文件發售費用"], "a": 3, "ex": "電子文件費用<span class=\"ans-hl\">不得高於書面文件發售費用<\/span>，以鼓勵電子化。", "mem": "電子費≤書面費。"}, {"n": 19, "law": "第93條之1", "stem": "機關提供電子招標文件，得向廠商收取必要之成本費用，其金額由下列何者定之？", "opts": ["主管機關", "上級機關", "資訊系統經營廠商", "招標機關"], "a": 3, "ex": "成本費用金額由<span class=\"ans-hl\">招標機關<\/span>自行核定。", "mem": "電子文件費由招標機關訂。"}, {"n": 37, "law": "第93條之1", "stem": "機關利用主管機關指定之資訊系統辦理，下列4項作業(A)招標文件之公開發給得免另備書面文件(B)招標文件之公開閱覽得免另備書面文件(C)招標文件之公開發給、發售應另備書面文件(D)招標文件之公開閱覽應另備書面文件，那些是正確？", "opts": ["AB", "AC", "BC", "CD"], "a": 0, "ex": "用指定系統辦理公開發給與公開閱覽，<span class=\"ans-hl\">均得免另備書面文件<\/span>，故AB正確。", "trap": "C、D用『應另備』就錯，重點是『得免』。"}]}, {"topic": "電子憑證、IC卡與系統操作", "law": "第93條之1・操作", "memo": "<ul>\n              <li><b>「檢驗上傳標案」＝領取本機關自己上傳的招標文件<\/b>（模擬廠商領標、確認文件無誤），免用 IC 卡／數位簽章。<\/li>\n              <li>參考<b>其他機關<\/b>的招標文件 → 用「<b>歷史招標文件查詢<\/b>」。<\/li>\n              <li>檢查電子招標上傳是否成功，須提供<b>電子憑據檔（.tkn）<\/b>。<\/li>\n              <li>暫存區資料<b>不會自動公告<\/b>，須「上傳至正式區」。<\/li>\n              <li>誤填欄位的更正：以「<b>更正招標公告<\/b>」於<b>截止投標前<\/b>處理。<\/li>\n              <li>系統暫停服務時，<b>確知無電子投標即可逕行開標<\/b>，不必等系統恢復。<\/li>\n            <\/ul>", "qs": [{"n": 7, "law": "第93條之1", "stem": "有關電子憑據的描述下列何者有誤？", "opts": ["具有數位簽章", "領標電子憑據可以用來確認廠商是否繳費電子領標", "廠商投標未附領標電子憑據，機關仍得決標予該廠商", "廠商於等標期內以領標之電子憑據，可以再次免費下載同一案同次公告之招標文件"], "a": 2, "ex": "(1)(2)(4)均為電子憑據之正確功能（具數位簽章、可查繳費領標、等標期內免費再下載），故有誤者為<span class=\"ans-hl\">(3)<\/span>。本題屬細部爭點，依官方答案記正解為(3)即可。", "trap": "靠刪去法：其他三項都是課本上的正確敘述，剩(3)。"}, {"n": 35, "law": "第93條之1", "stem": "下列那些作業無須使用憑證IC卡及讀卡機等設備？", "opts": ["共同供應契約之電子下訂", "廠商電子領標", "機關設定押標金收款帳戶", "機關傳輸招標文件"], "a": 1, "ex": "<span class=\"ans-hl\">廠商電子領標<\/span>只是下載文件，無須 IC 卡；其餘涉及簽章或金流，須用憑證 IC 卡。", "mem": "電子領標＝免IC卡。"}, {"n": 55, "law": "第93條之1", "stem": "下列何者無須使用憑證IC卡進行數位簽章或加密？", "opts": ["電子訂購", "電子開標", "電子支付", "檢驗上傳標案"], "a": 3, "ex": "<span class=\"ans-hl\">檢驗上傳標案<\/span>只是機關領回自己上傳的文件做檢查，免簽章加密。", "mem": "檢驗上傳＝免簽章。"}, {"n": 40, "law": "第93條之1", "stem": "機關欲檢查其電子招標上傳之標案是否成功，招標機關必須於檢查過程中提供下列那一種檔案，方可進行檢查作業：", "opts": ["招標上傳之電子憑據檔(.tkn)", "招標上傳之結構檔(.str)", "招標上傳之索引檔(.idx)", "安全性憑證檔"], "a": 0, "ex": "須提供上傳時產生的<span class=\"ans-hl\">電子憑據檔（.tkn）<\/span>才能檢查上傳是否成功。", "mem": "檢查上傳＝.tkn。"}, {"n": 53, "law": "第93條之1", "stem": "機關登錄完成公告及領標文件傳輸，可利用政府採購資訊網站那一功能來免費模擬廠商領標的使用？以確保招標文件正確無誤。", "opts": ["領標憑據序號", "檢驗上傳標案", "電子領標", "領標家數查詢"], "a": 1, "ex": "<span class=\"ans-hl\">檢驗上傳標案<\/span>可免費模擬廠商領標、檢視文件是否正確。", "mem": "模擬領標自我檢查＝檢驗上傳標案。"}, {"n": 44, "law": "操作", "stem": "檢驗上傳標案功能為何？", "opts": ["可以查詢其他機關歷史招標文件", "只能查詢本機關歷史招標文件", "領取本機關上傳之招標文件", "領取其他機關上傳之招標文件"], "a": 2, "ex": "檢驗上傳標案＝<span class=\"ans-hl\">領取本機關自己上傳之招標文件<\/span>做檢查。", "trap": "是『本機關自己的』文件，不是查別人的。"}, {"n": 32, "law": "操作", "stem": "機關若須參考其他機關之招標文件電子檔案時，可利用下列那一系統功能？", "opts": ["領標家數查詢", "檢驗上傳標案", "歷史招標文件查詢", "查詢招標公告"], "a": 2, "ex": "要參考<span class=\"ans-hl\">其他機關<\/span>的招標文件，用「歷史招標文件查詢」。", "trap": "參考『別人』用歷史招標文件查詢；檢查『自己』上傳用檢驗上傳標案。"}, {"n": 8, "law": "第93條之1", "stem": "機關辦理電子採購，主管機關指定之資訊系統全部或部分功能，因故暫停服務時，下列處理方式何者有誤？", "opts": ["招標及詢價階段：機關待系統恢復後再行傳輸電子招標文件", "領標階段：廠商以招標文件規定之其他方式領標", "領標階段：待系統恢復後再行電子領標", "開標階段：確知無廠商電子投標時，仍必須待系統恢復後再行開標"], "a": 3, "ex": "確知無電子投標時，開標不受系統影響，<span class=\"ans-hl\">可逕行開標<\/span>，(4)用「仍必須待系統恢復」錯誤。", "mem": "無電子投標＝照常開標，不必等系統。"}, {"n": 13, "law": "操作", "stem": "下列有關機關端「招標管理」相關功能之敘述何者為錯？", "opts": ["點選「上傳至正式區」按鈕後，暫存區清單即無該筆資料", "暫存區資料，於公告日就會自動公告", "「查詢招標公告」功能可查詢已「上傳至正式區」但尚未公告之資料", "「查詢招標公告」功能可查詢已公告之資料"], "a": 1, "ex": "暫存區資料<span class=\"ans-hl\">不會自動公告<\/span>，須先「上傳至正式區」才會公告，(2)錯誤。", "trap": "放在暫存區不會自己公告——一定要按上傳正式區。"}, {"n": 54, "law": "操作", "stem": "電子招標文件若有異動，且刊登公告，則應於機關端那一功能之更正作業，進行抽換：", "opts": ["新增招標公告", "更正招標公告", "領標管理", "檢驗上傳標案"], "a": 1, "ex": "文件異動且須刊公告者，於<span class=\"ans-hl\">更正招標公告<\/span>功能進行抽換。", "mem": "異動抽換＝更正招標公告。"}, {"n": 33, "law": "操作", "stem": "機關傳輸招標公告後，誤點選「是否為共同供應契約採購」(應為否，而點選為是)，可於以下何時點刊登更正招標公告？", "opts": ["截止投標後", "截止投標前", "開標後", "決標後"], "a": 1, "ex": "更正須於<span class=\"ans-hl\">截止投標前<\/span>為之，使廠商有時間因應。", "mem": "更正公告＝截止投標前。"}, {"n": 34, "law": "操作", "stem": "機關傳輸招標公告後，誤點選「公共工程實施技師簽證範圍」(應為否，而點選為是)，可於以下何時點刊登更正招標公告？", "opts": ["截止投標前", "截止投標後", "開標後", "決標後"], "a": 0, "ex": "同前題，欄位誤填之更正一律在<span class=\"ans-hl\">截止投標前<\/span>處理。", "trap": "凡『更正招標公告』都是截止投標前——兩題答案一致。"}]}, {"topic": "公告傳輸時程（生效時點）", "law": "操作", "memo": "<ul>\n              <li>當日要送公報刊登者，欄位修改／上傳正式區須在當天 <b>下午 5:30 前<\/b> 完成。<\/li>\n              <li>「不刊公報」之公告，於上班日傳輸後，廠商端通常<b>次一上班日<\/b>可查詢。<\/li>\n            <\/ul>", "qs": [{"n": 3, "law": "操作", "stem": "17日及18日皆為上班日，若機關於17日上午10時上傳招標公告並選擇刊登政府採購公報，於下午發現其公告招標案件誤填標的分類，請問機關應於何時完成欄位修改並上傳至正式區，才能於18日刊登？", "opts": ["隨時都可以", "17日下午5時30分前", "17日下午11時59分前", "18日上午8時前"], "a": 1, "ex": "要趕隔日公報，修改並上傳正式區須在<span class=\"ans-hl\">17日下午5時30分前<\/span>完成。", "mem": "趕明日公報＝今天17:30前上傳。"}, {"n": 11, "law": "操作", "stem": "於政府電子採購網新增公開取得報價單與企劃書公告，選擇不刊登政府採購公報，於星期一上班日下午17時35分傳輸，該公告於廠商端何時可以查詢：", "opts": ["次二上班日", "次一上班日", "當日20時以後", "當日18時以後"], "a": 1, "ex": "不刊公報之公告於上班日傳輸後，廠商端<span class=\"ans-hl\">次一上班日<\/span>可查詢。", "mem": "不刊公報＝次一上班日可查。"}]}, {"topic": "政府採購卡與共同供應契約", "law": "第93條", "memo": "<ul>\n              <li>採購卡使用權限由<b>機關首長或其授權人<\/b>決定；卡片由<b>信用卡業務機構<\/b>發給。<\/li>\n              <li>採購卡用法：信用卡／轉帳卡／儲值卡皆可，<b>不可預借現金<\/b>。<\/li>\n              <li>共同供應契約須<b>公開於指定資訊網站<\/b>供各機關利用；採購流程：<b>商品查詢→請購（購物車）→下訂→訂單管理（ABCD）<\/b>。<\/li>\n              <li>單筆訂購金額達<b>查核金額<\/b>以上，<b>不得<\/b>透過共契請購下訂。<\/li>\n              <li>非屬契約項目的「相關配備」附加採購：合計須在<b>公告金額十分之一以下<\/b>才能用共契功能；逾此即不可。<\/li>\n              <li>線上繳納押標金：<b>各式招標方式皆適用<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 4, "law": "第93條之1", "stem": "以下就「線上繳納押標金」服務，對於招標方式之適用情形說明，何者正確？", "opts": ["僅適用於「公開取得電子報價單」採購機制", "不適用於公告金額以上之案件", "不適用於經公開評選或公開徵求之限制性招標", "各式招標方式皆適用"], "a": 3, "ex": "線上繳納押標金<span class=\"ans-hl\">各式招標方式皆適用<\/span>，無金額或招標方式限制。", "mem": "線上繳押標金＝全部招標方式都行。"}, {"n": 10, "law": "第93條", "stem": "下列敘述何者正確？", "opts": ["現行主管機關發行之政府採購公報為紙本及電子化併行", "機關得於招標文件規定採電子投標之廠商，其押標金得予減收50％", "共同供應契約應公開於主管機關指定之資訊網站，供各機關利用", "政府採購卡之持卡人資格經取消者，其政府採購卡即失效"], "a": 2, "ex": "共同供應契約<span class=\"ans-hl\">應公開於指定資訊網站供各機關利用<\/span>，(3)正確。公報已全面電子化、電子投標押標金無減收50%之規定。", "trap": "電子投標『押標金減收50%』是常見陷阱，並無此規定。"}, {"n": 31, "law": "第93條", "stem": "機關利用政府電子採購網進行共同供應契約商品採購，下列4項作業A商品查詢B請購管理（購物車）C下訂管理D訂單管理，如從上網查詢商品至採購驗收排列，依序應為：", "opts": ["ABCD", "ACDB", "CABD", "DABC"], "a": 0, "ex": "流程為查詢→請購→下訂→訂單管理，即<span class=\"ans-hl\">ABCD<\/span>。", "mem": "共契：查→購→訂→管（ABCD）。"}, {"n": 36, "law": "第93條", "stem": "機關利用政府電子採購網進行共同供應契約商品採購，利用電子支付方式辦理付款作業時下列何項敘述為非？", "opts": ["政府網路採購卡係由發卡機構先行墊付款項", "機關利用政府網路採購卡進行電子支付作業，除可降低各單位零用金儲備靈活庫款調度外，會計從每件共同供應契約採購案需對不同廠商開立付款憑單辦理付款，變成每月只需1次付款給發卡銀行即可", "政府網路採購卡是1張虛擬卡，並限用於政府電子採購網之共同供應契約功能", "利用政府網路採購卡辦理電子支付作業時，只需輸入卡號及使用者帳號密碼即可"], "a": 3, "ex": "電子支付涉及金流安全，<span class=\"ans-hl\">不只輸入卡號與帳密<\/span>即可，尚須其他安全驗證機制，(4)為非。", "trap": "『只需卡號＋帳密』把安全機制講得太簡單，就是錯的那項。"}, {"n": 42, "law": "第93條", "stem": "機關利用政府電子採購網進行共同供應契約商品採購，下列敘述何者為非？", "opts": ["利用共同供應契約之契約項目辦理採購，適用機關不須辦理決標公告或定期彙送", "共同供應契約之採購訂約機關仍應辦理決標公告或定期彙送", "機關採購與產品相關之配備，若非屬共同供應契約項目，且其採購金額合計為公告金額十分之一以下，機關得逕洽廠商利用政府電子採購網之共同供應契約功能進行電子訂購", "機關採購與產品相關之配備，若非屬共同供應契約項目，且其採購金額合計逾公告金額十分之一而未達公告金額，機關除逕洽廠商利用政府電子採購網之共同供應契約功能進行電子訂購，並應依政府採購法第62條規定辦理決標資訊定期彙送"], "a": 3, "ex": "附加配備採購逾公告金額十分之一者，<span class=\"ans-hl\">已不得用共契功能逕洽訂購<\/span>，須另依採購法辦理，(4)為非。", "mem": "配備附加＝1/10以下才行，逾此不可。"}, {"n": 47, "law": "第93條", "stem": "單筆訂購金額達多少以上時，機關不得透過共同供應契約執行請購及下訂？", "opts": ["公告金額", "查核金額", "巨額", "任何金額皆不限"], "a": 1, "ex": "單筆達<span class=\"ans-hl\">查核金額<\/span>以上，不得透過共契請購下訂，應另循採購程序。", "mem": "共契下訂上限＝查核金額。"}, {"n": 22, "law": "第93條", "stem": "下列何者可決定政府採購卡之使用權限：", "opts": ["會計主管", "採購單位主管", "機關首長或其授權人", "辦理採購業務人員"], "a": 2, "ex": "採購卡使用權限由<span class=\"ans-hl\">機關首長或其授權人<\/span>決定。", "mem": "採購卡權限＝首長（或授權人）。"}, {"n": 23, "law": "第93條", "stem": "政府採購卡由下列那個單位發給：", "opts": ["各招標機關", "政府採購法主管機關", "國家發展委員會", "信用卡業務機構"], "a": 3, "ex": "採購卡屬信用卡性質，由<span class=\"ans-hl\">信用卡業務機構<\/span>發給。", "mem": "採購卡發卡＝信用卡業務機構。"}, {"n": 56, "law": "第93條", "stem": "下列何者不是政府採購卡的使用方式：", "opts": ["預借現金卡", "轉帳卡", "信用卡", "儲值卡"], "a": 0, "ex": "採購卡可作轉帳、信用、儲值用，但<span class=\"ans-hl\">不可預借現金<\/span>。", "mem": "採購卡不能預借現金。"}]}, {"topic": "統包決標方式與電子報價憑證", "law": "第36・93條之1", "memo": "<ul>\n              <li>標的為工程／財物類之<b>統包<\/b>案，決標方式可選<b>評分及格最低標(B)或最有利標(C)＝BC<\/b>。<\/li>\n              <li>電子報價可用之憑證：<b>工商憑證、組織及團體憑證、負責人或受權自然人之自然人憑證<\/b>；<b>信用卡不能<\/b>作為簽章憑證。<\/li>\n            <\/ul>", "qs": [{"n": 57, "law": "第36條", "stem": "各式招標公告如登載標的分類為工程類或財物類，採統包方式之採購案，其決標方式可選取何者？(A)最低標。(B)評分及格最低標。(C)最有利標。(D)最高標。", "opts": ["C", "BC", "ABC", "ABCD"], "a": 1, "ex": "統包重視設計與品質，決標方式可採<span class=\"ans-hl\">評分及格最低標或最有利標（BC）<\/span>，不宜用純最低標。", "mem": "統包決標＝BC（及格最低標／最有利標）。"}, {"n": 58, "law": "第93條之1", "stem": "機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採購，廠商電子報價時，不可使用下列何種憑證進行數位簽章及加密？", "opts": ["廠商本身名義之工商憑證", "廠商本身名義之組織及團體憑證", "投標廠商負責人或取得授權足以代表投標廠商之自然人憑證", "投標廠商負責人之信用卡"], "a": 3, "ex": "信用卡並非數位簽章憑證，<span class=\"ans-hl\">不可<\/span>用於電子報價之簽章加密。其餘三種憑證皆可。", "mem": "報價簽章用『憑證』，信用卡不行。"}]}]}, {"id": "ch2", "num": "貳", "chapter": "最有利標及評選優勝廠商", "meta": "全 67 題 · 評選委員會／協商措施／評選方法／評選優勝", "groups": [{"topic": "評選委員會之組成、資格與成立時點", "law": "組織準則・第94條", "memo": "<ul>\n              <li>委員<b>5 人以上<\/b>（<b>不限奇數<\/b>）；專家學者<b>不得少於 1/3<\/b>，且<b>不得為政府機關現職人員<\/b>。<\/li>\n              <li>召集人：由<b>機關首長<\/b>擔任，或由首長／授權人員指定<b>一級主管以上人員<\/b>；副召集人才是「指定機關內部人員」。召集人<b>非由委員互選<\/b>。<\/li>\n              <li>委員與受評廠商<b>1 年內<\/b>有僱傭等關係者，<b>不計入委員總額，評分不予採計<\/b>。<\/li>\n              <li>成立時點：有前例或條件簡單者，於<b>招標前或招標後開標前<\/b>成立（不是「開標後評選前」）。<\/li>\n            <\/ul>", "qs": [{"n": 1, "law": "組織準則", "stem": "下列有關最有利標決標規定之敘述何者正確？", "opts": ["採購評選委員會得要求廠商修正所提送企劃書後再辦理評選", "採購評選委員評選不得給予不同廠商相同分數", "公立學校家長會會長如擔任採購評選委員，非屬政府機關之現職人員者，得以專家學者身分擔任評選委員", "以上皆非"], "a": 2, "ex": "家長會會長非政府機關現職人員，<span class=\"ans-hl\">得以專家學者身分擔任委員<\/span>，(3)正確。委員會不得要求廠商修正企劃書再評選；不同廠商可給相同分數。", "trap": "『不得給相同分數』是錯的——分數本就可能相同。"}, {"n": 9, "law": "組織準則", "stem": "下列有關評選委員會之敘述何者正確？", "opts": ["機關應利用採購法主管機關建置之專家學者建議名單資料庫，遴選專家學者委員", "其他政府機關之現職人員，得以專家學者身分擔任評選委員", "某評選委員與受評廠商間於一年前有僱傭關係，該委員應不計入委員總額，且其評分應不予採計", "以上皆非"], "a": 2, "ex": "與受評廠商一年內有僱傭關係者應迴避，<span class=\"ans-hl\">不計入委員總額且評分不予採計<\/span>，(3)正確。其他政府機關現職人員不得以專家學者身分擔任。", "mem": "利益關係委員＝不算人數、不算分。"}, {"n": 10, "law": "第94條", "stem": "下列敘述，何者正確？", "opts": ["採購案如因評選委員會無法評選出最有利標致廢標者，投標廠商不得申請閱覽、抄寫、複印或攝影評選委員會之會議紀錄", "工作小組成員由機關首長或其授權人員指定機關人員或專業人士擔任，屬機關人員者，均應具有採購專業人員資格", "評選委員對於受評廠商之投標文件內容及資料，於開始評選前應予保密。評定最有利標後，則無須保密", "機關成立評選委員會，專家學者人數不得少於三分之一，且不得為政府機關之現職人員"], "a": 3, "ex": "專家學者<span class=\"ans-hl\">不得少於 1/3，且不得為政府機關現職人員<\/span>，(4)正確。受評資料評定後仍須保密；工作小組成員非均須採購專業資格。", "mem": "專家學者：≥1/3＋非現職。"}, {"n": 12, "law": "組織準則", "stem": "下列敘述何者錯誤？", "opts": ["採購評選委員會之專家學者，如中途請辭，並非一定要補聘委員", "機關不得於招標文件中預為規定，投標廠商之企劃書份數不足，即為不合格標", "依採購法主管機關之解釋，評選結果應簽報機關首長或其授權人員核定，爰機關首長不宜擔任採購評選委員", "採購評選委員會議之列席人員，雖不得參與評分，惟徵得主席同意後，可對廠商提出詢問"], "a": 2, "ex": "機關首長<span class=\"ans-hl\">得擔任評選委員（甚至召集人）<\/span>，(3)說「不宜擔任」錯誤。其餘正確。", "trap": "首長可以當召集人；(3)反過來說『不宜』就錯了。"}, {"n": 13, "law": "組織準則", "stem": "依採購法規定，有關採購評選委員會之組成，下列敘述何者錯誤？", "opts": ["委員應具備與採購案相關之專門知識", "委員人數應符合5人以上之規定，而且必須為奇數", "召集人由機關首長擔任，或由機關首長或其授權人員指定一級主管以上人員擔任", "專家學者人數不得少於三分之一，且不得為政府機關之現職人員"], "a": 1, "ex": "委員<span class=\"ans-hl\">5人以上即可，不限奇數<\/span>，(2)多了「必須為奇數」錯誤。", "mem": "委員5人以上，不限奇數。"}, {"n": 14, "law": "組織準則", "stem": "有關採購評選委員會之組成，下列敘述何者不符合規定？", "opts": ["委員總額7人，其中專家學者3人", "委員總額6人，其中專家學者3人", "委員總額5人，其中專家學者2人", "委員總額4人，其中專家學者2人"], "a": 3, "ex": "委員總額須<span class=\"ans-hl\">5人以上<\/span>，(4)只有4人，不符規定。", "trap": "先看總額是否≥5，4人直接出局。"}, {"n": 49, "law": "組織準則", "stem": "依採購法規定，下列有關採購評選委員會之敘述，何者錯誤？", "opts": ["召集人、副召集人均為委員", "召集人應由機關首長或其授權人員指定機關內部人員擔任", "委員會會議，由召集人召集之，並為主席", "召集人未能出席或因故出缺時，由副召集人代理之"], "a": 1, "ex": "召集人應由<span class=\"ans-hl\">機關首長擔任，或指定一級主管以上人員<\/span>，(2)說「指定機關內部人員」錯誤（那是副召集人的標準）。", "trap": "召集人要『一級主管以上』；副召集人才是『機關內部人員』。"}, {"n": 67, "law": "組織準則", "stem": "採購評選委員會召集人及副召集人之產生，下列何者不正確？", "opts": ["召集人及副召集人均為委員", "由委員互選產生", "召集人由機關首長擔任，或由機關首長或其授權人員指定一級主管以上人員擔任", "副召集人由機關首長或其授權人員指定機關內部人員擔任"], "a": 1, "ex": "召集人、副召集人均由<span class=\"ans-hl\">機關首長擔任或指定<\/span>，(2)說「由委員互選」不正確。", "mem": 員中之專家學者人數2人"], "a": 3, "ex": "(4)總額11人需出席≥6，<span class=\"ans-hl\">出席僅5人不足過半<\/span>，不符。其餘出席達半數、專家學者亦達1/3。", "mem": "11人總額→出席至少6。"}, {"n": 11, "law": "審議規則", "stem": "機關評選最有利標，下列何者為正確？", "opts": ["評選委員會會議，應有委員總額二分之一以上出席，其決議應經出席委員過半數之同意行之。出席委員中之專家、學者人數應至少2人且不得少於出席委員人數之三分之一", "評選委員會委員及參與評選工作之人員對於受評廠商之資料，除供公務上使用或法令另有規定外，應保守秘密。惟評選後應予解密", "評選委員會委員自接獲評選有關資料之時起，不得就該採購案參加投標。其有違反者，機關應不決標予該廠商。但得作為分包廠商", "評選委員會委員名單，未公開者，於開始評選前應予保密。評選出優勝廠商或最有利標後，亦同"], "a": 0, "ex": "(1)完整正確：總額1/2以上出席、出席過半數同意、專家學者至少2人且不少於出席1/3。受評資料評選後不解密；違反投標禁止者亦不得作分包；委員名單評選後應解密。", "mem": "1/2出席、過半同意、專家2人且≥1/3。"}]}, {"topic": "委員行為規範（迴避・代理・辭聘・異見）", "law": "審議規則", "memo": "<ul>\n              <li>委員<b>自「接獲評選有關資料」之時起<\/b>，不得參加該案投標、作分包或工作成員；違反者<b>不決標予該廠商，亦不得作分包<\/b>。<\/li>\n              <li>委員<b>不得覓人代理<\/b>評選及出席會議。<\/li>\n              <li>委員要求將不同意見載入紀錄或附意見書，委員會<b>不得拒絕<\/b>。<\/li>\n              <li>有利益衝突（配偶／家屬利益、委任關係、不能公正執行職務等）<b>應即辭職或解聘<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 40, "law": "審議規則", "stem": "採購評選委員會委員自何時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作成員？", "opts": ["接獲評選有關資料之時起", "截止投標之時起", "開標之時起", "召開評選會議之時起"], "a": 0, "ex": "自<span class=\"ans-hl\">接獲評選有關資料之時起<\/span>即受投標禁止之限制。", "mem": "接獲資料起＝不得投標／分包。"}, {"n": 57, "law": "審議規則", "stem": "採購評選委員會辦理評選，下列何者有誤？", "opts": ["委員無法親自辦理評選及出席會議，得覓代理出席", "機關於委員評選後，應彙整製作總表，載明採購案名稱、參與評選委員姓名、受評廠商名稱、各出席委員對於各受評廠商之評選結果及總評選結果，由參與評選全體委員簽名或蓋章", "最後1次會議紀錄應於當次會議結束前作成並予確認", "委員認有調查或實地勘驗之必要時，得經委員會決議後實施調查或勘驗"], "a": 0, "ex": "委員須<span class=\"ans-hl\">親自評選，不得覓人代理<\/span>，(1)有誤。其餘正確。", "mem": "委員不得代理（要親自）。"}, {"n": 47, "law": "審議規則", "stem": "採購評選委員會委員對於會議之決議有不同意見者，如要求將不同意見載入會議紀錄或將意見書附於會議紀錄，以備查考時，採購評選委員會應如何處理？", "opts": ["可以拒絕", "應提付評選委員會議決定是否拒絕", "不得拒絕", "由主席決定是否拒絕"], "a": 2, "ex": "委員要求載入不同意見，委員會<span class=\"ans-hl\">不得拒絕<\/span>，以保障少數意見。", "mem": "異見載入＝不得拒絕。"}, {"n": 27, "law": "審議規則", "stem": "採購評選委員有下列何種情形，應即辭職或予以解聘？", "opts": ["委員之配偶與受評選之廠商3年內曾有委任關係", "機關認為委員不能公正執行職務", "採購案件涉及共同生活家屬之利益", "以上皆是"], "a": 3, "ex": "配偶與廠商有委任關係、不能公正執行職務、涉共同生活家屬利益<span class=\"ans-hl\">皆應辭職或解聘<\/span>。", "mem": "利益衝突／不公正＝即辭聘。"}]}, {"topic": "保密、解密與受評資料", "law": "評選辦法", "memo": "<ul>\n              <li>受評廠商之資料：除供公務使用或法令規定外<b>應保守秘密；決標後仍應保密<\/b>（非決標後即公開）。<\/li>\n              <li>委員名單：未公開者於評選前保密；<b>評選出最有利標／優勝後應解密<\/b>（即使無法評選出，仍應解密）。<\/li>\n              <li>樣品／模型：<b>得標者得於決標後公開、未得標者得於決標後發還<\/b>（非「全部公開」）。<\/li>\n              <li>彙整總表各委員評分<b>得以代號表示<\/b>（不必標示各委員姓名）。<\/li>\n            <\/ul>", "qs": [{"n": 15, "law": "評選辦法", "stem": "下列何者有誤？", "opts": ["採購評選委員會成立後，其委員名單應即公開於主管機關指定之資訊網站", "採購評選委員會委員名單，公開前應予保密", "採購評選委員會委員名單，其未公開者，於開始評選前應予保密", "採購評選委員會委員名單，於評選出最有利標後，得密封保密，不必解密"], "a": 3, "ex": "委員名單於評選出最有利標後<span class=\"ans-hl\">應予解密<\/span>，(4)說「不必解密」有誤。", "trap": "評選後一律解密；(4)反向說『不必解密』。"}, {"n": 16, "law": "第22條", "stem": "機關依採購法第22條第1項第9款規定辦理採購，下列何者不正確？", "opts": ["應依採購法第94條成立採購評選委員會", "評定優勝廠商後議價", "招標文件得訂明固定金額或費率", "經評選而無法評選出優勝廠商者，評選委員名單不應解密"], "a": 3, "ex": "即使無法評選出優勝廠商，委員名單<span class=\"ans-hl\">仍應解密<\/span>，(4)不正確。", "mem": "無法評選出→名單照樣解密。"}, {"n": 30, "law": "審議規則", "stem": "機關於評選後，應彙整製作總表，由參與評選全體委員簽名/蓋章，載明下列事項，何者不正確？", "opts": ["採購案", "各受評廠商名稱及標價", "本委員會全部委員姓名、職業、評選優勝廠商及出席委員姓名", "各出席委員對於各受評廠商之評分或序位評比結果，應標示各出席委員姓名，不得以代號代之"], "a": 3, "ex": "各委員之評分<span class=\"ans-hl\">得以代號表示<\/span>，(4)說「不得以代號代之」不正確。", "mem": "各委員評分＝可用代號。"}, {"n": 35, "law": "評選辦法", "stem": "機關採最有利標決標，對於受評廠商之資料，下列何者有誤？", "opts": ["評選後仍應保守秘密", "得標廠商受評選之樣品或模型，得於決標後公開", "未得標廠商之樣品或模型，得於決標後發還", "所有受評選廠商之樣品或模型，應於決標後公開"], "a": 3, "ex": "得標者樣品得公開、未得標者得發還，<span class=\"ans-hl\">並非全部都應公開<\/span>，(4)有誤。", "trap": "未得標的是『發還』，不是公開。"}, {"n": 63, "law": "評選辦法", "stem": "下列敘述何者錯誤？", "opts": ["評選委員會委員對於受評廠商之資料，評選前應予保密，但決標後除有特殊情形外，應予公開", "機關採最有利標決標，以不訂底價為原則", "機關評定最有利標後，應於決標公告公布最有利標及採行協商措施時其他參與協商廠商之標價及總評分或總序位", "評選委員會之會議紀錄，除涉及個別廠商之商業機密者外，投標廠商並得申請閱覽、抄寫等"], "a": 0, "ex": "受評廠商資料<span class=\"ans-hl\">決標後仍應保守秘密<\/span>，(1)說「決標後應予公開」錯誤。", "mem": "受評資料：決標後仍保密。"}]}, {"topic": "工作小組與評選委員會之任務", "law": "組織準則", "memo": "<ul>\n              <li>工作小組初審意見應載：採購案名稱、小組人員姓名職稱專長、各項內容是否具<b>可行性<\/b>並符合招標文件目的功能等、各廠商之<b>差異性<\/b>。<b>不含「得分／序位」（那是委員的事），也非以「經驗實績」為應載項目<\/b>。<\/li>\n              <li>評選委員會任務：訂（審）定評選項目評審標準、辦理廠商評選、協助解釋評審相關事項。<b>不含「廠商資格審查」<\/b>（資格審查屬機關／工作小組）。<\/li>\n            <\/ul>", "qs": [{"n": 17, "law": "組織準則", "stem": "機關成立之工作小組就受評廠商資料擬具初審意見，下列何者不是應載明事項？", "opts": ["採購案名稱", "工作小組人員姓名、職稱及專長", "受評廠商於各評選項目所報內容是否具可行性，並符合招標文件所定之目的、功能、需求、特性、標準、經費及期程", "受評廠商之經驗或實績"], "a": 3, "ex": "初審意見著重各項內容之<span class=\"ans-hl\">可行性與差異性<\/span>，「經驗或實績」非應載明事項，(4)為答案。", "trap": "初審看『內容可行性』，不是去評廠商經驗實績。"}, {"n": 18, "law": "組織準則", "stem": "下列何者非屬工作小組初審意見所應載明之事項？", "opts": ["採購案名稱", "受評廠商於各評選項目之得分或序位", "受評廠商於各評選項目所報內容是否具可行性，並符合招標文件所定之目的、功能、需求、特性、標準、經費及期程", "受評廠商於各評選項目之差異性"], "a": 1, "ex": "得分或序位是<span class=\"ans-hl\">委員評選的結果<\/span>，非工作小組初審意見應載事項，(2)為答案。", "mem": "工作小組不打分（不載得分序位）。"}, {"n": 32, "law": "組織準則", "stem": "採購評選委員會之任務，何者不正確？", "opts": ["訂定或審定招標文件之評選項目、評審標準及評定方式", "辦理廠商評選", "協助機關解釋與評審標準、評選過程或評選結果有關之事項", "協助機關辦理廠商資格審查"], "a": 3, "ex": "廠商資格審查屬機關／工作小組，<span class=\"ans-hl\">非評選委員會任務<\/span>，(4)不正確。", "mem": "資格審查不是評選委員會的事。"}]}, {"topic": "評選方法（總評分／序位・價格・明顯差異）", "law": "最有利標評選辦法", "memo": "<ul>\n              <li>價格<b>納入評分者，所占總滿分不得逾 <span class=\"keynum\">50%<\/span><\/b>；價格<b>不納入評分<\/b>時仍須<b>綜合考量價格<\/b>（不能只看總評分）。<\/li>\n              <li>招標文件應載明：各評選項目（含子項）<b>配分<\/b>；<b>「總滿分及合格分數」或「各評選項目合格分數」（用「或」，二擇一）<\/b>。<\/li>\n              <li>分階段評選及淘汰，以<b>2 階段為原則<\/b>。<\/li>\n              <li>固定費用／費率之<b>組成內容得納入評分<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 19, "law": "評選辦法", "stem": "依「最有利標評選辦法」規定，價格納入評分者，其所占總滿分之比率不得逾何比率？", "opts": ["百分之十", "百分之二十", "百分之三十", "百分之五十"], "a": 3, "ex": "價格納入評分者，所占總滿分<span class=\"ans-hl\">不得逾 50%<\/span>。", "mem": "價格占比上限＝50%。"}, {"n": 21, "law": "評選辦法", "stem": "機關依「最有利標評選辦法」採行分階段辦理評選者，下列敘述何者正確？", "opts": ["得於第1階段評選採票選法(未經評分)，票選前3名廠商始得進入第2階段評選", "第2階段之評選項目應與第1階段之評選項目相同", "分階段辦理評選以3階段為原則", "以上皆非"], "a": 3, "ex": "分階段評選以<span class=\"ans-hl\">2 階段為原則<\/span>、第2階段項目不必與第1階段相同、不採票選法，故(1)(2)(3)皆非。", "mem": "分階段＝2階段為原則。"}, {"n": 24, "law": "評選辦法", "stem": "下列敘述何者為正確？", "opts": ["機關採最有利標之決標，決定最有利標後，應再洽該廠商辦理議價", "機關辦理統包工程採購，可依採購法第22條第1項第9款之規定評選優勝廠商", "評定最有利標涉及評分，評選項目子項有配分者，其配分應載明於招標文件。個別子項不合格即不得作為最有利標者，亦應於招標文件載明其情形", "採最有利標決標原則得通案報上級機關核准"], "a": 2, "ex": "子項配分、子項不合格之情形<span class=\"ans-hl\">均應載明於招標文件<\/span>，(3)正確。最有利標決定後不再議價；統包不適用22-1-9；最有利標須逐案（非通案）報上級核准。", "mem": "配分／不合格情形＝都要寫進文件。"}, {"n": 25, "law": "審議規則", "stem": "採購評選委員會之委員評選結果，下列何者有誤？", "opts": ["不同委員之評選結果有明顯差異時，召集人提交本委員會議決", "不同委員之評選結果有明顯差異時，依本委員會決議辦理複評", "不同委員之評選結果有明顯差異，複評結果仍有明顯差異時，由本委員會決議之", "不同委員之評選結果有明顯差異時，應廢棄原評選結果，重新辦理評選"], "a": 3, "ex": "明顯差異時應提委員會議決或複評，<span class=\"ans-hl\">非「廢棄重評」<\/span>，(4)有誤。", "trap": "處理明顯差異是『議決／複評』，不是整個重來。"}, {"n": 39, "law": "評選辦法", "stem": "採總評分法評定最有利標者，下列何者有誤？", "opts": ["價格納入評分，以總評分最高，且經機關首長或評選委員會過半數之決定者為最有利標", "價格不納入評分，考量廠商之總評分，以經機關首長或評選委員會過半數決定最優者為最有利標", "招標文件載明之固定價格給付，以總評分最高，且經機關首長或評選委員會過半數之決定者為最有利標", "價格不納入評分，綜合考量廠商之總評分及價格，以整體表現經機關首長或評選委員會過半數決定最優者為最有利標"], "a": 1, "ex": "價格不納入評分時，仍須<span class=\"ans-hl\">綜合考量價格<\/span>（如選項4），(2)只看總評分、未納入價格考量，有誤。", "trap": "對照(4)：價格不評分≠不看價格，仍要『綜合考量總評分及價格』。"}, {"n": 41, "law": "評選辦法", "stem": "評定最有利標涉及評分者，下列何者有誤？", "opts": ["招標文件應載明各評選項目之配分", "個別子項不合格即不得作為協商對象者，個別子項不合格之情形，招標文件應載明", "招標文件應載明總滿分及其合格分數，或各評選項目之合格分數", "招標文件應載明總滿分及其合格分數，及各評選項目之合格分數"], "a": 3, "ex": "應載明「總滿分及合格分數」<span class=\"ans-hl\">或<\/span>「各評選項目合格分數」（二擇一），(4)用「及」要求兩者都載明，有誤。", "mem": "是『或』不是『及』（二擇一）。"}, {"n": 52, "law": "評選辦法", "stem": "依採購法規定，下列有關採總評分法評定最有利標之敘述，何者錯誤？", "opts": ["應於招標文件載明各評選項目之配分。其子項有配分者，亦應載明", "得於招標文件載明個別子項不合格即不得作為協商對象", "如有分階段辦理評選及淘汰不合格廠商之評定方式者，以2階段為原則", "如已於招標文件訂明固定費用者，仍得規定廠商於投標文件內詳列組成該費用之內容，惟不得納入評選"], "a": 3, "ex": "固定費用之<span class=\"ans-hl\">組成內容得納入評分<\/span>，(4)說「不得納入評選」錯誤。", "mem": "費用組成內容＝可納入評分。"}, {"n": 58, "law": "評選辦法", "stem": "評定最有利標涉及評分者，下列何者不是招標文件應載明事項？", "opts": ["總滿分及其合格分數，或各評選項目之合格分數", "總評分合格者之第1名即為最有利標", "總評分不合格者，不得作為協商對象或最有利標", "各評選項目之配分。其子項有配分者，亦應載明"], "a": 1, "ex": "「合格者第1名即為最有利標」是<span class=\"ans-hl\">評定結果，非招標文件應載明事項<\/span>，(2)為答案。其餘三者均應載明。", "trap": "應載的是配分、合格分數與淘汰規則，不是直接寫『誰是第一』。"}, {"n": 64, "law": "審議規則", "stem": "下列何者非屬「採購評選委員會審議規則」第6條第2項所稱「明顯差異」之情形？", "opts": ["多家廠商參與評選，同一廠商，有委員評定其序位為最優，同時亦有委員評定其序位為最差；且評定序位最優委員之評定分數為高分，評定序位最差委員之評定分數為低分", "同一廠商之評選分數，有委員評定為高分，亦有委員評定為不合格分數", "同一廠商之同一評選項目，不同委員之評選結果，有委員評定為高分，亦有委員評定為0分", "序位和最低之第1名廠商，但評選委員評定其序位第一非為最多"], "a": 3, "ex": "(4)只是序位第一者非由多數委員評為第一，<span class=\"ans-hl\">屬正常分歧，非「明顯差異」<\/span>。其餘三者皆為明顯差異。", "trap": "『明顯差異』是分數兩極（高分vs不合格／0分），不是票數多寡。"}]}, {"topic": "簡報及現場詢答", "law": "評選辦法第16條", "memo": "<ul>\n              <li>列為評選項目者，所占<b>配分或權重不得逾 <span class=\"keynum\">20%<\/span><\/b>。<\/li>\n              <li>廠商<b>未出席簡報及詢答，不影響其投標文件之有效性<\/b>，仍得為協商或決標對象（非無效標）。<\/li>\n              <li>簡報<b>不得更改投標文件內容<\/b>；簡報時另提之變更或補充資料<b>不納入評選<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 38, "law": "評選辦法", "stem": "採最有利標決標者，下列何者有誤？", "opts": ["廠商簡報及現場詢答，應與評選項目有關", "廠商簡報不得更改廠商投標文件內容", "投標廠商未出席簡報及現場詢答者，其投標文件無效", "廠商於簡報時另外提出變更或補充資料者，該資料應不納入評選"], "a": 2, "ex": "未出席簡報<span class=\"ans-hl\">不影響投標文件有效性<\/span>，(3)說「投標文件無效」有誤。", "mem": "未出席簡報≠廢標。"}, {"n": 42, "law": "評選辦法", "stem": "評選最有利標，下列何者正確？", "opts": ["投標廠商未出席簡報及現場詢答者，其投標文件無效", "將廠商簡報及現場詢答列為評選項目，所占配分為25%", "廠商得利用簡報機會更改廠商投標文件內容", "廠商利用簡報另外提出補充資料者，該資料應不納入評選"], "a": 3, "ex": "簡報另提之補充資料<span class=\"ans-hl\">不納入評選<\/span>，(4)正確。未出席不無效、配分不得逾20%、簡報不得更改投標內容。", "mem": "簡報補充資料＝不算分。"}, {"n": 43, "law": "評選辦法", "stem": "辦理最有利標，將廠商簡報及現場詢答列為評選項目者，所占配分或權重不得逾何比率？", "opts": ["百分之十", "百分之二十", "百分之五十", "無強制規定"], "a": 1, "ex": "簡報及詢答所占配分或權重<span class=\"ans-hl\">不得逾 20%<\/span>。", "mem": "簡報詢答上限＝20%。"}, {"n": 48, "law": "評選辦法", "stem": "評選最有利標，如招標文件規定廠商須簡報及現場詢答而有廠商未出席者，下列敘述何者正確？", "opts": ["該廠商所投之標不予開標，列為無效標", "該廠商所投之標不予評選，列為不合格標", "不影響該廠商投標文件之有效性", "以上皆非"], "a": 2, "ex": "未出席簡報<span class=\"ans-hl\">不影響投標文件有效性<\/span>，(3)正確。", "mem": "未出席仍是有效標。"}, {"n": 51, "law": "評選辦法", "stem": "依採購法規定，下列有關廠商簡報及現場詢答之敘述，何者錯誤？", "opts": ["係為利評選委員對廠商於各評選項目之表現為更深入之瞭解", "其列為評選項目者，所占配分或權重不得逾百分之二十", "投標廠商未出席簡報及現場詢答者，即不得作為協商或決標對象", "簡報不得更改廠商投標文件內容"], "a": 2, "ex": "未出席簡報者<span class=\"ans-hl\">仍得為協商或決標對象<\/span>，(3)說「不得」錯誤。", "trap": "未出席不影響有效性，當然還能決標——(3)反向敘述。"}]}, {"topic": "協商措施", "law": "第56・57條", "memo": "<ul>\n              <li>協商以<b>「招標文件已標示得更改之項目」為限<\/b>；未標示得協商者不得採行（應廢標）。<\/li>\n              <li>應<b>平等對待<\/b>、與廠商<b>個別協商並保密<\/b>，不得將某廠商優缺點告知其他廠商。<\/li>\n              <li>協商<b>得以書面方式<\/b>辦理（非一定要開會）。<\/li>\n              <li>第2次綜合評選：<b>僅就因協商而更改之部分重行評分<\/b>；未參與第1次評選之委員不得參與。<\/li>\n              <li>訂有底價而報價逾底價須減價者，<b>於「採行協商措施」時洽減<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 26, "law": "第56條", "stem": "機關依採購法第56條第1項及第57條採行協商措施者，下列敘述何者錯誤？", "opts": ["應就所有合於招標文件規定之投標廠商分別協商", "評選委員會辦理第2次綜合評選時，其未參與第1次綜合評選之委員，不得參與", "不論廠商投標文件內容是否因協商而更改，評選委員會辦理第2次綜合評選，應就全部評選項目重行評分（比），以評定最有利標", "原招標文件已標示得更改項目之內容，始得納入協商"], "a": 2, "ex": "第2次評選<span class=\"ans-hl\">僅就因協商而更改之部分重評<\/span>，未更改者沿用原評分，(3)說「全部重評」錯誤。", "mem": "第2次評選＝只重評有改的部分。"}, {"n": 28, "law": "第57條", "stem": "下列關於協商措施之敘述，何者錯誤？", "opts": ["評選結果無法評定最有利標，如原招標文件未標示得協商更改之項目者，不得採行協商措施，應予廢標", "評選委員會辦理第2次綜合評選時，其未參與第1次綜合評選之委員，不得參與", "協商程序應以召開會議方式為之，不得僅以書面方式辦理", "採行協商措施時，應平等對待所有合於招標文件規定之投標廠商"], "a": 2, "ex": "協商<span class=\"ans-hl\">得以書面方式辦理<\/span>，(3)說「不得僅以書面」錯誤。", "mem": "協商可書面，不必硬開會。"}, {"n": 33, "law": "第57條", "stem": "下列採行協商措施之行為，何者有誤？", "opts": ["與廠商個別進行協商，不合併處理", "執行保密措施", "將協商廠商投標文件優缺點及評分，告知其他廠商", "作成協商紀錄"], "a": 2, "ex": "協商應<span class=\"ans-hl\">保密<\/span>，(3)把某廠商優缺點告知他人，有誤。", "mem": "協商內容＝不得外洩。"}, {"n": 36, "law": "第56條", "stem": "機關採最有利標決標，訂有底價，而廠商報價逾底價須減價者，其洽減時機，下列何者正確？", "opts": ["辦理評選前", "評定最有利標後議價前", "採行協商措施時", "評定最有利標後決標前"], "a": 2, "ex": "逾底價之洽減於<span class=\"ans-hl\">採行協商措施時<\/span>進行。", "mem": "洽減＝協商時。"}, {"n": 56, "law": "第57條", "stem": "下列何者有誤？", "opts": ["協商係針對原招標文件已標示得更改項目之內容", "協商係針對評選第1名之廠商", "協商結束後，應予廠商依據協商結果，於一定期間內修改投標文件重行遞送之機會", "招標文件未標示得採協商措施者，不得採行"], "a": 1, "ex": "協商係對<span class=\"ans-hl\">所有合於招標文件規定之廠商分別進行<\/span>，(2)說「只針對第1名」有誤。", "trap": "協商不是只找第一名，是對全部合格廠商。"}, {"n": 60, "law": "第57條", "stem": "依採購法規定，下列協商措施何者錯誤？", "opts": ["應平等對待所有合於招標文件規定之投標廠商", "與廠商個別進行協商", "得採協商措施之項目，不以招標文件已標示得更改項目之內容為限", "執行保密措施"], "a": 2, "ex": "協商項目<span class=\"ans-hl\">以招標文件已標示得更改者為限<\/span>，(3)說「不以…為限」錯誤。", "mem": "協商項目＝以文件已標示者為限。"}]}, {"topic": "最有利標決標原則與程序", "law": "第52・56條", "memo": "<ul>\n              <li>採最有利標<b>應先報經上級機關核准<\/b>（逐案，非通案）。<\/li>\n              <li><b>以不訂底價為原則<\/b>；評定最有利標後<b>不再議價、不比減價格<\/b>（評定即決標）。<\/li>\n              <li>採購法用詞是<b>「採購評選委員會」<\/b>，不是「評審委員會」。<\/li>\n              <li>準用最有利標之公開評選，<b>第1次開標 1 家以上即可開標<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 3, "law": "第56條", "stem": "機關以公開招標搭配採購法第56條規定之最有利標決標方式辦理採購，下列敘述何者錯誤？", "opts": ["不論採購金額大小，均應先報經上級機關核准", "招標文件規定於無法評定最有利標時，得採行協商措施", "議價程序不得免除", "應成立採購評選委員會"], "a": 2, "ex": "最有利標評定後即決標，<span class=\"ans-hl\">議價程序得免除<\/span>，(3)說「不得免除」錯誤。", "mem": "最有利標＝免議價（評定即決標）。"}, {"n": 23, "law": "第56條", "stem": "機關依採購法第56條規定，以「最有利標決標原則」辦理招標，下列何者不正確？", "opts": ["以不訂底價為原則", "評定最有利標後得議減價格", "評選結果應簽報機關首長或其授權人員核定", "以公開招標方式辦理，第1次開標應有3家以上合格廠商投標，方可開標"], "a": 1, "ex": "評定最有利標後<span class=\"ans-hl\">不再議減價格<\/span>，(2)不正確（洽減是在協商階段）。", "trap": "洽減在『協商時』；『評定後議減』是錯的。"}, {"n": 34, "law": "第56條", "stem": "下列何者非屬機關採最有利標決標之必要事項？", "opts": ["綜合評選", "訂定底價", "成立採購評選委員會", "採購評選委員會委員自接獲評選有關資料之時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作成員。其有違反者，機關應不決標予該廠商"], "a": 1, "ex": "最有利標以不訂底價為原則，<span class=\"ans-hl\">訂定底價非必要事項<\/span>，(2)為答案。", "mem": "最有利標＝不訂底價（非必要）。"}, {"n": 37, "law": "第56條", "stem": "下列何者非屬採最有利標決標之用詞？", "opts": ["協商", "評審委員會", "評審標準", "計數之綜合評選"], "a": 1, "ex": "最有利標用的是<span class=\"ans-hl\">「採購評選委員會」<\/span>，「評審委員會」非其用詞，(2)為答案。", "trap": "是『評選委員會』；『評審委員會』出現在52-1-2最低標審查。"}, {"n": 45, "law": "第56條", "stem": "機關採最有利標決標者，下列敘述何者不是採購法之規定？", "opts": ["招標前應先報經上級機關核准", "比減價格", "招標文件規定評審標準", "依機關首長或評選委員會過半數之決定評定最有利標"], "a": 1, "ex": "最有利標<span class=\"ans-hl\">不比減價格<\/span>，(2)非採購法之規定。", "mem": "最有利標不比減。"}, {"n": 46, "law": "第22條", "stem": "機關依採購法第22條規定，以「準用最有利標決標方式」辦理招標，第1次開標幾家以上合格廠商投標，方可開標？", "opts": ["2家", "3家", "4家", "1家"], "a": 3, "ex": "準用最有利標之公開評選，<span class=\"ans-hl\">1 家以上即可開標<\/span>。", "mem": "公開評選＝1家可開標。"}, {"n": 50, "law": "第56條", "stem": "下列何者屬最有利標錯誤行為態樣？", "opts": ["出席之評選委員遲到早退，未全程參與，或由他人代理", "評選時允許廠商於簡報時更改投標文件內容", "評選委員會於評選時，任意變更招標文件之評選規定", "以上皆是"], "a": 3, "ex": "委員未全程／代理、允許簡報改投標內容、任意變更評選規定<span class=\"ans-hl\">皆為錯誤態樣<\/span>。", "mem": "未全程／改內容／改規則＝皆錯。"}, {"n": 62, "law": "第56條", "stem": "機關辦理採購採最有利標決標者，下列敘述何者正確？", "opts": ["價格納入評選項目者，採購評選委員就價格給予評分時，應以比較入圍廠商標價之高低為評分基礎", "不論案件性質，採購評選委員會應於招標前成立", "採購評選委員評選及出席會議，得由代理人為之", "以不訂底價為原則，其訂有底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之"], "a": 3, "ex": "(4)正確：以不訂底價為原則，訂有底價而逾底價者於協商措施時洽減。委員不得代理、委員會非一律招標前成立、價格評分非以比較標價高低為唯一基礎。", "mem": "不訂底價為原則＋逾底價於協商洽減。"}, {"n": 66, "law": "第56條", "stem": "依採購法規定，下列何者須報上級機關核准？", "opts": ["機關辦理公告金額以上之選擇性招標", "招標文件中公告底價", "採最有利標決標", "機關辦理公告金額以上之限制性招標公開評選優勝廠商"], "a": 2, "ex": "<span class=\"ans-hl\">採最有利標決標<\/span>須報上級機關核准（56條）。選擇性招標、公開評選優勝廠商本身不以報上級為要件；底價不得公告。", "mem": "最有利標＝報上級核准。"}]}, {"topic": "評選優勝廠商與準用最有利標", "law": "第22條", "memo": "<ul>\n              <li>22-1-9（專業／技術／資訊／社福／文創服務）、22-1-10（設計競賽）<b>應依第94條成立採購評選委員會，並刊登政府採購公報<\/b>；<b>1 家即可開標<\/b>，得評選 2 家以上優勝者<b>依序議價<\/b>（非比價）。<\/li>\n              <li>訂有<b>固定金額／費率<\/b>者，評選優勝後<b>免議價，依該金額決標<\/b>；廠商<b>自願減價者依減價金額決標<\/b>。<\/li>\n              <li>旅遊服務、資訊服務屬<b>22-1-9 專業服務，準用最有利標評選<\/b>。<\/li>\n              <li><b>統包工程「不」適用<\/b>22-1-9／10 評選優勝規定。<\/li>\n              <li>未達公告金額依「中央機關未達公告金額採購招標辦法」公開取得報價／企劃書、參考最有利標精神議價者，<b>免成立評選委員會（成立評審小組，人數機關自定）<\/b>。<\/li>\n              <li>22-1-11（房地產勘選）<b>免成立評選委員會<\/b>。<\/li>\n            <\/ul>", "qs": [{"n": 2, "law": "未達公告金額辦法", "stem": "未達公告金額之採購，依「中央機關未達公告金額採購招標辦法」第2條第1項第3款，參考最有利標之精神，擇符合需要者之評審小組之組成人數，下列何者為是？", "opts": ["至少5人", "限於5至17人", "應與工作小組人數相同", "由機關自行核定"], "a": 3, "ex": "此情形組評審小組，人數<span class=\"ans-hl\">由機關自行核定<\/span>，不受評選委員會5人規定拘束。", "trap": "這是『評審小組』不是『評選委員會』，沒有5人門檻。"}, {"n": 20, "law": "第22條", "stem": "下列敘述何者為是？", "opts": ["採購評選作業採分階段辦理評選及淘汰不合格廠商者，因前一階段已淘汰部分不合格廠商，爰評選結果以後階段之評分(比)結果為準", "旅遊服務屬採購法第22條第1項第9款規定所稱之專業服務，得採準用最有利標之決標方式", "機關依採購法第22條第1項第9款規定辦理經公開評選之限制性招標，為提升採購品質，得於招標文件規定，投標廠商如僅有1家並經資格審查合格時，提高合格門檻分數", "準用最有利標決標之採購案，於評選出優勝廠商後，尚有議價程序，爰機關應於議價現場再將投標單交廠商填寫投標價"], "a": 1, "ex": "旅遊服務屬22-1-9<span class=\"ans-hl\">專業服務，得準用最有利標<\/span>，(2)為是。不得因只有1家就提高門檻；議價不必再填投標單。", "mem": "旅遊服務＝22-1-9專業服務。"}, {"n": 22, "law": "第22條", "stem": "下列何者錯誤？", "opts": ["公開取得企劃書之招標方式得搭配參考最有利標精神擇最符合需要者議價", "機關依採購法第22條第1項第9款辦理公開評選，機關得評選2家以上優勝廠商辦理比價", "公開取得企劃書之招標方式得搭配參考最有利標精神擇定2家以上符合需要者辦理比價", "依採購法第22條第1項第10款辦理公開評選，得標廠商得不以1家為限"], "a": 1, "ex": "22-1-9評選2家以上優勝者係<span class=\"ans-hl\">依序議價，非「比價」<\/span>，(2)錯誤。", "trap": "22-1-9優勝後是『依序議價』；『比價』是公開取得企劃書那條的玩法。"}, {"n": 29, "law": "第22條", "stem": "未達公告金額之採購案，依採購法第22條第1項第9款及第10款辦理者，下列何者正確？", "opts": ["應報上級機關核准", "等標期設定為5天", "第1次招標，必須有3家以上合格廠商始可開標", "應刊登政府採購公報及成立採購評選委員會"], "a": 3, "ex": "22-1-9／10<span class=\"ans-hl\">應刊登政府採購公報並成立評選委員會<\/span>，(4)正確。不以報上級為要件、1家即可開標。", "mem": "22-1-9／10＝刊公報＋成立委員會。"}, {"n": 31, "law": "第22條", "stem": "機關依採購法第22條第1項第9款規定以經公開評選之限制性招標辦理專業服務之評選優勝者，下列敘述何者正確？", "opts": ["應先報經上級機關核准", "須與優勝廠商辦理（依序）議價後決標，惟如已於招標文件訂明決標之固定金額或費率者，則以該金額或費率決標，免議價程序", "應成立採購評選委員會", "不適用於未達公告金額之採購"], "a": 2, "ex": "22-1-9<span class=\"ans-hl\">應成立採購評選委員會<\/span>，(3)正確。本身不以報上級為要件、亦適用未達公告金額；(2)敘述大致正確但本題以(3)為答案。", "mem": "22-1-9＝必成立評選委員會。"}, {"n": 44, "law": "第22條", "stem": "機關依採購法第22條第1項第10款規定辦理招標，下列何者正確？", "opts": ["應依採購法第94條成立採購評選委員會", "限工程採購", "招標文件不得訂明固定金額或費率", "由廠商自行報價者，價格不應納入評選範圍"], "a": 0, "ex": "22-1-10設計競賽<span class=\"ans-hl\">應依94條成立採購評選委員會<\/span>，(1)正確。不限工程、得訂固定金額、價格得納入評選。", "mem": "22-1-10＝成立評選委員會。"}, {"n": 53, "law": "第22條", "stem": "下列何種採購不適用採購法第22條第1項第9款及第10款評選優勝廠商之評選規定？", "opts": ["專業服務", "統包工程", "設計競賽", "資訊服務"], "a": 1, "ex": "<span class=\"ans-hl\">統包工程<\/span>不適用22-1-9／10評選優勝規定。", "mem": "統包工程＝不走評選優勝那條。"}, {"n": 54, "law": "第22條", "stem": "機關為辦理下列事項，何者免成立採購評選委員會？", "opts": ["採購法第22條第1項第9款規定之評選優勝者", "採購法第22條第1項第10款規定之評選優勝者", "採購法第22條第1項第11款規定辦理房地產之勘選認定適合需要者", "採購法第56條規定之評定最有利標"], "a": 2, "ex": "22-1-11<span class=\"ans-hl\">房地產勘選免成立評選委員會<\/span>，(3)為答案。9款、10款、56條均須成立。", "mem": "房地產勘選（11款）＝免委員會。"}, {"n": 55, "law": "未達公告金額辦法", "stem": "機關依「中央機關未達公告金額採購招標辦法」第2條第1項第3款規定，公開取得書面報價或企劃書，採用最有利標之精神，擇最符合需要者議價。下列何者不正確？", "opts": ["應依採購法第94條成立採購評選委員會", "限採購金額未達新臺幣150萬元之採購", "招標文件得訂明固定金額或費率", "第1次公告，其等標期至少應有5日，必要時應延長之"], "a": 0, "ex": "此情形<span class=\"ans-hl\">免成立評選委員會（組評審小組）<\/span>，(1)說「應依94條成立」不正確。", "trap": "未達公告金額參考最有利標精神＝不必成立評選委員會。"}, {"n": 59, "law": "第22條", "stem": "機關依採購法第22條第1項第9款規定評選資訊服務廠商作業，何者正確？", "opts": ["準用採購法有關最有利標之評選規定", "底價應於開標前訂定", "如為固定服務費用或費率者，評選優勝廠商後即辦理決標免議價程序", "評選優勝廠商後即辦理比價"], "a": 0, "ex": "22-1-9評選<span class=\"ans-hl\">準用最有利標之評選規定<\/span>，(1)正確。底價於議價前訂定、優勝後依序議價（非比價）。", "mem": "22-1-9＝準用最有利標評選。"}, {"n": 65, "law": "評選辦法", "stem": "機關於招標文件載明固定費用或費率，準用最有利標公開評選優勝廠商者，下列敘述何者錯誤？", "opts": ["得於招標文件規定廠商報價超過該費用或費率者為不合格標", "該費用或費率之組成內容納入評分者，該評選項目所占比率或權重得低於20%", "於評選優勝廠商後，得免議價程序，依招標文件所載明之固定費用或費率決標", "如廠商於投標文件內自願減價，依自願減價之金額決標"], "a": 2, "ex": "原則依固定費用決標，但<span class=\"ans-hl\">廠商自願減價者應依減價金額決標<\/span>（見選項4），(3)以「依固定費用決標」一語概括，與規定不符。屬細部爭點，記正解為(3)。", "mem": "固定費用＋自願減價＝依減價額決標。"}]}]}, {"id": "ch3", "num": "參", "chapter": "工程及技術服務採購作業", "meta": "全 71 題 · 技術服務計費／統包／物價調整／驗收保固", "groups": [{"topic": "建造費用百分比法", "law": "評選及計費辦法", "memo": "<ul>\n      <li>含規劃、設計、監造三項時：<b>規劃 10%、設計 45%、監造 45%<\/b>。<\/li>\n      <li>「建造費用」＝工程採購<b>底價金額或評審委員會建議金額（無則以工程預算代之）<\/b>；<b>不含<\/b>物價調整工程款、工程保險費，亦不含有價回收料之減項金額（但「含」承包商利潤管理費）。<\/li>\n      <li>費率<b>應於招標文件載明<\/b>；機關得視個案<b>訂定超過附表所載之費率<\/b>。<\/li>\n      <li><b>單獨規劃服務不適用建造費用百分比法<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 1, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘述何者正確？", "opts": ["各階段環境影響評估及相關說明書、報告書之編製及送審之服務費用，屬百分比計費之範疇，不得另行估算編列", "水土保持計畫之辦理及送審之服務費用，仍須受附表所列參考百分比之限制，不得另行估算編列", "申請公有建築物候選綠建築證書或綠建築標章之服務費用，仍須受附表所列參考百分比之限制，不得另行估算編列", "招標文件可載明建造費用不包括拆除工程之有價回收料之減項金額"], "a": 3, "ex": "有價回收料之減項金額<span class=\"ans-hl\">得載明不計入建造費用<\/span>，(4)正確。環評、水保、綠建築等服務費用得另行估算編列，不受百分比限制。", "mem": "有價回收料減項＝可不計入建造費用。"}, {"n": 2, "law": "計費辦法", "stem": "建築物工程技術服務建造費用百分比參考表所列服務費用參考值，於包括規劃、設計及監造3項時，原則上各占多少百分比？", "opts": ["規劃占5%，設計占50%，監造占45%", "規劃占15%，設計占45%，監造占40%", "規劃占10%，設計占45%，監造占45%", "規劃占10%，設計占50%，監造占40%"], "a": 2, "ex": "三項合計時，<span class=\"ans-hl\">規劃10%、設計45%、監造45%<\/span>。", "mem": "規劃10／設計45／監造45。"}, {"n": 10, "law": "計費辦法", "stem": "機關辦理技術服務採購，採建造費用百分比法計費，下列何者正確？", "opts": ["建築物裝修及整修工程不得比照建築物工程技術服務建造費用百分比參考表計費", "技術服務契約有關之各項工程，不得合併計算建造費用", "技術服務契約有關之各項工程，如屬分期或分區施作，且契約已明訂依分期或分區給付服務費用者，可分別計算建造費用，但不包括同一工程之分標採購案", "若後續施作工程未發包，則機關得免付費用予技術服務廠商"], "a": 2, "ex": "分期／分區施作且契約已明訂者<span class=\"ans-hl\">可分別計算建造費用<\/span>（不含同一工程之分標案），(3)正確。", "mem": "分期分區明訂＝可分別計建造費用。"}, {"n": 11, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘述何者錯誤？", "opts": ["建造費用，指工程採購底價金額或評審委員會建議金額，若無前2者，以工程預算代之。但應依規定不包括若干事項之費用", "建造費用不包括工程保險費", "其服務費率應按工程內容、服務項目及難易度，參考附表1至附表4，訂定建造費用之費率級距及各級費率，簽報機關首長或其授權人員核定，無須於招標文件中載明", "工程於履約期間有契約變更、終止或解除契約之情形者，技術服務費用得視實際情形協議增減之"], "a": 2, "ex": "費率<span class=\"ans-hl\">應於招標文件中載明<\/span>，(3)說「無須於招標文件載明」錯誤。", "trap": "費率不是只簽報核定就好，要寫進招標文件。"}, {"n": 20, "law": "計費辦法", "stem": "下列何項費用，不得納入建造費用計算技術服務費用？", "opts": ["承包商的利潤", "承包商之棄土費", "物價指數調整工程款", "承包商於工地開挖出有價料之減項金額"], "a": 2, "ex": "<span class=\"ans-hl\">物價指數調整工程款<\/span>不得納入建造費用計算技術服務費。", "mem": "建造費用不含物調工程款。"}, {"n": 27, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘述何者正確？", "opts": ["建造費用不得包括廠商之工程管理費用及利潤", "建造費用應包括物價指數調整工程款", "建造費用應包括工程保險費", "機關考量個案工程內容、服務項目及難易度，可訂定超過附表所載之費率"], "a": 3, "ex": "機關得視個案<span class=\"ans-hl\">訂定超過附表所載之費率<\/span>，(4)正確。建造費用「含」承包商利潤管理費，但不含物調工程款、工程保險費。", "mem": "附表費率是參考，個案可超過。"}, {"n": 58, "law": "計費辦法", "stem": "下列何者計費方式不適用於單獨規劃服務之採購？", "opts": ["建造費用百分比法", "總包價法", "服務成本加公費法", "按日計酬法"], "a": 0, "ex": "單獨規劃尚無工程造價基礎，<span class=\"ans-hl\">不適用建造費用百分比法<\/span>。", "mem": "單獨規劃＝不用建造費用百分比法。"}]}, {"topic": "服務成本加公費法", "law": "評選及計費辦法", "memo": "<ul>\n      <li><b>公費為定額<\/b>，以「直接薪資扣除非經常性獎金後＋管理費用」合計金額之 <span class=\"keynum\">25%<\/span> 為限。<\/li>\n      <li><b>管理費用上限<\/b>＝「直接薪資扣除非經常性獎金後」之 <span class=\"keynum\">100%<\/span>。<\/li>\n      <li>非經常性獎金：得明定為實際薪資之一定比率，<b>檢據核銷且不得逾實際薪資 30%<\/b>。<\/li>\n      <li>不扣薪假與特休薪資：得明定為實際薪資之一定比率（<b>免檢據<\/b>）。<\/li>\n      <li>預付款<b>不逾契約價金總額／上限之 30%<\/b>；憑證含<b>發票、收據、紀錄或報表<\/b>（不限正本）。<\/li>\n    <\/ul>", "qs": [{"n": 6, "law": "計費辦法", "stem": "機關辦理技術服務採購，採服務成本加公費法計費者，下列何者錯誤？", "opts": ["直接薪資包括非經常性給與之獎金", "實際薪資得包括經常性給與之獎金", "工作人員不扣薪假與特別休假之薪資費用，得由機關依實際需要於招標文件明定為實際薪資之一定比率及給付條件，但須檢據核銷", "非經常性給與之獎金，得由機關依實際需要於招標文件明定為實際薪資之一定比率及給付條件，檢據核銷。但不得超過實際薪資之百分之三十"], "a": 2, "ex": "不扣薪假與特休薪資係以「一定比率」估列，<span class=\"ans-hl\">免檢據核銷<\/span>，(3)說「須檢據核銷」錯誤。對照(4)非經常性獎金才須檢據且≤30%。", "mem": "不扣薪/特休＝免檢據；非經常獎金＝須檢據≤30%。"}, {"n": 36, "law": "計費辦法", "stem": "委託技術服務廠商之服務費用，得於契約約定於訂約後預付一部分，以不逾契約價金總額或契約價金上限之百分之幾為原則？", "opts": ["百分之十", "百分之二十", "百分之三十", "百分之五十"], "a": 2, "ex": "預付款以不逾契約價金總額／上限之<span class=\"ans-hl\">30%<\/span>為原則。", "mem": "技術服務預付款上限＝30%。"}, {"n": 38, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，其採成本加公費法計費者，其中「公費」部分應為定額，且應以直接薪資扣除非經常性給與之獎金後與管理費用合計金額多少範圍內為限？", "opts": ["20%", "25%", "30%", "40%"], "a": 1, "ex": "公費為定額，以（直接薪資扣除非經常性獎金＋管理費用）合計金額之<span class=\"ans-hl\">25%<\/span>為限。", "mem": "公費上限＝25%。"}, {"n": 60, "law": "計費辦法", "stem": "機關委託廠商承辦技術服務，其採成本加公費法計費者，其中「管理費用」之上限，不得超過「直接薪資扣除非經常性給與之獎金後」之下列何者比率？", "opts": ["30%", "50%", "80%", "100%"], "a": 3, "ex": "管理費用上限＝直接薪資扣除非經常性獎金後之<span class=\"ans-hl\">100%<\/span>。", "mem": "管理費用上限＝100%。"}, {"n": 70, "law": "計費辦法", "stem": "服務成本加公費法所稱「憑證」，包括各項費用之下列何種單據？", "opts": ["發票", "收據", "紀錄或報表", "以上皆是"], "a": 3, "ex": "憑證含發票、收據、紀錄或報表，<span class=\"ans-hl\">以上皆是<\/span>。", "mem": "憑證＝發票／收據／紀錄報表。"}]}, {"topic": "技術服務契約、委託內容與計費", "law": "評選及計費辦法", "memo": "<ul>\n      <li><b>總包價法<\/b>：委託內容有增減者<b>仍須辦理變更契約<\/b>（不是不得變更）。<\/li>\n      <li><b>委託設計與委託監造得由不同廠商承作<\/b>。<\/li>\n      <li>公告金額以上技術服務以<b>不訂底價之最有利標為原則<\/b>；評定後<b>議價程序得免除<\/b>。<\/li>\n      <li>新建建築物服務費採購金額<b>≥ 500 萬<\/b>且含規劃、設計者應<b>辦理競圖<\/b>。<\/li>\n      <li>履約 1 年以上者得約定<b>自第 2 年起<\/b>隨薪資／物價指數調整契約價金。<\/li>\n    <\/ul>", "qs": [{"n": 5, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，下列敘述何者錯誤？", "opts": ["機關辦理公告金額以上之技術服務者，以不訂底價之最有利標為原則", "機關採公開招標不訂底價之最有利標辦理公告金額以上之技術服務採購，於評選出最有利標廠商後，議價程序仍不得免除", "機關於招標文件預先載明決標金額或費率作為決標條件，此時得不將廠商報價納為評選項目", "機關辦理公告金額以上之技術服務者，依採購法第22條第1項第9款及「機關委託技術服務廠商評選及計費辦法」規定，參考優勝廠商報價訂定底價後辦理議價程序"], "a": 1, "ex": "最有利標評定後<span class=\"ans-hl\">議價程序得免除<\/span>，(2)說「仍不得免除」錯誤。", "mem": "不訂底價最有利標＝免議價。"}, {"n": 12, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，下列敘述何者錯誤？", "opts": ["未達公告金額之技術服務採購，其依中央機關未達公告金額採購招標辦法公開取得3家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價者，得準用「機關委託技術服務廠商評選及計費辦法」之規定", "屬未達公告金額之案件，得採參考最有利標精神之決標方式辦理", "同類或同區域中，小型工程之技術服務案件，其採購件數較多者，不得採複數決標方式，避免集中由少數廠商承攬", "得依採購法第20條規定採選擇性招標方式辦理，預先辦理廠商資格審查，建立合格之技術服務廠商名單"], "a": 2, "ex": "小型工程技術服務件數多者<span class=\"ans-hl\">得採複數決標方式<\/span>，(3)說「不得採複數決標」錯誤。", "trap": "複數決標反而有助分散，不是禁止。"}, {"n": 13, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，下列敘述何者錯誤？", "opts": ["採總包價法計費者，其委託內容如有增減者，仍須辦理變更契約", "技術服務廠商投保專業責任保險所需保險費用，包含於服務費用項目之內", "服務範圍包括代辦訓練操作或維護人員者，機關受訓人員之旅費及生活費，應由機關自行支給，不包括在服務費用項目之內", "機關委託技術服務，屬私契約性質，廠商人員利用履約方便所為之不當審查行為，僅能透過契約約定求償，不涉及刑責"], "a": 3, "ex": "技術服務人員之不當審查行為<span class=\"ans-hl\">可能涉及刑責（如採購法88、92條）<\/span>，(4)說「不涉及刑責」錯誤。", "mem": "技術服務不當行為＝可能有刑責。"}, {"n": 18, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，下列敘述何者錯誤？", "opts": ["採總包價法計費者，無論委託內容有無增減，均不得變更契約價金", "建築師依法律規定須交由技術辦理設計監造所需費用，包含於服務費用項目之內", "以建造費用百分比法計得之服務費不包含辦理可行性研究之服務費", "履約期間在1年以上者，機關得於契約內訂明自第2年起得隨臺灣地區專業、科學及技術服務業受雇員工平均經常性薪資指數逐月計算調整契約價金"], "a": 0, "ex": "總包價法委託內容有增減時<span class=\"ans-hl\">仍須辦理變更契約<\/span>，(1)說「無論增減均不得變更」錯誤。", "mem": "總包價法有增減＝仍要變更契約。"}, {"n": 25, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，下列敘述何者錯誤？", "opts": ["採購包含工程及技術服務者，如技術服務部分預算金額高於工程部分預算金額，即得以勞務採購辦理統包", "公開技術服務之預算金額及其所對應之工程標之預算金額，並載明超預算為不合格標，不予減價機會", "招標前依「機關委託技術服務廠商評選及計費辦法」訂定服務費預算書", "採購契約以採用採購法主管機關訂定之範本為原則"], "a": 0, "ex": "勞務採購不得統包，(1)以「技術服務預算較高即得以勞務統包」之說法<span class=\"ans-hl\">錯誤<\/span>。", "trap": "勞務（含技術服務）不得統包——別被『預算較高』誤導。"}, {"n": 26, "law": "計費辦法", "stem": "機關委託廠商辦理技術服務，下列敘述何者正確？", "opts": ["「機關委託技術服務廠商評選及計費辦法」之規定，僅能用於服務費用在公告金額以上之技術服務採購", "機關辦理設計技術服務，得由學術單位承攬", "機關辦理規劃、設計技術服務，得由技師公會或建築師公會承攬", "委託設計及委託監造得由不同廠商承作"], "a": 3, "ex": "<span class=\"ans-hl\">委託設計與委託監造得由不同廠商承作<\/span>，(4)正確。該辦法不限公告金額以上；設計不得由學術單位或公會承攬。", "mem": "設計、監造＝可分由不同廠商。"}, {"n": 34, "law": "計費辦法", "stem": "下列何者正確？", "opts": ["廠商承辦專案管理技術服務，不得承攬受其管理之標案", "設計、監造等技術服務採購案，得委由公立專科以上技專校院相關科系所之專任教師辦理並簽證之", "委託監造服務案亦得同時委由承辦統包案之細部設計廠商辦理，以提升效率", "委託技術服務採服務成本加公費法計費者，廠商應記錄各項費用並提出憑證，且應為正本"], "a": 0, "ex": "專案管理廠商<span class=\"ans-hl\">不得承攬受其管理之標案<\/span>，(1)正確（利益迴避）。設計監造不得由教師簽證、監造不得由統包設計廠商兼辦、憑證不限正本。", "mem": "專案管理＝不得承攬自己管理的標案。"}, {"n": 61, "law": "計費辦法", "stem": "機關委託廠商承辦新建建築物之技術服務，其服務費用之採購金額在新臺幣多少元以上且服務項目包括規劃、設計者，應要求廠商提出服務建議書及規劃、設計構想圖說（配置圖、平面圖、立面圖、剖面圖、透視圖等），並應辦理競圖？", "opts": ["100萬元", "500萬元", "1,000萬元", "2,000萬元"], "a": 1, "ex": "新建建築物服務費採購金額<span class=\"ans-hl\">≥ 500 萬<\/span>且含規劃設計者，應辦理競圖。", "mem": "競圖門檻＝500萬。"}]}, {"topic": "專案管理、利益迴避與懲戒刑責", "law": "第39・88・92條", "memo": "<ul>\n      <li>專案管理人員中應有 <span class=\"keynum\">1/2<\/span> 以上為廠商之專任職員；專案管理廠商<b>不得承攬受其管理之標案<\/b>。<\/li>\n      <li>機關委託專案管理者<b>應擬具委託專案管理計畫<\/b>（不是編列預算就好）。<\/li>\n      <li>參與規劃廠商欲投標：<b>檢討如無不公平競爭之虞，可同意其投標<\/b>。<\/li>\n      <li>受託規劃／設計／專案管理／代辦採購之廠商，涉採購法 <b>88、92 條<\/b>之罪者送檢調。<\/li>\n      <li>監造現場人員<b>進駐前 1 年或執業期間有相關犯罪判決確定者，機關應限期更換<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 3, "law": "技師法第42條", "stem": "受機關委託提供採購規劃、設計、監造或專案管理之工程技術服務廠商如有綁標情事致機關遭受損害，機關應追究廠商之責任；承辦之技師或建築師有應付懲戒之情事，且交付懲戒符合行政程序法第7條所訂「比例原則」時，則依技師法第42條或建築師法第50條之規定，詳述事實並檢具違規事證移送懲戒。其為執業技師部分，應送下列何者機關辦理？", "opts": ["電機技師送經濟部", "內政部", "技師法之中央主管機關", "直轄市、縣（市）主管機關"], "a": 2, "ex": "執業技師之懲戒移送<span class=\"ans-hl\">技師法之中央主管機關<\/span>辦理。", "mem": "技師懲戒＝技師法中央主管機關。"}, {"n": 17, "law": "第39條", "stem": "某機關辦理垃圾棄置場處置設計監造案，機關採用限制性招標公開評選，機關若已將規劃報告公開，並列為招標文件一部分，參與規劃廠商去函招標機關表示欲投標，機關應如何處理？", "opts": ["依法不得允許其投標", "檢討如無不公平競爭之虞，可同意其投標", "雖檢討無不公平競爭，仍應報請上級機關同意後始得同意其投標", "報主管機關決定"], "a": 1, "ex": "規劃報告已公開且列為招標文件者，<span class=\"ans-hl\">檢討如無不公平競爭之虞即可同意投標<\/span>，(2)正確。", "mem": "規劃已公開＋無不公平競爭＝可投標。"}, {"n": 19, "law": "第39條", "stem": "機關辦理工程，因專業人力或能力不足，可委託專案管理廠商協助辦理之工作，下列何者正確？", "opts": ["委託規劃、設計", "都市計畫、區域計畫或水土保持計畫等規劃之諮詢及審查", "委託可行性研究", "以上皆是"], "a": 1, "ex": "專案管理協助範圍含<span class=\"ans-hl\">都市計畫等規劃之諮詢及審查<\/span>，(2)正確。規劃設計、可行性研究本身屬另案委託。", "trap": "專案管理是『諮詢及審查』，不是直接幫你做規劃設計。"}, {"n": 23, "law": "第39條", "stem": "機關委託廠商辦理專案管理技術服務之工作內容，下列敘述何者錯誤？", "opts": ["設計工作成果之審查", "施工督導與履約管理之諮詢及審查", "委託可行性評估", "發包預算之審查"], "a": 2, "ex": "專案管理是「審查」性質，<span class=\"ans-hl\">可行性評估屬另行委託之規劃工作<\/span>，(3)非專案管理內容。", "mem": "專案管理＝審查，不做可行性評估。"}, {"n": 24, "law": "第39條", "stem": "機關委託廠商辦理技術服務，下列敘述何者錯誤？", "opts": ["設計應符合節省能源、減少溫室氣體排放、保護環境、節約資源、經濟耐用等目的", "監造建築師、技師或其他專門職業及技術人員執行監造業務或監造簽證事項，其屬法令規定或契約約定應親自赴現場查驗、勘驗、初驗、驗收、會勘或出席會議者，應配合到場辦理、說明、會辦", "機關因專業人力或能力不足，需委託廠商辦理專案管理者，循預算程序編列核定後辦理即可，無須擬具委託專案管理計畫", "受機關委託提供採購規劃、設計或專案管理或代辦採購之廠商及其人員，如有犯採購法第88條、第92條之罪之嫌者，應送檢調單位查處"], "a": 2, "ex": "委託專案管理<span class=\"ans-hl\">應擬具委託專案管理計畫<\/span>，(3)說「無須擬具」錯誤。", "mem": "委託專案管理＝要先擬計畫。"}, {"n": 35, "law": "計費辦法", "stem": "機關委託廠商承辦技術服務得載明之契約條款，下列何者錯誤？", "opts": ["稅負事前約定，並依我國法律所定納稅義務人為納稅人", "工程具機電設備者，監造計畫應增設功能運轉測試等抽驗程序及標準", "有付款期限者，到期付款時所應達到之工作進度", "監造單位之現場人員於進駐工地前1年或執行業務期間，有因業務上相關之犯罪行為，經判決確定之情事，機關未必須限期更換該人員"], "a": 3, "ex": "監造現場人員有相關犯罪判決確定者，機關<span class=\"ans-hl\">應限期更換<\/span>，(4)說「未必須限期更換」錯誤。", "mem": "監造人員有相關前科判決確定＝應限期更換。"}, {"n": 37, "law": "計費辦法", "stem": "廠商承辦之技術服務為「專案管理」者，其專案管理人員中應有多少比例以上為該廠商之專任職員？", "opts": ["1/3", "1/2", "2/3", "3/4"], "a": 1, "ex": "專案管理人員中應有<span class=\"ans-hl\">1/2<\/span>以上為廠商專任職員。", "mem": "專案管理專任職員＝1/2以上。"}]}, {"topic": "物價指數調整與保險費", "law": "工程採購契約範本", "memo": "<ul>\n      <li>物調採<b>三層級指數機制<\/b>（總指數、中分類項目指數、個別項目指數）；<b>已辦物調之項目不得再以其他指數重複調整<\/b>。<\/li>\n      <li>可歸責於廠商致逾期施作部分，<b>取「施作當月」與「契約履約期限當月」二者較低之指數<\/b>。<\/li>\n      <li><b>承商保險費不予物價調整<\/b>；可列入物調者為鋼筋等主要建材。<\/li>\n      <li>總價結算工程，廠商實付保費<b>低於<\/b>契約所列金額者，機關<b>仍依契約所列金額支付<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 4, "law": "契約範本", "stem": "按主管機關訂定工程採購契約範本之物價指數調整內容，以下何者錯誤？", "opts": ["機關依行政院主計總處發布之總指數、中分類項目指數及個別項目指數，可自行訂定漲跌幅逾一定比率部分，計算物價調整款", "可歸責於廠商原因致逾履約期限施作之部分，以施作當月指數與契約約定履約期限當月指數二者較低者，作為調整依據", "機關招標時未載明中分類項目及個別項目時，不可依中分類項目指數及個別項目指數調整工程款", "契約雙方得就施工時間間隔較久之項目，於訂料前約定，以訂料時或施工前一定月份之指數，計算物價調整款"], "a": 2, "ex": "(1)(2)(4)為正確之物調約定；(3)依官方答案為錯誤敘述。物調指數適用屬細部爭點，記正解(3)，並掌握「已辦物調不得重複調整」「廠商逾期取較低指數」「保險費不予物調」等核心。", "mem": "物調三層級；保險費不調；廠商逾期取較低指數。"}, {"n": 8, "law": "契約範本", "stem": "下列何者適合列入工程採購物價調整之項目？", "opts": ["工程廠商之營業稅", "管理費及利潤", "依河川疏濬砂石採售分離計畫優先提供河川砂石供公共工程施工廠商使用之砂石", "鋼構橋之鋼筋"], "a": 3, "ex": "主要建材如<span class=\"ans-hl\">鋼構橋之鋼筋<\/span>適合列入物調。營業稅、管理費利潤、特定供應砂石不列入。", "mem": "物調對象＝主要建材（如鋼筋）。"}, {"n": 14, "law": "契約範本", "stem": "採總價結算之工程，廠商依契約約定投保，惟實際支付之保險費用低於契約所列該項目之金額，機關應如何處理？", "opts": ["機關應洽廠商追回該部分價差", "機關仍應依契約所列金額支付廠商", "機關應於契約中預先明訂，廠商實際支付金額較契約金額少時，應退還價差予機關，實際支付金額較契約金額多時，機關不予追加等較利於機關之條件", "機關應洽廠商協商支付合理保險費"], "a": 1, "ex": "總價結算之保險費屬契約總價之一部，實付較低<span class=\"ans-hl\">仍依契約所列金額支付<\/span>，(2)正確。", "mem": "總價結算保險費＝照契約金額付。"}, {"n": 16, "law": "契約範本", "stem": "按主管機關訂定工程採購契約範本之物價指數調整約定內容，以下何者錯誤？", "opts": ["給付之物價調整款併於結算總價內", "承商保險費可予調整", "採三層級物調機制，已辦理物調項目，不得再以其他物價指數辦理調整", "可記載不予調整之項目或情形"], "a": 1, "ex": "<span class=\"ans-hl\">承商保險費不予物價調整<\/span>，(2)說「可予調整」錯誤。", "mem": "保險費＝不物調。"}]}, {"topic": "總價結算與契約變更追加", "law": "契約範本・細則第22條", "memo": "<ul>\n      <li>採總價結算：<b>「原契約項目」按契約詳細表數量結算<\/b>（實作減少不減），<b>「設計變更」按變更數量計給<\/b>。<\/li>\n      <li>追加累計金額占原主契約之比率＝<b>「加帳」累計金額 ÷ 原主契約金額<\/b>（不含減帳）。<\/li>\n    <\/ul>", "qs": [{"n": 29, "law": "細則第22條", "stem": "關於採購法施行細則第22條第4項所稱「追加累計金額占原主契約金額之比率」，下列敘述何者正確？", "opts": ["加帳部分之累計金額占原主契約金額之比率", "加帳部分及減帳部分累計後，占原主契約金額之比率", "加帳部分及減帳部分絕對值之累計金額占原主契約金額之比率", "單次追加金額占原主契約金額之比率"], "a": 0, "ex": "追加比率＝<span class=\"ans-hl\">加帳累計金額 ÷ 原主契約金額<\/span>，(1)正確，不與減帳相抵或加總。", "mem": "追加比率＝只算加帳÷原主契約。"}, {"n": 31, "law": "契約範本", "stem": "依主管機關訂定之工程採購契約範本之內容，契約價金採「總價結算」之給付方式辦理，機關提供之設計圖說規定油漆某辦公室內側四面牆壁，契約價格詳細表標示之油漆面積為1,000平方公尺。嗣後機關辦理契約變更增加油漆天花板面積200平方公尺。廠商按圖施作後實際丈量結果牆壁油漆面積為970平方公尺、天花板油漆面積為200平方公尺。機關應給付多少油漆面積之價金？", "opts": ["970平方公尺", "1,170平方公尺", "1,200平方公尺", "以上皆非"], "a": 2, "ex": "總價結算，原項目（牆壁）按詳細表 1,000㎡ 計（實作 970㎡ 不減），天花板屬設計變更按變更量 200㎡ 計，合計 <span class=\"ans-hl\">1,200㎡<\/span>。", "mem": "原項目按詳細表＋變更按變更量。", "trap": "對照第32題（無設計變更，答1,170㎡）；本題『有設計變更(+200)』，答1,200㎡。"}, {"n": 32, "law": "契約範本", "stem": "依主管機關訂定之工程採購契約範本之內容，契約價金採「總價結算」之給付方式辦理，機關提供之設計圖說規定油漆某辦公室內側四面牆壁，契約價格詳細表標示之油漆面積為1,000平方公尺。廠商按圖施作後實際丈量結果油漆面積為1,200平方公尺。機關應給付多少油漆面積之價金？", " hl\">適用<\/span>」評選及計費辦法，(4)用「準用」之用詞與規定不符。屬細部用詞爭點。", "mem": "22-1-9＝適用；公開取得報價才是準用。"}, {"n": 62, "law": "第22條", "stem": "機關依採購法第22條第1項第9款辦理評選技術服務廠商，其投標廠商須有幾家方可開標？", "opts": ["須達3家以上", "須達1家以上", "須達6家以上", "須達4家以上"], "a": 1, "ex": "22-1-9公開評選<span class=\"ans-hl\">1 家以上即可開標<\/span>。", "mem": "公開評選＝1家可開標。"}, {"n": 71, "law": "第22條", "stem": "下列敘述何者為非？", "opts": ["機關公開評選廠商承辦技術服務之審查，其招標文件訂有廠商資格者，應先審查資格文件", "機關評選結果應通知廠商，對未獲選者並應敘明其原因", "機關依採購法第22條第1項第9款辦理評選技術服務廠商，其投標廠商應有3家方可開標", "採購評選委員會評選優勝廠商，得不以1家為限"], "a": 2, "ex": "22-1-9公開評選<span class=\"ans-hl\">1 家即可開標<\/span>，(3)說「應有3家」為非。", "mem": "公開評選不需3家。"}, {"n": 7, "law": "原住民工作權", "stem": "機關辦理履約地點位於原住民地區未達公告金額之技術服務採購，其採公開取得3家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價者，招標機關於第1次公告開放原住民及非原住民廠商投標，並於招標公告敘明開標後依2階段辦理，其下列作業方式何者錯誤？", "opts": ["第1階段先就原住民廠商所投之標進行審標、決標", "第1階段無法決標予原住民廠商，則作成紀錄後，第2階段改就全部投標廠商辦理審標", "第1階段原住民廠商之標價經洽減價仍超底價而不逾預算數額，可經原底價核定人或其授權人核准，直接決標予原住民廠商", "因提供技術服務之原住民廠商極為有限，招標機關為避免單一原住民廠商承接過多案件致影響履約品質，可於招標文件規定投標廠商須提出「具有如期履約能力之證明」"], "a": 2, "ex": "第1階段原住民廠商標價「超底價」即屬第1階段無法決標之情形，應作成紀錄後改就全部廠商辦理（第2階段），<span class=\"ans-hl\">不得逕予決標予原住民廠商<\/span>，(3)錯誤。", "mem": "原住民第1階段超底價→進第2階段，不逕決標。"}]}, {"topic": "押標金、保證金與連帶保證", "law": "押標金保證金辦法", "memo": "<ul>\n      <li>履約保證金以不逾契約金額 <span class=\"keynum\">10%<\/span> 為原則；<b>9,000 萬工程履約保證金可定為契約金額 5%<\/b>。<\/li>\n      <li>提<b>連帶保證廠商<\/b>者，履約保證金<b>減收 ≤ 50%<\/b>；<b>優良廠商<\/b>減收押標金等<b>≤ 原應繳總額 50%<\/b>（<b>不含「預付款扣回款」<\/b>）。<\/li>\n      <li><b>查核金額以上營建工程<\/b>，履約保證金應依工程進度<b>分 4 期以上平均發還<\/b>。<\/li>\n      <li>技術服務採購<b>得<\/b>收押標金、保證金（不是不得收）。<\/li>\n      <li>連帶保證廠商須：<b>依法得為保證、未參與投標、無 103-1 不得參加投標等情形<\/b>（不必經主管機關核准）。<\/li>\n    <\/ul>", "qs": [{"n": 15, "law": "第53條", "stem": "某工程採購之採購金額為新臺幣(下同)6,000萬元，預算為4,950萬元，底價為4,700萬元，經洽廠商減價結果，最低標價為以下情形時，何者敘述正確？", "opts": ["標價為5,000萬元，可報上級機關核准後決標", "標價為4,900萬元，經原底價核定人或其授權人員核准後決標", "標價為4,800萬元，應報上級機關核准後始得決標", "以上皆非"], "a": 3, "ex": "工程查核金額為5,000萬，採購金額6,000萬屬查核金額以上。(1)5,000萬已逾預算4,950萬不得超底價決標；(2)、(3)雖未逾預算且未逾底價8%，但查核金額以上超底價決標須有緊急情事並「報上級機關核准」，(2)誤為原底價核定人核准、(3)敘述不完整，故<span class=\"ans-hl\">以上皆非<\/span>。", "mem": "查核以上超底價→報上級＋緊急情事＋≤8%＋不逾預算。", "trap": "逾預算(4,950萬)就絕對不能超底價決標。"}, {"n": 43, "law": "押保辦法", "stem": "機關辦理公告金額以上採購，於招標文件中規定得標廠商提出連帶保證廠商者，其履約保證金得予減收，試問其減收額度以不逾履約保證金額度之若干比例為限？", "opts": ["5%", "20%", "50%", "100%"], "a": 2, "ex": "提連帶保證廠商者，履約保證金減收<span class=\"ans-hl\">≤ 50%<\/span>。", "mem": "連帶保證＝履約金減收≤50%。"}, {"n": 44, "law": "押保辦法", "stem": "機關辦理工程採購，於招標文件中規定優良廠商得予減收押標金等之減收額度以不逾原定應繳總額之若干比例為限？", "opts": ["5%", "20%", "50%", "100%"], "a": 2, "ex": "優良廠商減收押標金等<span class=\"ans-hl\">≤ 原應繳總額 50%<\/span>。", "mem": "優良廠商減收≤50%。"}, {"n": 45, "law": "押保辦法", "stem": "機關辦理工程採購，得於招標文件規定優良廠商得予減收金額之項目，不包括下列何者？", "opts": ["押標金", "履約保證金", "預付款扣回款", "保固保證金"], "a": 2, "ex": "優良廠商減收項目含押標金、履約保證金、保固保證金，<span class=\"ans-hl\">不含「預付款扣回款」<\/span>。", "mem": "優良減收不含預付款扣回款。"}, {"n": 55, "law": "押保辦法", "stem": "機關辦理採購金額新臺幣9,000萬元之工程採購，下列何者正確？", "opts": ["規定廠商須於得標後10天內繳納履約保證金", "規定履約保證金依進度分2期平均發還", "規定廠商必須提出連帶保證廠商", "規定履約保證金為契約金額之5%"], "a": 3, "ex": "履約保證金以契約金額10%為原則，得視個案酌減，<span class=\"ans-hl\">定為5%並無不可<\/span>，(4)正確。繳納期限應給合理期間、查核以上分4期以上發還、不得強制提連帶保證廠商。", "mem": "履約保證金＝5%可以（≤10%原則）。"}, {"n": 57, "law": "押保辦法", "stem": "下列何者不是廠商得作為連帶保證廠商之規定？", "opts": ["依法得為保證", "未參與投標", "無採購法第103條第1項不得參加投標或作為決標對象或分包廠商之情形者", "經主管機關核准"], "a": 3, "ex": "連帶保證廠商須依法得保證、未參與投標、無103-1情形，<span class=\"ans-hl\">不必經主管機關核准<\/span>，(4)非其規定。", "mem": "連帶保證＝得保證＋未投標＋無103-1（免核准）。"}, {"n": 59, "law": "押保辦法", "stem": "有關押標金保證金規定，下列敘述何者錯誤？", "opts": ["技術服務採購，招標文件不得明訂收押標金及保證金", "廠商以郵政匯票繳納押標金，並無不可", "以議價方式辦理之工程採購，招標文件明定免收押標金，並無不可", "機關不發還得標廠商所繳納之保證金時，其孳息亦不發還之"], "a": 0, "ex": "技術服務採購<span class=\"ans-hl\">得<\/span>收押標金及保證金，(1)說「不得明訂收」錯誤。", "mem": "技術服務＝得收押標金保證金。"}, {"n": 65, "law": "契約範本", "stem": "依主管機關訂定工程採購契約範本之內容，機關辦理若干金額以上之營建工程，履約保證金應依工程進度分4期以上平均發還？", "opts": ["公告金額", "查核金額", "巨額", "無論金額大小均須有"], "a": 1, "ex": "<span class=\"ans-hl\">查核金額<\/span>以上之營建工程，履約保證金應分4期以上平均發還。", "mem": "查核以上營建＝履約金分4期以上發還。"}, {"n": 67, "law": "押保辦法", "stem": "下列有關技術服務採購之敘述，何者錯誤？", "opts": ["不得規定收押標金及保證金", "得允許共同投標", "共通性之需求得簽訂共同供應契約", "得允許外國廠商參與投標"], "a": 0, "ex": "技術服務採購<span class=\"ans-hl\">得<\/span>收押標金及保證金，(1)說「不得規定收」錯誤。", "mem": "技術服務可收押標金保證金（與第59題同）。"}]}, {"topic": "廠商資格、特殊採購與公開閱覽", "law": "第36條・認定標準", "memo": "<ul>\n      <li>是否屬「特殊採購」依<b>「投標廠商資格與特殊或巨額採購認定標準」第 6 條各款<\/b>判斷（非自行判斷）；<b>「工期緊迫經核定」非特殊採購<\/b>。<\/li>\n      <li>室內隔間設計服務之廠商資格＝<b>建築師事務所或室內裝修業<\/b>。<\/li>\n      <li>共同投標家數以<b>不超過 5 家<\/b>為原則。<\/li>\n      <li>未採網路電子化之招標文件公開閱覽，<b>不得少於 5 日<\/b>。<\/li>\n      <li>查核金額以上工程公告招標前應公開閱覽；但依特定條款（22-1-3、105-1-1/2）、縮短或合理訂定等標期、重複性採購等<b>不在此限（以上皆是）<\/b>。<\/li>\n      <li>投標廠商「特定資格」：<b>相當經驗實績、實收資本額、現有專業／一般人力證明、政府核發之專業技術證明<\/b>等。<\/li>\n    <\/ul>", "qs": [{"n": 21, "law": "認定標準", "stem": "委託辦理室內隔間設計服務，其最適宜訂定之廠商資格得為何？", "opts": ["建築師事務所或室內裝修業", "營造業或室內裝修業", "景觀、室內設計業或室內裝修業", "以上皆是"], "a": 0, "ex": "室內隔間設計宜訂<span class=\"ans-hl\">建築師事務所或室內裝修業<\/span>為資格，(1)正確。", "mem": "室內隔間設計＝建築師事務所或室內裝修業。"}, {"n": 56, "law": "第36條", "stem": "下列何者非為採購法第36條所稱之特殊採購？", "opts": ["開挖深度在15公尺以上之工程", "在地面下施工之工程", "古蹟構造物之修建", "工期緊迫且經機關首長核定之工程"], "a": 3, "ex": "「<span class=\"ans-hl\">工期緊迫且經核定<\/span>」非特殊採購之認定情形，(4)為答案。其餘皆屬特殊工程。", "mem": "工期緊迫≠特殊採購。"}, {"n": 63, "law": "共同投標辦法", "stem": "機關於招標文件中規定允許一定家數內之廠商共同投標者，採購法規定以不超過幾家為原則？", "opts": ["5家", "3家", "6家", "無家數規定，係由機關決定"], "a": 0, "ex": "共同投標以<span class=\"ans-hl\">不超過 5 家<\/span>為原則。", "mem": "共同投標≤5家。"}, {"n": 64, "law": "認定標準", "stem": "機關應如何判斷工程採購是否屬特殊採購，下列何者正確？", "opts": ["報經上級機關核准", "視其是否屬「投標廠商資格與特殊或巨額採購認定標準」第6條各款情形之一", "依工程慣例及普遍性自行判斷", "依工程困難程度自行判斷"], "a": 1, "ex": "特殊採購之判斷依<span class=\"ans-hl\">認定標準第6條各款<\/span>，(2)正確，非自行判斷或報上級。", "mem": "特殊採購＝看認定標準第6條。"}, {"n": 68, "law": "認定標準", "stem": "下列何者係屬投標廠商之特定資格？", "opts": ["具有相當經驗或實績者", "實收資本額之規定", "投標廠商現有與承包招標標的有關之專業或一般人力證明", "以上皆是"], "a": 3, "ex": "相當經驗實績、實收資本額、現有專業／一般人力證明<span class=\"ans-hl\">皆屬特定資格<\/span>。", "mem": "特定資格＝經驗實績／資本額／人力證明。"}, {"n": 30, "law": "招標期限標準", "stem": "機關辦理查核金額以上之工程採購，應於公告招標前辦理招標文件之公開閱覽。但下列何種情形，不在此限？", "opts": ["依採購法第22條第1項第3款或第105條第1項第1款、第2款辦理之採購", "依招標期限標準第4條之1或第10條縮短或合理訂定等標期之採購", "重複性採購", "以上皆是"], "a": 3, "ex": "上列情形<span class=\"ans-hl\">均得免公開閱覽（以上皆是）<\/span>。", "mem": "特定條款／縮短等標期／重複性＝免公開閱覽。"}, {"n": 42, "law": "招標期限標準", "stem": "機關辦理招標文件公開閱覽，未採網路電子化閱覽者，應於上班時間內為之，並不得少於幾日？", "opts": ["5日", "7日", "10日", "14日"], "a": 0, "ex": "未電子化之公開閱覽<span class=\"ans-hl\">不得少於 5 日<\/span>。", "mem": "公開閱覽≥5日。"}, {"n": 51, "law": "招標期限標準", "stem": "機關辦理下列何種採購，於公告招標前無須辦理招標文件之公開閱覽？", "opts": ["未達查核金額之特殊工程採購", "查核金額以上重複性之工程採購", "適用政府採購條約或協定之巨額工程採購", "以上皆是"], "a": 3, "ex": "未達查核金額、重複性、條約協定等情形<span class=\"ans-hl\">均無須公開閱覽（以上皆是）<\/span>。", "mem": "未達查核／重複性／條約＝免公開閱覽。"}]}, {"topic": "驗收、逾期違約金與保固", "law": "第71・72條", "memo": "<ul>\n      <li>以「工作天」計之工程，<b>驗收後改善逾期之計算「不扣假日」<\/b>；<b>提前完工不抵改善逾期<\/b>。<\/li>\n      <li>部分先行驗收者，<b>該部分日後不必再辦驗收<\/b>；得就該部分支付價金、起算保固。<\/li>\n      <li>保固期內「瑕疵」通常<b>不含「保養」<\/b>（含損裂、坍塌、漏水）。<\/li>\n      <li>15 萬之設計服務採購得<b>逕洽廠商、免提供報價或企劃書<\/b>。<\/li>\n      <li>保固瑕疵逾期不改正之措施：逕為處理／動用保固保證金／依 101 條通知；<b>「終止契約」最不適當<\/b>。<\/li>\n      <li>技術服務之驗收<b>得以召開審查會方式<\/b>辦理。<\/li>\n    <\/ul>", "qs": [{"n": 22, "law": "第72條", "stem": "某工程係限期完工，驗收時發現不符合契約約定而通知廠商限期改善，廠商逾期未改善，其中有2天因颱風不上班不上課，於計算逾期違約金時，除契約另有特別約定外，該颱風日如何處理為是？", "opts": ["廠商可要求減免", "逾契約原訂期限者，仍應核計逾期違約金", "履約期限以工作天計者免計", "未逾契約原訂期限之部分免計"], "a": 1, "ex": "已逾契約原訂期限後之改善遲延，<span class=\"ans-hl\">仍應核計逾期違約金<\/span>（颱風日不予扣除），(2)正確。", "mem": "逾原訂期限後＝照計違約金（含颱風日）。"}, {"n": 46, "law": "契約範本", "stem": "保固期內發現瑕疵者，由機關通知廠商改正。一般工程所稱上述瑕疵，通常不包括下列何項目？", "opts": ["損裂", "保養", "坍塌", "漏水"], "a": 1, "ex": "保固瑕疵指損裂、坍塌、漏水等，<span class=\"ans-hl\">不含「保養」<\/span>，(2)為答案。", "mem": "保固瑕疵不含保養。"}, {"n": 47, "law": "第22條", "stem": "以下若干新臺幣（下同）金額之政府採購，得不經公告程序，逕洽廠商採購，免提供報價或企劃書？", "opts": ["60萬元之工程採購", "15萬元之設計服務採購", "30萬元之監造服務採購", "以上皆非"], "a": 1, "ex": "金額在公告金額1/10（15萬）以下者得逕洽免報價，<span class=\"ans-hl\">15萬之設計服務<\/span>符合，(2)正確。", "mem": "≤15萬＝逕洽免報價。"}, {"n": 48, "law": "第72條", "stem": "契約以工作天計算之工程，廠商提前9日完工，機關於履約期限最末日辦理驗收，經驗收有瑕疵，機關要求廠商於驗收次日起5日內改善完成，無任何不可抗力因素，廠商逾機關規定改善期限4天（中間包含2天國定假日）方改善完成，並經複驗合格，下列敘述何者正確？", "opts": ["提前完工日數大於逾期改善日數，故未有逾期情況", "改善完成日已逾履約期限，逾期日數2日", "改善完成日已逾履約期限，逾期日數9日", "改善完成日已逾履約期限，逾期日數4日"], "a": 3, "ex": "驗收改善逾期按日曆天計、國定假日照計，且<span class=\"ans-hl\">提前完工不抵改善逾期<\/span>，逾期 4 日，(4)正確。", "mem": "改善逾期不扣假日、提前完工不抵。", "trap": "想扣2天假日得2日是陷阱；改善逾期不扣假日，是4日。"}, {"n": 50, "law": "第71條", "stem": "機關辦理工程採購，有部分先行使用之必要或已履約之部分有減損滅失之虞者，下列處理方式何者錯誤？", "opts": ["就該部分辦理驗收", "就該部分先辦理驗收者，未來仍應針對該部分再辦理驗收", "就該部分辦理分段查驗供未來驗收之用", "不論就該部分辦理驗收或分段查驗供驗收之用，均得就該部分支付價金及起算保固期間"], "a": 1, "ex": "該部分已先行驗收者，<span class=\"ans-hl\">日後不必再辦驗收<\/span>，(2)說「未來仍應再驗收」錯誤。", "mem": "先驗收的部分＝不必再驗。"}, {"n": 66, "law": "契約範本", "stem": "保固期內發現瑕疵，應由廠商於機關指定之期限內負責免費無條件改正。逾期不為改正者，按主管機關訂定工程採購契約範本之內容，機關採行下列措施，何者最不適當？", "opts": ["逕為處理，所需費用由廠商負擔", "動用保固保證金逕為處理，不足時，向廠商追償", "依採購法第101條規定通知廠商", "終止契約"], "a": 3, "ex": "保固期工程已完工驗收，瑕疵應以逕為處理或動用保固金處理，<span class=\"ans-hl\">「終止契約」最不適當<\/span>，(4)為答案。", "mem": "保固瑕疵→逕為處理／動保固金，非終止契約。"}, {"n": 69, "law": "第72條", "stem": "有關技術服務採購之驗收規定，下列何者正確？", "opts": ["不得辦理分段查驗供驗收之用", "不得以書面審查方式", "得以召開審查會方式", "設計成果之驗收，於施工標驗收時方得一併辦理"], "a": 2, "ex": "技術服務驗收<span class=\"ans-hl\">得以召開審查會方式<\/span>辦理，(3)正確。得分段查驗、得書面審查、設計成果可單獨驗收。", "mem": "技術服務驗收＝可開審查會。"}]}]}, {"id": "ch4", "num": "肆", "chapter": "財物及勞務採購作業", "meta": "全 142 題 · 招標決標／資格／計費／共同供應契約／105條", "groups": [{"topic": "採購之定義、適用範圍與性質認定", "law": "第2・7條", "memo": "<ul>\n      <li>性質認定：<b>保險、維護、印製、營運管理＝勞務<\/b>；<b>承租房地產＝財物（租賃）<\/b>；<b>軟體「使用權利」＝財物<\/b>（非勞務）。<\/li>\n      <li>採購＝「取得」工程、財物或勞務；<b>變賣呆料／財物「不是」採購法所稱之採購<\/b>。<\/li>\n      <li><b>自然人得為簽約對象<\/b>；<b>公營事業之採購適用採購法<\/b>。<\/li>\n      <li>委託維護由廠商先墊資、機關逐年支應且<b>廠商未負盈虧者，屬第 2 條採購，適用採購法<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 54, "law": "第7條", "stem": "營建機具綜合保險之採購性質係屬？", "opts": ["勞務採購", "財物採購", "工程採購", "兼有工程、財物採購之性質"], "a": 0, "ex": "保險屬<span class=\"ans-hl\">勞務採購<\/span>。", "mem": "保險＝勞務採購。"}, {"n": 57, "law": "第7條", "stem": "機關承租辦公廳舍，係屬於何種採購？", "opts": ["委任之勞務採購", "租賃之勞務採購", "委任之財物採購", "租賃之財物採購"], "a": 3, "ex": "承租房地產屬<span class=\"ans-hl\">租賃之財物採購<\/span>。", "mem": "承租房地產＝財物採購（租賃）。"}, {"n": 58, "law": "第7條", "stem": "下列何者非屬勞務採購？", "opts": ["印製機關之年刊", "辦理公務車輛保險", "採購軟體之使用權利", "辦理公有財產之營運管理"], "a": 2, "ex": "軟體之「使用權利」屬<span class=\"ans-hl\">財物採購<\/span>，非勞務，(3)為答案。印製、保險、營運管理皆為勞務。", "mem": "軟體使用權＝財物（非勞務）。"}, {"n": 82, "law": "第2條", "stem": "下列何者錯誤？", "opts": ["機關辦理採購，應以維護公共利益及公平合理為原則", "採購人員得基於公共利益、採購效益或專業判斷之考量，為適當之採購決定。但僅限於不違反採購法規定之範圍內", "公營事業之採購適用採購法", "自然人不得為簽約對象"], "a": 3, "ex": "<span class=\"ans-hl\">自然人得為簽約對象<\/span>，(4)說「不得」錯誤。", "mem": "自然人＝可簽約。"}, {"n": 84, "law": "第2條", "stem": "下列何者非採購法所稱採購？", "opts": ["影印機之租用", "呆料之變賣", "權利之買受", "契約工之僱傭"], "a": 1, "ex": "採購是「取得」，<span class=\"ans-hl\">呆料之變賣（賣出）非採購法所稱採購<\/span>，(2)為答案。", "mem": "變賣＝賣出，不是採購。"}, {"n": 121, "law": "第2條", "stem": "下列何種情形適用政府採購法？", "opts": ["農會以自有財源辦理勞務採購", "機關辦理冷凍肉品採購", "國立台灣大學向其實驗林管理處茶園採購茶葉", "以上皆非"], "a": 1, "ex": "機關辦理<span class=\"ans-hl\">冷凍肉品採購<\/span>適用採購法，(2)正確。農會自有財源、向所屬單位採購非屬之。", "mem": "機關買財物（冷凍肉品）＝適用。"}, {"n": 134, "law": "第2條", "stem": "機關委託廠商辦理節能路燈換裝暨維護，由廠商先行自籌資金汰換為節能燈具並負責維護，惟其費用將由機關逐年支應，廠商未負擔盈虧，下列何者為是？", "opts": ["屬採購法第99條之態樣，其甄選投資廠商之程序，適用採購", "屬採購法第2條所稱採購，適用採購法", "適用促進民間參與公共建設法", "由機關就採購法或促進民間參與公共建設法擇一辦理"], "a": 1, "ex": "費用由機關逐年支應、廠商未負盈虧，屬<span class=\"ans-hl\">第 2 條採購，適用採購法<\/span>，(2)正確（非民間參與BOT）。", "mem": "機關買單、廠商不負盈虧＝採購法。"}, {"n": 16, "law": "第7條", "stem": "有關公營事業徵求經銷商之行為，下列何者為非？", "opts": ["有償委任之委託經銷契約，具一定事務之委託處理，且約定其對價者，應適用採購法", "如以賣斷方式銷售予經銷商，由經銷商自負盈虧，而不具有償委任之約定條款者，無採購法之適用", "如契約載明經銷價格、經銷範圍或獨家經銷權之授與、責任購貨額、銷售獎勵金等，未具有償委任性質者，無採購法之適用", "如係勞務採購性質者，非屬採購法第22條第1項第15款所定「提供服務以供轉售目的所為之採購」"], "a": 3, "ex": "提供服務以供轉售目的之採購屬22-1-15得限制性招標之態樣，(4)以「非屬」之說法<span class=\"ans-hl\">為非<\/span>。", "mem": "轉售目的勞務＝可屬22-1-15。"}]}, {"topic": "上級機關、監辦與核准權責", "law": "第12・13條", "memo": "<ul>\n      <li><b>上級機關＝辦理採購機關「直屬之上一級機關」<\/b>。<\/li>\n      <li><b>查核金額以上<\/b>（工程／財物 5,000 萬、勞務 1,000 萬）之<b>開標、比價、議價、決標、驗收<\/b>應報上級機關派員監辦。<\/li>\n      <li>監辦範疇＝<b>程序事項<\/b>（如是否依規定報經上級核准）；<b>不含<\/b>規格審查、商業條款審查、底價訂定審查。<\/li>\n      <li><b>「估驗」非法定監辦事項<\/b>（開標、驗收、議價、比價才是）。<\/li>\n      <li><b>承辦人員不得為同案監辦人員<\/b>；<b>第二次流標得不受 3 家限制，未明定須報核准<\/b>。<\/li>\n 性招標之採購，應有3家以上合格廠商投標，始得開標", "未達公告金額之公開招標，第1次招標之等標期(未提供電子領投標及辦理公開閱覽)，應至少為5日"], "a": 0, "ex": "第1次未滿3家流標者，<span class=\"ans-hl\">第2次得縮短等標期且不受3家限制<\/span>，(1)正確。個案選擇性1家即可開標。", "mem": "第2次招標＝縮等標期、免3家。"}, {"n": 110, "law": "第48條", "stem": "依採購法第48條第1項規定，公開招標之第1次開標須達幾家合格廠商投標始可開標？", "opts": ["3家", "2家", "1家", "6家"], "a": 0, "ex": "公開招標第1次開標須<span class=\"ans-hl\">3 家<\/span>合格廠商。", "mem": "48條第1次＝3家。"}, {"n": 130, "law": "第48條", "stem": "下列招標方式之開標，何者無廠商家數之限制？", "opts": ["第1次公開招標", "選擇性招標建立經常性採購合格廠商名單", "公開取得書面報價或企劃書", "限制性招標經公開評選"], "a": 3, "ex": "<span class=\"ans-hl\">限制性招標經公開評選<\/span>開標無家數限制，(4)正確。", "mem": "公開評選＝開標無家數限制。"}]}, {"topic": "等標期、開標時間與開標程序", "law": "第45條・招標期限標準", "memo": "<ul>\n      <li>未達公告金額之公開取得書面報價／企劃書：第 1 次等標期<b>有電子領投標者 ≥ 5 日<\/b>；建立合格名單之資格審查（無公開閱覽及電子領投標）<b>≥ 10 日<\/b>。<\/li>\n      <li>公開招標不分段開標之開標時間＝<b>等標期屆滿當日或次一上班日<\/b>；<b>不得<\/b>定為「送樣審查合格後」。<\/li>\n      <li>採 1 次投標分段開標者，<b>各段文件分別密封<\/b>；<b>未通過前一階段者不得參加後續階段<\/b>。<\/li>\n      <li>機關得規定投標廠商出席開標<b>人數不逾 2 人<\/b>；<b>不得強制負責人親自出席<\/b>。<\/li>\n      <li>開標應宣布廠商名稱／家數、標價等；<b>不宣布「出席代表姓名」<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 12, "law": "第49條", "stem": "機關辦理未達公告金額之採購，以公開取得3家以上廠商之書面報價或企劃書方式辦理者，下列何者正確？", "opts": ["第1次公告未能取得3家以上廠商之書面報價或企劃書時，仍得逕行比價或議價", "第1次公告結果未能取得3家以上廠商之書面報價或企劃書者，得經機關首長或其授權人員核准，改採限制性招標", "應成立採購評選委員會", "等標期均不得少於10日"], "a": 1, "ex": "第1次未取得3家者，<span class=\"ans-hl\">得經核准改採限制性招標<\/span>，(2)正確。", "mem": "取不到3家＝核准後改限制性。"}, {"n": 17, "law": "第42條", "stem": "機關依採購法第42條分段開標，下列敘述何者錯誤？", "opts": ["僅就資格投標者，以選擇性招標為限", "辦理1次投標分段開標，其已投標未開標之部分，不得發還", "未通過前一階段審標之投標廠商，不得參加後續階段之投標", "採1次投標分段開標者，廠商應將各段開標用之投標文件分別密封"], "a": 1, "ex": "未通過前段審標者，其尚未開標之部分標封<span class=\"ans-hl\">應予發還<\/span>，(2)說「不得發還」錯誤。", "mem": "未通過前段＝未開標部分發還。"}, {"n": 23, "law": "第49條", "stem": "機關辦理經常性採購，依採購法第49條規定採公開徵求廠商提供書面報價或企劃書方式辦理者，第1次公告應取得幾家以上廠商之書面報價或企劃書？", "opts": ["1家", "2家", "3家", "6家"], "a": 2, "ex": "第1次公告應取得<span class=\"ans-hl\">3 家<\/span>以上書面報價／企劃書。", "mem": "49條公開徵求＝3家。"}, {"n": 29, "law": "細則", "stem": "機關辦理採購，下列敘述何者錯誤？", "opts":
