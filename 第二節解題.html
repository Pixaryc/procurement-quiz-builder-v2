mem": "開標不報出席代表姓名。"}]}, {"topic": "決標原則：超底價、比減、標價相同、偏低", "law": "第52-54・58條", "memo": "<ul>\n      <li>比減價格<b>不得逾 3 次<\/b>（不含洽最低標減價 1 次）；招標文件得規定更少次數。<\/li>\n      <li>減價／比減結果在底價以內者，<b>除 58 條偏低情形外應即宣布決標<\/b>。<\/li>\n      <li>最低標標價相同且均得決標、<b>比減已達 3 次限制者「逕行抽籤」<\/b>（不再比減）。<\/li>\n      <li>標價偏低：先<b>審查是否顯不合理、有降低品質或不能誠信履約之虞<\/b>；得通知<b>繳納差額保證金<\/b>（＝底價 80%−標價，或預算 80%−標價）。<\/li>\n      <li>外幣標價以<b>決標前一辦公日臺灣銀行「即期賣出匯率」<\/b>折算；底價得<b>委由代辦機關訂定<\/b>；重複性採購底價得<b>逕行簽報核定<\/b>。<\/li>\n      <li>50-1 情形於決標後發現：撤銷決標／終止解除契約；<b>反不符公益並經「上級機關」核准者得繼續履約<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 1, "law": "第53條", "stem": "機關辦理採購，投標廠商之標價超過底價時，下列何者正確？", "opts": ["僅得洽該最低標廠商減價1次", "比減價格之次數為不得逾3次，不包括洽最低標減價1次", "比減價格之次數為不得逾2次，包括洽最低標減價1次", "應宣布廢標"], "a": 1, "ex": "比減<span class=\"ans-hl\">不得逾 3 次，且不含洽最低標減價 1 次<\/span>，(2)正確。", "mem": "比減≤3次＋洽減1次。"}, {"n": 10, "law": "第53條", "stem": "廠商得書寫「願照底價承製」之情形，下列何者錯誤？", "opts": ["合於招標文件規定之最低標廠商標價超過底價", "採最低標決標", "廠商於開標後減價或比減價格時", "屬優先減價廠商之權利"], "a": 3, "ex": "願照底價承製為減價方式之一，<span class=\"ans-hl\">並非「優先減價廠商之權利」<\/span>，(4)錯誤。", "mem": "照底價承製≠優先權。"}, {"n": 49, "law": "第52條", "stem": "下列何者正確？", "opts": ["最有利標決標者，得不訂底價", "機關辦理減價或比減價格結果在底價以內時，無條件應即宣布決標", "機關辦理減價或比減價格結果在底價以內時，除有58條總標價或部分標價偏低之情形者外，應即宣布決標", "訂有底價之採購一律不得不訂底價"], "a": 2, "ex": "在底價以內者，<span class=\"ans-hl\">除 58 條偏低情形外應即宣布決標<\/span>，(3)正確（非無條件）。", "mem": "底價內＋無偏低＝即決標。"}, {"n": 50, "law": "細則", "stem": "投標廠商之標價幣別為外幣者，應以下列何種匯率折算？", "opts": ["決標日台灣銀行外匯交易收盤之即期買入匯率", "決標日台灣銀行外匯交易收盤之即期賣出匯率", "決標前一辦公日台灣銀行外匯交易收盤之即期賣出匯率", "決標前一辦公日台灣銀行外匯交易收盤之即期買入匯率"], "a": 2, "ex": "外幣標價以<span class=\"ans-hl\">決標前一辦公日臺灣銀行收盤「即期賣出匯率」<\/span>折算，(3)正確。", "mem": "外幣＝決標前一辦公日即期賣出。"}, {"n": 75, "law": "第46條", "stem": "機關辦理採購，下列何者正確？", "opts": ["底價於開標後決標前訂定", "底價一律不得低於預算金額", "底價於議價或比減價格後訂定", "底價得委由代辦採購機關訂定"], "a": 3, "ex": "<span class=\"ans-hl\">底價得委由代辦採購機關訂定<\/span>，(4)正確。底價於開標前訂定（議價於議價前）。", "mem": "底價＝可委代辦機關訂。"}, {"n": 88, "law": "第58條", "stem": "機關採最低標決標時，如認為最低標廠商之總標價或部分標價偏低，顯不合理，有降低品質、不能誠信履約之虞或其他特殊情形，下列何者為最優先之處理方式？", "opts": ["逕行廢標", "審查其是 o": "<ul>\n      <li>得<b>依不同數量報價、依標價及可決標數量依序決標<\/b>，並得有<b>不同之決標價<\/b>。<\/li>\n      <li>不同性質、可分別使用且屬不同行業供應之數項財物 → <b>允許分項報價及分項複數決標<\/b>。<\/li>\n      <li>採購金額認定：<b>標的「不同」者依個別項目預算金額；標的相同而數量不能預估者以單價計<\/b>（標的不同不得以「單價和」計）。<\/li>\n      <li>押標金<b>得依投標之項目或數量分別繳納<\/b>；無「備取」之設計。<\/li>\n    <\/ul>", "qs": [{"n": 9, "law": "第52條", "stem": "機關辦理分項複數決標，下列敘述何者錯誤？", "opts": ["開標結果無廠商投標之項目，如符合採購法第22條第1項第1款適用情形者，得由招標機關簽報機關首長或其授權人員核准後採限制性招標", "依標價及可決標之數量依序決標，得允許相同項目有不同之決標價", "機關得於招標文件中規定各項目得標廠商正取及備取之家數上限", "廠商得依其參與投標之項目或數量分別繳納押標金"], "a": 2, "ex": "複數決標依標價依序決標，<span class=\"ans-hl\">並無「備取」之設計<\/span>，(3)錯誤。", "mem": "複數決標無備取。"}, {"n": 37, "law": "第52條", "stem": "機關辦理分項複數決標，下列敘述何者錯誤？", "opts": ["得允許不同項目由不同廠商得標", "底價得依項目分別訂定", "押標金應依招標文件規定之全部項目計算繳納", "得允許相同項目有不同之決標價"], "a": 2, "ex": "押標金<span class=\"ans-hl\">得依投標之項目或數量分別繳納<\/span>，(3)說「應依全部項目計算」錯誤。", "mem": "押標金＝可分項繳納。"}, {"n": 70, "law": "第52條", "stem": "機關以數量為組合之複數決標，下列敘述何者錯誤？", "opts": ["得允許廠商依不同數量報價", "依標價及可決標之數量依序決標", "依不同數量報價者，決標價應相同", "底價得依數量分別訂定"], "a": 2, "ex": "依不同數量報價者，<span class=\"ans-hl\">決標價得不相同<\/span>，(3)說「應相同」錯誤。", "mem": "不同數量＝可不同決標價。"}, {"n": 100, "law": "第52條", "stem": "機關辦理財物採購，採購標的為不同性質之數項財物，各項目得分別使用且屬不同行業廠商供應者，應如何辦理？", "opts": ["合併為單一項目招標", "允許分項報價及分項複數決標", "僅得擇一項目辦理", "以總價最低者通包決標"], "a": 1, "ex": "不同性質、可分別使用且屬不同行業者，<span class=\"ans-hl\">允許分項報價及分項複數決標<\/span>，(2)正確。", "mem": "性質不同可分用＝分項複數決標。"}, {"n": 104, "law": "細則第6條", "stem": "機關辦理複數決標方式之採購，下列敘述何者不符採購法規定？", "opts": ["訂有底價之採購，其底價依項目或數量分別訂定", "得依不同數量報價者，依標價及可決標之數量依序決標，並得有不同之決標價", "分項標的不同，決標數量無法精確預估者，得以單價和計算", "項目之標的不同者，得依個別項目之預算金額認定採購金額"], "a": 2, "ex": "標的「不同」者應依個別項目預算金額認定（見選項4），<span class=\"ans-hl\">(3)以「單價和」計算不符<\/span>（單價計用於標的相同而數量不確定）。", "mem": "標的不同＝依個別預算（非單價和）。"}]}, {"topic": "押標金、保證金與差額保證金", "law": "押標金保證金辦法", "memo": "<ul>\n      <li>押標金以不逾廠商標價 <span class=\"keynum\">5%<\/span>；履約保證金以不逾契約金額 <span class=\"keynum\">10%<\/span>；保固保證金以不逾契約金額 <span class=\"keynum\">3%<\/span> 為原則。<\/li>\n      <li><b>差額保證金＝底價 80%（或預算 80%）− 廠商標價<\/b>（標價偏低時繳納）。<\/li>\n      <li>押標金繳納方式：現金、金融機構本票／支票／保付支票、郵政匯票、無記名政府公債、設定質權之金融機構定存單、銀行開發或保兌之不可撤銷擔保信用狀、銀行書面連帶保證、保險公司連帶保證保險單；<b>「金融機構之書面連帶保證」非押標金之繳納方式<\/b>（那是保證金）。<\/li>\n      <li>未達公告金額之財物採購，<b>押標金及保證金均「得」免收<\/b>；機關<b>不發還<\/b>得標廠商保證金時，<b>其孳息亦不發還<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 11, "law": "押保辦法", "stem": "有關保證金之規定，下列何者正確？", "opts": ["履約保證金得以銀行開發或保兌之不可撤銷擔保信用狀繳納", "保固保證金得以設定質權之金融機構定期存款單繳納", "得以銀行之書面連帶保證繳納", "以上皆是"], "a": 3, "ex": "擔保信用狀、設定質權定存單、銀行書面連帶保證皆得繳納保證金，<span class=\"ans-hl\">以上皆是<\/span>。", "mem": "保證金繳納方式很多元。"}, {"n": 13, "law": "押保辦法", "stem": "保固保證金以不逾契約金額或預算金額之百分之多少為原則？", "opts": ["百分之一", "百分之五", "百分之十", "百分之三"], "a": 3, "ex": "保固保證金以不逾<span class=\"ans-hl\">3%<\/span>為原則。", "mem": "保固保證金＝3%。"}, {"n": 38, "law": "押保辦法", "stem": "下列何者非押標金繳納之種類？", "opts": ["金融機構之書面連帶保證", "現金", "金融機構簽發之本票或支票", "設定質權之金融機構定期存款單"], "a": 0, "ex": "「金融機構之書面連帶保證」是<span class=\"ans-hl\">保證金<\/span>之繳納方式，非押標金，(1)為答案。", "mem": "書面連帶保證＝保證金（非押標金）。"}, {"n": 51, "law": "押保辦法", "stem": "履約保證金以不逾契約金額或預算金額之百分之多少為原則？", "opts": ["百分之五", "百分之十", "百分之二十", "百分之三"], "a": 1, "ex": "履約保證金以不逾<span class=\"ans-hl\">10%<\/span>為原則。", "mem": "履約保證金＝10%。"}, {"n": 52, "law": "押保辦法", "stem": "押標金額度，以不逾廠商標價或預算金額之百分之多少為原則？", "opts": ["百分之三", "百分之五", "百分之十", "百分之二十"], "a": 1, "ex": "押標金以不逾標價／預算<span class=\"ans-hl\">5%<\/span>為原則。", "mem": "押標金＝5%。"}, {"n": 61, "law": "押保辦法", "stem": "機關辦理財物採購，訂有底價700萬元，最低標廠商之總標價為540萬元，機關認其標價偏低，得通知該廠商於決標前繳納差額保證金，其差額保證金之額度為多少？", "opts": ["54萬元", "70萬元", "16萬元", "20萬元"], "a": 3, "ex": "差額保證金＝底價 80%−標價＝700×80%−540＝560−540＝<span class=\"ans-hl\">20 萬<\/span>，(4)正確。", "mem": "差額保證金＝底價80%−標價。"}, {"n": 69, "law": "押保辦法", "stem": "機關辦理未達公告金額之財物採購，下列關於押標金及保證金之敘述，何者正確？", "opts": ["押標金不得免收", "保證金不得免收", "押標金及保證金均得免收", "僅履約保證金得免收"], "a": 2, "ex": "未達公告金額之財物採購，<span class=\"ans-hl\">押標金及保證金均得免收<\/span>，(3)正確。", "mem": "未達公告財物＝押標金保證金可免。"}, {"n": 80, "law": "押保辦法", "stem": "有關押標金及保證金之規定，下列何者錯誤？", "opts": ["得標廠商不履約者，其押標金得不發還", "廠商以現金繳納押標金者，得以即期支票或匯票為之", "保證金以現金繳納並有孳息者，於發還時併同發還", "機關不發還得標廠商所繳納之保證金時，其孳息應發還之"], "a": 3, "ex": "機關不發還保證金時，<span class=\"ans-hl\">孳息亦不發還<\/span>，(4)說「孳息應發還」錯誤。", "mem": "保證金不還＝孳息也不還。"}]}, {"topic": "投標廠商資格、審標與規格、預算公開", "law": "第36・37條・認定標準", "memo": "<ul>\n      <li><b>基本資格<\/b>：登記或設立證明、納稅證明、加入工會／公會、信用證明等；<b>「相當財力之證明」屬「特定資格」<\/b>（非基本資格）。<\/li>\n      <li><b>特定資格<\/b>：相當經驗實績、實收資本額、現有專業／一般人力、財力證明、品質管制能力等；得訂特定資格之情形＝<b>巨額採購<\/b>或<b>特殊／需特殊專業技術人才<\/b>。<\/li>\n      <li>特定資格之上限：實收資本額／權益額度<b>≤ 預算金額 1/10<\/b>；出具權益證明之最低額度<b>≤ 預算金額 1/12<\/b>；經驗實績單次契約金額<b>≤ 預算金額 2/5<\/b>。<\/li>\n      <li>資格證明<b>以影本為原則<\/b>，機關得通知提出正本查驗；<b>不得僅因影本尺寸與正本不一致或封裝方式而拒絕<\/b>。<\/li>\n      <li>審查結果應通知廠商，<b>不合格者應敘明原因<\/b>；未達公告金額之工程採購得<b>免於招標文件公開預算金額<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 8, "law": "第36條", "stem": "機關訂定投標廠商之資格，下列何者應於招標文件預為載明？", "opts": ["投標廠商應符合資格之一部分，得由分包廠商就其分包部分所具有者代之", "投標廠商一律不得以分包廠商之資格代之", "投標廠商之資格不得載明於招標文件", "分包廠商之資格無須審查"], "a": 0, "ex": "廠商應符合資格之一部分<span class=\"ans-hl\">得由分包廠商就其分包部分所具有者代之<\/span>，並應於招標文件載明，(1)正確。", "mem": "部分資格＝分包商可代（須載明）。"}, {"n": 35, "law": "第26條", "stem": "機關辦理採購之規格訂定，下列何者正確？", "opts": ["得訂明「正字標記」產品，但須於招標文件註明「或同等品」字樣", "得指定特定廠牌且不必加註同等品", "得限制原產地以排除特定國家", "規格得由單一廠商量身訂作"], "a": 0, "ex": "得訂正字標記產品，但<span class=\"ans-hl\">須註明「或同等品」<\/span>，(1)正確。不得指定廠牌綁標。", "mem": "指定規格＝加註『或同等品』。"}, {"n": 39, "law": "第34條", "stem": "下列何者得免於招標文件或公告公開預算金額？", "opts": ["巨額工程採購", "查核金額以上之工程採購", "公告金額以上之工程採購", "未達公告金額之工程採購"], "a": 3, "ex": "<span class=\"ans-hl\">未達公告金額之工程採購<\/span>得免公開預算金額，(4)正確。", "mem": "未達公告工程＝可不公開預算。"}, {"n": 47, "law": "第36條", "stem": "機關辦理勞務採購，得訂定投標廠商「特定資格」之情形，下列何者為非？", "opts": ["標的需要特殊專業或技術人才始能完成者", "標的需要特殊技術始能完成者", "服務費用達新臺幣2000萬元以上者", "廠商或其受雇人需具政府機關核發之專業技術證明始能完成者"], "a": 3, "ex": "得訂特定資格之情形為特殊專業／技術人才、特殊技術、費用達巨額(2000萬)等；<span class=\"ans-hl\">「具政府核發專業技術證明」非訂特定資格之法定情形<\/span>，(4)為非。", "mem": "政府核發專技證明≠訂特定資格之事由。"}, {"n": 48, "law": "認定標準", "stem": "機關辦理巨額勞務採購訂定投標廠商之特定資格，規定投標廠商需於截止投標日前5年內曾完成與招標標的同性質之勞務契約，其單次契約金額最高以招標標的預算金額之多少為限？", "opts": ["五分之一", "五分之二", "三分之一", "二分之一"], "a": 1, "ex": "經驗實績之單次契約金額<span class=\"ans-hl\">≤ 預算金額 2/5<\/span>。", "mem": "經驗實績單次≤2/5預算。"}, {"n": 65, "law": "認定標準", "stem": "機關訂定投標廠商之特定資格，規定須出具與履約能力有關之權益證明，並規定該項權益之最低額度者，該額度應以招標標的預算金額之多少為限？", "opts": ["十二分之一", "十分之一", "五分之一", "五分之二"], "a": 0, "ex": "權益證明之最低額度<span class=\"ans-hl\">≤ 預算金額 1/12<\/span>。", "mem": "權益證明額度≤1/12預算。"}, {"n": 74, "law": "認定標準", "stem": "下列何者係屬投標廠商之「特定資格」？", "opts": ["廠商登記或設立之證明", "納稅證明", "實收資本額之規定", "加入工業或商業團體之證明"], "a": 2, "ex": "<span class=\"ans-hl\">實收資本額<\/span>之規定屬特定資格，(3)正確。登記設立、納稅、加入團體屬基本資格。", "mem": "實收資本額＝特定資格。"}, {"n": 77, "law": "第36條", "stem": "機關辦理採購，投標廠商應提出之資格證明文件，下列敘述何者正確？", "opts": ["一律須提出正本", "以影本為原則，但機關得通知投標廠商提出正本供查驗", "僅得提出影本，機關不得要求正本", "得不提出任何證明文件"], "a": 1, "ex": "資格證明<span class=\"ans-hl\">以影本為原則，機關得通知提出正本查驗<\/span>，(2)正確。", "mem": "資格證明＝影本為原則。"}, {"n": 78, "law": "第36條", "stem": "下列何者非機關辦理採購得擇定之「基本資格」？", "opts": ["具有相當財力之證明", "廠商登記或設立之證明", "廠商納稅之證明", "廠商依工業團體法或商業團體法加入工業或商業團體之證明"], "a": 0, "ex": "「相當財力之證明」屬<span class=\"ans-hl\">特定資格<\/span>，非基本資格，(1)為答案。", "mem": "財力證明＝特定資格（非基本）。"}, {"n": 89, "law": "第51條", "stem": "機關辦理審標事宜，下列何者正確？", "opts": ["審標結果無須通知投標廠商", "對不合格廠商無須敘明原因", "審查結果應通知投標廠商，對不合格之廠商，並應敘明其原因", "審標僅須通知合格廠商"], "a": 2, "ex": "審查結果應通知廠商，<span class=\"ans-hl\">不合格者並應敘明原因<\/span>，(3)正確。", "mem": "審標結果＝通知＋不合格敘明原因。"}, {"n": 90, "law": "第51條", "stem": "機關辦理審標，下列敘述何者錯誤？", "opts": ["廠商投標文件內記載金額之文字與號碼不符者，以文字為準", "廠商資格證明文件影本之尺寸與正本不一致，機關得予拒絕", "廠商標價之金額有計算錯誤者，機關得通知廠商更正", "投標文件之澄清，不得補正非屬重要事項之文件不全"], "a": 1, "ex": "<span class=\"ans-hl\">不得僅因影本尺寸與正本不一致而拒絕<\/span>，(2)錯誤。", "mem": "影本尺寸不同＝不可拒絕。"}]}, {"topic": "共同投標", "law": "共同投標辦法", "memo": "<ul>\n      <li>機關得於招標文件規定<b>允許一定家數內廠商共同投標，以不超過 5 家為原則<\/b>；涉不同性質專門技術之專業服務亦同。<\/li>\n      <li>共同投標廠商<b>應符合資格之一部分，得由分包廠商就其分包部分所具有者代之<\/b>（機關得於招標文件規定）。<\/li>\n      <li>共同投標成員<b>不得對同一採購另行投標或為另一共同投標廠商之成員<\/b>；但<b>涉特殊或巨額採購、為增加競爭者<\/b>之例外得另定。<\/li>\n    <\/ul>", "qs": [{"n": 7, "law": "共同投標辦法", "stem": "有關共同投標之敘述，下列何者錯誤？", "opts": ["共同投標廠商之資格，已得互為補充，故機關不得於招標文件中再規定允許其應符合資格之一部分，得以分包廠商就其分包部分所具有者代之", "共同投標廠商於投標時應檢附共同投標協議書", "共同投標以不超過5家為原則", "共同投標廠商應共負契約之連帶履行責任"], "a": 0, "ex": "機關<span class=\"ans-hl\">仍得於招標文件規定資格之一部分得由分包廠商代之<\/span>，(1)說「不得再規定」錯誤。", "mem": "共同投標＋分包商代部分資格＝可規定。"}, {"n": 41, "law": "共同投標辦法", "stem": "機關辦理委託專業服務採購，其性質涉及不同領域之專門技術，得於招標文件規定允許廠商共同投標，以不超過幾家為原則？", "opts": ["3家", "5家", "6家", "10家"], "a": 1, "ex": "共同投標以不超過<span class=\"ans-hl\">5 家<\/span>為原則。", "mem": "共同投標≤5家。"}, {"n": 42, "law": "共同投標辦法", "stem": "機關允許共同投標時，共同投標廠商之成員不得對同一採購另行提出投標，亦不得為另一共同投標廠商之成員，但下列何種情形不在此限？", "opts": ["經機關首長核准者", "該採購涉及特殊工法，得為不同廠商共同投標，增加競爭者", "廠商間具關係企業者", "成員未重複出資者"], "a": 1, "ex": "涉特殊工法、為<span class=\"ans-hl\">增加競爭<\/span>者得例外，(2)正確。", "mem": "特殊工法／增加競爭＝例外。"}]}, {"topic": "採購金額之認定", "law": "細則第6・7條", "memo": "<ul>\n      <li><b>採購金額＝含「後續擴充／續約」之全部可能金額；預算金額＝編列之預算<\/b>（兩者常不同）。<\/li>\n      <li>多年期：採購金額＝<b>各年金額（含擴充）合計<\/b>；預算金額＝<b>已編列年期之預算<\/b>。<\/li>\n      <li>選擇性招標建立合格名單：<b>資格審查階段<\/b>之採購金額＝<b>名單有效期內全部預算合計<\/b>；<b>個案邀標<\/b>之採購金額＝<b>該個案金額<\/b>。<\/li>\n      <li>訂特定資格（經驗實績、實收資本額）所用之「預算金額」，除有特殊情形外<b>以「第 1 年預算金額」<\/b>訂定。<\/li>\n      <li>兼有 2 種以上性質且難認定歸屬者，按<b>「預算金額」比率最高者<\/b>歸屬其類別。<\/li>\n    <\/ul>", "qs": [{"n": 5, "law": "細則第6條", "stem": "機關依採購法第22條第1項第9款公開評選委外辦理訓練勞務，履約期間3年，每年預算金額1500萬元，其採購金額及預算金額各為何？", "opts": ["採購金額1500萬元，預算金額4500萬元", "採購金額4500萬元，預算金額4500萬元", "採購金額4500萬元，預算金額1500萬元", "採購金額1500萬元，預算金額1500萬元"], "a": 1, "ex": "3 年皆編列，採購金額＝預算金額＝1500×3＝<span class=\"ans-hl\">4500 萬<\/span>，(2)正確。", "mem": "全年期皆編列＝採購＝預算。"}, {"n": 19, "law": "細則第6條", "stem": "機關辦理保全勞務採購，年預算120萬元，依採購法第22條第1項第9款公開評選，訂約2年，並於招標文件保留後續第7款議價2次、每次1年，其採購金額及預算金額各為何？", "opts": ["採購金額240萬元，預算金額240萬元", "採購金額480萬元，預算金額240萬元", "採購金額480萬元，預算金額480萬元", "採購金額240萬元，預算金額480萬元"], "a": 1, "ex": "採購金額＝（訂約2年＋擴充2年）×120＝<span class=\"ans-hl\">480 萬<\/span>；預算金額＝已編列訂約2年×120＝<span class=\"ans-hl\">240 萬<\/span>，(2)正確。", "mem": "採購含擴充(480)；預算只算訂約(240)。"}, {"n": 28, "law": "認定標準", "stem": "機關辦理清潔外包之巨額勞務採購（無後續擴充），訂定投標廠商須具一定實收資本額之特定資格，履約期間3年、每年預算金額2000萬元，依規定得訂之實收資本額上限為多少？", "opts": ["600萬元", "400萬元", "200萬元", "2000萬元"], "a": 2, "ex": "實收資本額≤年預算 1/10，以第1年預算 2000萬×1/10＝<span class=\"ans-hl\">200 萬<\/span>，(3)正確。", "mem": "實收資本額＝年預算×1/10。"}, {"n": 36, "law": "細則第6條", "stem": "機關以選擇性招標建立合格廠商名單辦理清潔勞務採購，名單有效期2年、每年預算200萬元，嗣後利用名單邀請廠商投標辦理一件100萬元之採購，該「本次採購」之採購金額為何？", "opts": ["400萬元", "100萬元", "200萬元", "800萬元"], "a": 1, "ex": "個案邀標之採購金額＝該個案金額<span class=\"ans-hl\">100 萬<\/span>，(2)正確（資格審查階段才是400萬）。", "mem": "個案邀標＝個案金額。"}, {"n": 45, "law": "細則第7條", "stem": "採購兼有工程、財物、勞務2種以上性質，難以認定其歸屬者，按下列何項金額比率最高者歸屬之？", "opts": ["契約金額", "決標金額", "底價金額", "預算金額"], "a": 3, "ex": "按<span class=\"ans-hl\">預算金額<\/span>比率最高者歸屬其類別，(4)正確。", "mem": "難歸屬＝看預算金額比率。"}, {"n": 97, "law": "認定標準", "stem": "機關辦理3年期清潔外包勞務採購（預算金額3000萬元），訂定投標廠商之相當經驗或實績，其範圍包括截止投標日前5年內完成與招標標的同性質之契約，其單次契約金額不低於招標標的預算金額之五分之二者，該「預算金額」除有特殊情形外應以何者訂定？", "opts": ["第1年預算金額", "3年預算金額總和", "採購金額", "決標金額"], "a": 0, "ex": "訂特定資格之「預算金額」除特殊情形外以<span class=\"ans-hl\">第1年預算金額<\/span>訂定，(1)正確。", "mem": "特定資格預算＝第1年。"}, {"n": 139, "law": "細則第6條", "stem": "機關辦理委託清潔服務採購，編列1年預算80萬元，並於招標文件敘明履約成效良好者得依採購法第22條第1項第7款續約1年，經詢價得知1年約需70萬元，其採購金額為何？", "opts": ["70萬元", "80萬元", "140萬元", "160萬元"], "a": 3, "ex": "採購金額含續約，以預算金額計＝80×2＝<span class=\"ans-hl\">160 萬<\/span>，(4)正確（不用詢價70萬）。", "mem": "含續約＝預算80×2＝160萬。"}, {"n": 140, "law": "細則第6條", "stem": "機關以選擇性招標建立合格廠商名單辦理清潔勞務採購，名單有效期2年、每年預算200萬元，其辦理「資格標審查」之採購金額為何？", "opts": ["100萬元", "160萬元", "200萬元", "400萬元"], "a": 3, "ex": "資格審查階段之採購金額＝名單有效期內全部預算＝200×2＝<span class=\"ans-hl\">400 萬<\/span>，(4)正確（與個案邀標100萬不同）。", "mem": "資格審查＝名單有效期總額。"}]}, {"topic": "服務成本加公費法與計費", "law": "評選及計費辦法", "memo": "<ul>\n      <li><b>公費為定額<\/b>，以（直接薪資扣除非經常性獎金＋管理費用）合計之 <span class=\"keynum\">25%<\/span> 為限；公費＝<b>廠商提供服務所得之報酬<\/b>。<\/li>\n      <li><b>管理費用上限＝直接薪資扣除非經常性獎金後之 100%<\/b>；<b>預付款 ≤ 契約總額／給付總額 30%<\/b>（40% 為錯）。<\/li>\n      <li>直接薪資除實際薪資外，<b>另加經常性獎金、保險費、退休金等<\/b>；憑證含發票／收據／紀錄報表且<b>不限正本<\/b>。<\/li>\n      <li>履約期限達 <span class=\"keynum\">1 年<\/span>以上者，得訂明<b>自該期間屆滿之次年起<\/b>隨物價指數調整契約價金。<\/li>\n      <li>專業服務得準用「機關委託專業服務廠商評選及計費辦法」；<b>建造費用百分比法不適用於專業服務<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 20, "law": "計費辦法", "stem": "機關依採購法第22條第1項第9 是<\/span>。", "mem": "直接薪資＝實際薪資＋獎金保險退休。"}, {"n": 99, "law": "計費辦法", "stem": "下列何者計費方式不適用於專業服務採購？", "opts": ["建造費用百分比法", "服務成本加公費法", "總包價法", "按日計酬法"], "a": 0, "ex": "<span class=\"ans-hl\">建造費用百分比法<\/span>不適用於專業服務（須以工程造價為基礎），(1)為答案。", "mem": "專業服務＝不用建造費用百分比法。"}, {"n": 119, "law": "計費辦法", "stem": "機關依採購法第22條第1項第9款委託專業服務，下列招標文件或契約規定何者有誤？", "opts": ["採服務成本加公費法計費", "公費為定額", "履約期限1年以上得隨物價指數調整契約價金", "訂約後預付契約總額百分之四十之預付款"], "a": 3, "ex": "預付款上限為30%，<span class=\"ans-hl\">(3)訂40%有誤<\/span>。", "mem": "預付款上限30%（40%錯）。"}]}, {"topic": "評選、評審委員會與固定服務費用決標", "law": "第22・52條", "memo": "<ul>\n      <li>公告金額以上之專業／技術／資訊／社福／文創服務，<b>以不訂底價之最有利標為原則<\/b>。<\/li>\n      <li>依 52-1-2（最低標＋評審）者，<b>評審委員會成立時機準用第 46 條第 2 項底價訂定時機<\/b>；未訂底價之最低合格標是否合理由<b>「評審委員會」審定<\/b>。<\/li>\n      <li>22-1-9 評選：<b>訂明固定服務費用／費率者，依該費用決標（免擬底價、免議價）<\/b>。<\/li>\n      <li>50 萬以上專業服務依 22-1-9 → 招標資訊公開於<b>主管機關資訊網路及政府採購公報<\/b>；未達公告金額依 22-1-9 仍<b>應刊公報並成立評選委員會<\/b>。<\/li>\n      <li>資訊服務<b>包括與硬體有關之服務<\/b>；旅遊服務屬 22-1-9「<b>專業服務<\/b>」。<\/li>\n      <li>評選後彙整之總表，<b>得併於決標結果之通知，主動通知各投標廠商<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 2, "law": "第52條", "stem": "下列何者正確？", "opts": ["機關辦理採購，一律應訂底價", "最有利標不得作為勞務採購之決標方式", "機關辦理公告金額以上之專業服務、技術服務、資訊服務、社會福利服務或文化創意服務者，以訂底價之最低標為原則", "機關辦理公告金額以上之專業服務、技術服務、資訊服務、社會福利服務或文化創意服務者，以不訂底價之最有利標為原則"], "a": 3, "ex": "此類服務<span class=\"ans-hl\">以不訂底價之最有利標為原則<\/span>，(4)正確。", "mem": "五大服務＝不訂底價最有利標。"}, {"n": 25, "law": "第52條", "stem": "機關依採購法第52條第1項第2款（須評審之最低標）辦理決標者，下列敘述何者正確？", "opts": ["評審委員會即為採購評選委員會", "評審委員會之成立時機，準用採購法第46條第2項有關底價之訂定時機", "評審委員會委員人數須5人以上且專家學者不得少於三分之一", "評審委員會應刊登政府採購公報"], "a": 1, "ex": "評審委員會成立時機<span class=\"ans-hl\">準用第46條第2項底價訂定時機<\/span>，(2)正確。評審委員會非評選委員會、無5人及1/3之硬性規定。", "mem": "評審委員會≠評選委員會。"}, {"n": 32, "law": "第46條", "stem": "機關依採購法第22條第1項第9款辦理公開客觀評選優勝廠商後採限制性招標議價，其底價之訂定時機為何？", "opts": ["公告前", "開標前", "與優勝廠商議價前定之", "評選優勝廠商前"], "a": 2, "ex": "議價案之底價於<span class=\"ans-hl\">與優勝廠商議價前<\/span>訂定，(3)正確。", "mem": "議價底價＝議價前訂。"}, {"n": 71, "law": "第22條", "stem": "機關依採購法第22條第1項第9款辦理採購金額50萬元之專業服務，應將招標資訊公開於下列何處？ 知主動通知各投標廠商<\/span>，(2)說「不得併入主動通知」錯誤。", "mem": "評選總表＝可隨決標通知主動告知。"}, {"n": 125, "law": "第22條", "stem": "下列何者正確？", "opts": ["統包工程得依採購法第22條第1項第9款辦理", "最有利標不得用於勞務採購", "旅遊服務屬政府採購法第22條第1項第9款規定所稱之「專業服務」", "資訊服務不得採最有利標決標"], "a": 2, "ex": "<span class=\"ans-hl\">旅遊服務屬22-1-9之專業服務<\/span>，(3)正確。統包不適用22-1-9。", "mem": "旅遊服務＝22-1-9專業服務。"}]}, {"topic": "藝文採購、設計競賽與研究發展委外", "law": "第22條・藝文辦法", "memo": "<ul>\n      <li>藝文採購採「公告審查」程序者：審查委員會由<b>委員 5 人以上<\/b>組成；會議應有<b>委員總額 1/2 以上出席<\/b>始得作成決議。<\/li>\n      <li>22-1-10 設計競賽得標廠商之設計成果製作費用，<b>以總包價法計費為原則<\/b>。<\/li>\n      <li>22-1-13 委託學術／非營利機構研究發展：<b>利用主管機關資訊網路公告徵求、經審查委員會審查為優勝者<\/b>議價。<\/li>\n      <li>研究發展、藝文採購之<b>審查委員會「不」適用採購評選委員會組織準則及審議規則<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 30, "law": "第22條", "stem": "機關依採購法第22條第1項第10款辦理設計競賽之評選，下列敘述何者為非？", "opts": ["招標文件訂有廠商資格者，資格文件與設計建議書得合併審查", "應依採購法第94條成立採購評選委員會", "得評選2家以上優勝廠商", "得訂明固定金額或費率"], "a": 0, "ex": "訂有廠商資格者<span class=\"ans-hl\">應先審查資格<\/span>，(1)說「資格與設計建議書得合併審查」為非。", "mem": "有資格者＝先審資格。"}, {"n": 44, "law": "藝文辦法", "stem": "機關辦理藝文採購，採公告審查程序者，下列敘述何者錯誤？", "opts": ["利用主管機關資訊網路公告徵求", "成立審查委員會辦理審查", "審查委員會委員應有5人以上", "審查委員會之成員應自主管機關網站公布之評選委員名單中遴聘，且不得少於三分之一"], "a": 3, "ex": "藝文採購之審查委員會<span class=\"ans-hl\">不適用評選委員會之專家學者1/3規定<\/span>，(4)錯誤。", "mem": "藝文審查委員會≠評選委員會規定。"}, {"n": 62, "law": "第22條", "stem": "機關依採購法第22條第1項第13款委外辦理研究發展，採經公告審查優勝之學術或非營利機構辦理者，下列何者正確？", "opts": ["應成立採購評選委員會", "應報上級機關核准", "利用主管機關之資訊網路公告徵求，經審查委員會審查為優勝者", "須有3家以上機構投標始得審查"], "a": 2, "ex": "利用主管機關資訊網路公告徵求、<span class=\"ans-hl\">經審查委員會審查為優勝者<\/span>，(3)正確。", "mem": "22-1-13＝公告徵求＋審查委員會。"}, {"n": 94, "law": "第22條", "stem": "設計競賽得標廠商之設計成果製作費用，以下列何種方式計費為原則？", "opts": ["建造費用百分比法", "總包價法", "服務成本加公費法", "按日計酬法"], "a": 1, "ex": "設計競賽成果製作費用以<span class=\"ans-hl\">總包價法<\/span>計費為原則。", "mem": "設計競賽成果＝總包價法。"}, {"n": 95, "law": "藝文辦法", "stem": "機關辦理藝文採購採公告審查程序者，其審查委員會應有委員總額多少比例以上出席，始得作成決議？", "opts": ["三分之一", "三分之二", "二分之一", "四分之三"], "a": 2, "ex": "審查委員會應有委員總額<span class=\"ans-hl\">1/2<\/span>以上出席始得作成決議。", "mem": "藝文審查＝1/2出席。"}, {"n": 101, "law": "藝文辦法", "stem": "機關辦理藝文採購採公告審查程序者，其審查委員會應由委員幾人以上組成？", "opts": ["5人", "7人", "3人", "9人"], "a": 0, "ex": "審查委員會由<span class=\"ans-hl\">5 人以上<\/span>組成。", "mem": "藝文審查委員會＝5人以上。"}, {"n": 129, "law": "第22條", "stem": "機關依採購法第22條第1項第13款委外辦理學術研究發展，下列敘述何者錯誤？", "opts": ["以學術或非營利機構為對象", "得利用主管機關資訊網路公告徵求", "成立審查委員會辦理審查，適用採購評選委員會組織準則及審議規則之規定", "得經審查為優勝者議價"], "a": 2, "ex": "研究發展之審查委員會<span class=\"ans-hl\">不適用評選委員會組織準則及審議規則<\/span>，(3)錯誤。", "mem": "研發審查委員會≠評選委員會準則。"}]}, {"topic": "共同供應契約", "law": "第93條", "memo": "<ul>\n      <li>各機關得就具<b>共通需求特性之財物或勞務<\/b>，與廠商簽訂共同供應契約。<\/li>\n      <li>簽訂機關之適用範圍：主管機關指定者得限<b>中央機關<\/b>（依指定範圍而定）。<\/li>\n      <li>利用共契可<b>附加訂購相關配備（單項 15 萬以下、與主標的相關者）<\/b>；<b>不相關之品項不得附加<\/b>。<\/li>\n      <li>單筆訂購<b>逾契約所定上限<\/b>者，<b>由機關自行依採購法規定辦理採購<\/b>。<\/li>\n      <li>分項複數決標之共契<b>不得訂明「同意跟進最低決標價即併列得標」<\/b>；發現價格高於市場行情者<b>不得逕予下訂<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 21, "law": "第93條", "stem": "各機關得就具有共通需求特性之何種採購，與廠商簽訂共同供應契約？", "opts": ["財物或勞務", "工程或財物", "工程或勞務", "工程、財物或勞務"], "a": 0, "ex": "共同供應契約限<span class=\"ans-hl\">財物或勞務<\/span>（不含工程），(1)正確。", "mem": "共契＝財物或勞務（無工程）。"}, {"n": 126, "law": "第93條", "stem": "採購法主管機關指定行政院人事行政總處辦理英語線上訓練之共同供應契約，該處再洽臺灣銀行採購部代辦，簽訂之共同供應契約其適用機關範圍為何？", "opts": ["全國各機關", "中央機關", "地方機關", "僅該主管機關"], "a": 1, "ex": "依主管機關指定，適用範圍為<span class=\"ans-hl\">中央機關<\/span>，(2)正確。", "mem": "本案共契＝中央機關適用。"}, {"n": 133, "law": "第93條", "stem": "機關利用共同供應契約辦理採購，發現該契約之價格高於市場行情時，下列敘述何者為非？", "opts": ["得通知訂約機關處理", "得不利用該契約另行辦理採購", "仍可利用該契約下訂", "得反映予主管機關"], "a": 2, "ex": "價格高於市場行情時<span class=\"ans-hl\">不得逕予利用該契約下訂<\/span>，(3)為非。", "mem": "共契貴於市場＝不可硬訂。"}, {"n": 136, "law": "第93條", "stem": "機關利用共同供應契約訂購電腦主機20台，依契約得附加訂購相關配備（單項15萬元以下），下列何者非屬可附加訂購之品項？", "opts": ["螢幕", "鍵盤滑鼠", "作業系統軟體", "25個照明燈具"], "a": 3, "ex": "附加訂購須與主標的相關，<span class=\"ans-hl\">照明燈具與電腦主機無關<\/span>，(4)非屬可附加。", "mem": "附加訂購＝須與主標的相關。"}, {"n": 137, "law": "第93條", "stem": "訂約機關辦理共同供應契約之分項複數決標，下列敘述何者為非？", "opts": ["得就不同項目分別決標予不同廠商", "得依項目分別訂定底價", "招標文件得訂明如投標廠商同意跟進最低決標價格時，均得併列為得標廠商", "得允許相同項目有不同之決標價"], "a": 2, "ex": "<span class=\"ans-hl\">不得訂明「同意跟進最低價即併列得標」<\/span>，(3)為非（違反競爭）。", "mem": "共契不得『跟價就得標』。"}, {"n": 138, "law": "第93條", "stem": "機關利用共同供應契約辦理採購，其單筆訂購金額或數量已逾契約所定之上限者，機關應如何處理？", "opts": ["由機關自行依採購法規定辦理採購", "仍利用該契約分批訂購", "報主管機關核准後利用該契約訂購", "通知訂約機關代為辦理"], "a": 0, "ex": "逾契約上限者，<span class=\"ans-hl\">由機關自行依採購法規定辦理採購<\/span>，(1)正確。", "mem": "逾上限＝自行依法辦採購。"}]}, {"topic": "公務機關間採購（105條）、房地產與國安陸資", "law": "第105條", "memo": "<ul>\n      <li>105 條所稱「公務機關」＝<b>政府機關<\/b>；公務機關間取得財物／勞務經核准得不適用招標決標規定，<b>但「不」排除第 62 條（決標公告／傳輸）<\/b>，<b>決標仍應刊登決標公告／傳輸決標資料<\/b>。<\/li>\n      <li>105-1-3（含房地產勘選、機關指定地區）：<b>不論金額免報上級核准、1 家即可開標<\/b>；房地產勘選係勘選後<b>議價<\/b>（不因訂明金額而免議價）。<\/li>\n      <li>105-1-3 提供財物／勞務之年度總額<b>達巨額採購金額且占該機關年收入 50% 以上<\/b>者，上級機關應檢討成本效益。<\/li>\n      <li>國安／資安疑慮：<b>招標文件得限制陸資資訊服務業參與<\/b>（非不當限制）；保全勞務<b>不得載明年齡、身高、體重等不當條件<\/b>。<\/li>\n    <\/ul>", "qs": [{"n": 33, "law": "第105條", "stem": "公營事業辦理金融服務之下列態樣，何者適用政府採購法？", "opts": ["銀行間之拆款", "發行金融債券", "委託金融機構代收款並支付手續費", "外匯買賣"], "a": 2, "ex": "<span class=\"ans-hl\">委託金融機構代收款並支付手續費<\/span>屬勞務採購適用採購法，(3)正確。拆款、發債、外匯買賣屬業務行為。", "mem": "代收款付手續費＝勞務採購。"}, {"n": 34, "law": "第105條", "stem": "公務機關間依採購法第105條取得財物或勞務，下列敘述何者錯誤？", "opts": ["須經機關首長或其授權人員核准", "得不適用招標、決標之規定", "得不適用部分招標決標規定，惟仍應刊登決標公告", "不適用政府採購法第2章及第3章之所有條文"], "a": 3, "ex": "105條經核准得不適用招標決標部分規定，<span class=\"ans-hl\">仍適用部分條文（如62條決標公告）<\/span>，(4)說「不適用所有條文」錯誤。", "mem": "105條≠完全不適用。"}, {"n": 73, "law": "第105條", "stem": "臺北市政府依採購法第105條第1項第3款向經濟部工業局承租房地產，下列敘述何者錯誤？", "opts": ["不論採購金額大小，均無須報上級機關核准", "縱僅1家可開標", "得不適用招標、決標之部分規定", "決標後得不刊登決標公告或傳輸決標資料"], "a": 3, "ex": "105條決標仍應依62條<span class=\"ans-hl\">刊登決標公告／傳輸決標資料<\/span>，(4)說「得不刊登」錯誤。", "mem": "105條決標＝仍要刊決標公告。"}, {"n": 115, "law": "第105條", "stem": "依採購法第105條第1項第3款規定辦理公務機關間財物或勞務之取得，所稱「公務機關」係指下列何者？", "opts": ["公營事業", "公立學校", "政府機關", "行政法人"], "a": 2, "ex": "105條之「公務機關」＝<span class=\"ans-hl\">政府機關<\/span>，(3)正確。", "mem": "公務機關＝政府機關。"}, {"n": 116, "law": "第105條", "stem": "公務機關間財物或勞務之取得，經核准得不適用招標、決標之規定，惟下列何者仍應適用，不在排除之列？", "opts": ["第62條", "第18條", "第19條", "第26條"], "a": 0, "ex": "<span class=\"ans-hl\">第62條（決標公告／傳輸）仍應適用<\/span>，不在排除之列，(1)正確。", "mem": "105條不排除62條。"}, {"n": 122, "law": "第22條", "stem": "機關依採購法第22條第1項第11款及機關指定地區辦理房地產採購，下列敘述何者為非？", "opts": ["不論採購金額大小，無須於招標前報上級機關核准", "如招標文件已訂明決標之固定金額者，則以該金額決標，並得免除議價程序", "如欲採行協商措施，應預先於招標文件標示得更改之項目", "投標廠商家數無限制，縱僅1家廠商投標亦可開標"], "a": 1, "ex": "房地產勘選係勘選適合者後<span class=\"ans-hl\">議價<\/span>，(2)以「訂明固定金額免議價」為非（房地產仍應議價）。屬細部爭點。", "mem": "房地產勘選＝仍須議價。"}, {"n": 124, "law": "原住民工作權", "stem": "機關辦理80萬元勞務採購，履約地點在原住民地區，下列敘述何者錯誤？", "opts": ["得優先決標予原住民廠商", "得依未達公告金額辦法辦理", "招標文件可規定投標廠商如為原住民廠商者免繳押標金，如為非原住民廠商者應繳押標金，以促進原住民就業", "得參考最有利標精神辦理"], "a": 2, "ex": "押標金<span class=\"ans-hl\">不得對原住民／非原住民差別對待<\/span>，(3)錯誤。", "mem": "押標金不得差別對待。"}, {"n": 132, "law": "第6條", "stem": "國營銀行辦理保全勞務採購，下列敘述何者為非？", "opts": ["保全屬勞務採購", "得允許共同投標", "為利個案需要，契約載明保全人員之年齡、身高及體重條件，尚無不可", "得訂定投標廠商之特定資格"], "a": 2, "ex": "<span class=\"ans-hl\">不得載明年齡、身高、體重等不當條件<\/span>（涉就業歧視），(3)為非。", "mem": "保全＝不得限身高體重年齡。"}, {"n": 135, "law": "第6條", "stem": "機關委託廠商開發具國家安全（資安）疑慮之資訊系統，下列敘述何者為非？", "opts": ["得訂定較嚴格之資安資格條件", "得要求廠商簽署保密及資安切結", "得限制不得轉包、分包予有資安疑慮之廠商", "招標文件不允許陸資資訊服務業參與，屬不當限制投標廠商資格情形"], "a": 3, "ex": "基於國安資安考量，<span class=\"ans-hl\">招標文件得限制陸資資訊服務業參與<\/span>，(4)以「屬不當限制」為非。", "mem": "資安疑慮＝可限制陸資（非不當）。"}, {"n": 141, "law": "第105條", "stem": "公務機關依採購法第105條第1項第3款提供財物或勞務予其他機關，其年度總額達巨額採購金額，且占該公務機關年收入之多少比例以上者，上級機關應檢討其成本效益？", "opts": ["百分之十", "百分之二十", "百分之三十", "百分之五十"], "a": 3, "ex": "年度總額達巨額且占年收入<span class=\"ans-hl\">50%<\/span>以上者，上級機關應檢討成本效益，(4)正確。", "mem": "105條＝巨額且占年收入50%上級檢討。"}]}, {"topic": "投標文件、轉包分包、統包與契約價金", "law": "第33・65・24條", "memo": "<ul>\n      <li>投標文件須裝於<b>不透明信封並彌封<\/b>；<b>不得僅因以釘書針封裝、信封材質或封裝方式而拒絕<\/b>。<\/li>\n      <li>未於外標封標示<b>廠商名稱及地址<\/b>者＝<b>無效標，且不列入家數計算<\/b>；投標文件份數<b>由機關於投標須知敘明<\/b>。<\/li>\n      <li><b>轉包全面禁止<\/b>；得標廠商「應自行履行」之部分<b>不得轉包（亦不得分包）<\/b>；65 條得標廠商<b>不得轉包、得分包<\/b>。<\/li>\n      <li><b>勞務採購不得統包<\/b>；勞務採購<b>得依「替代方案實施辦法」辦理<\/b>。<\/li>\n      <li>契約價金：<b>獎勵性報酬 ≤ 契約價金總額／上限 10%<\/b>；<b>逾期違約金以契約價金總額 20% 為上限<\/b>；資訊整體委外之委外時程及契約期間<b>不得逾 10 年<\/b>。<\/li>\n      <li>招標文件<b>於公告前應予保密<\/b>；勞務採購<b>應辦理驗收<\/b>（得以審查會方式，主持人得視同主驗人）。<\/li>\n    <\/ul>", "qs": [{"n": 3, "law": "第65條", "stem": "勞務採購案之招標文件標示得標廠商應自行履行契約之部分工作項目，就該部分之履約，下列何者正確？", "opts": ["不得轉包", "得分包", "得轉包、不得分包", "得轉包、得分包"], "a": 0, "ex": "應自行履行之部分<span class=\"ans-hl\">不得轉包（亦不得分包）<\/span>，(1)為唯一正確敘述。", "mem": "應自行履行部分＝不得轉包。"}, {"n": 4, "law": "採購契約要項", "stem": "機關於採購契約訂定獎勵性報酬者，其金額以契約價金總額或契約價金上限之百分之多少為限？", "opts": ["百分之五", "百分之十", "百分之二十", "百分之三十"], "a": 1, "ex": "獎勵性報酬以契約價金總額／上限之<span class=\"ans-hl\">10%<\/span>為限。", "mem": "獎勵性報酬上限＝10%。"}, {"n": 15, "law": "第33條", "stem": "下列何者不符採購法第33條規定？", "opts": ["廠商之投標文件應於截止投標期限前送達招標機關", "投標文件應以書面密封", "廠商將投標文件置於不透明之信封，並以釘書針封裝，機關得予拒絕", "逾截止期限之投標文件，原封退還"], "a": 2, "ex": "<span class=\"ans-hl\">不得僅因以釘書針封裝而拒絕<\/span>，(3)不符規定。", "mem": "釘書針封裝＝不可拒絕。"}, {"n": 18, "law": "第71條", "stem": "機關辦理勞務採購之驗收，下列何者正確？", "opts": ["勞務採購一律免辦驗收", "驗收不得以書面審查方式", "採召開審查會方式辦理勞務採購之驗收者，主持人得視同主驗人", "勞務採購之驗收無須作成紀錄"], "a": 2, "ex": "採審查會方式驗收者，<span class=\"ans-hl\">主持人得視同主驗人<\/span>，(3)正確。", "mem": "審查會驗收＝主持人視同主驗。"}, {"n": 53, "law": "第33條", "stem": "廠商應遞送投標文件之份數，依規定應如何處理？", "opts": ["機關於投標須知敘明", "一律1份", "由廠商自行決定", "至少3份"], "a": 0, "ex": "投標文件份數<span class=\"ans-hl\">由機關於投標須知敘明<\/span>，(1)正確。", "mem": "份數＝投標須知載明。"}, {"n": 56, "law": "第65條", "stem": "依採購法第65條規定，得標廠商應自行履行勞務契約，下列何者正確？", "opts": ["得轉包、得分包", "不得轉包、得分包", "得轉包、不得分包", "不得轉包、不得分包"], "a": 1, "ex": "65條得標廠商<span class=\"ans-hl\">不得轉包、得分包<\/span>，(2)正確。", "mem": "得標廠商＝不得轉包、得分包。"}, {"n": 59, "law": "第24條", "stem": "有關勞務採購之敘述，下列何者錯誤？", "opts": ["得採統包方式辦理招標", "得採選擇性招標", "得採限制性招標", "得採最有利標決標"], "a": 0, "ex": "<span class=\"ans-hl\">勞務採購不得統包<\/span>，(1)錯誤。", "mem": "勞務＝不得統包。"}, {"n": 60, "law": "第71條", "stem": "有關勞務採購之驗收規定，下列何者錯誤？", "opts": ["應辦理驗收", "得以書面或召開審查會方式辦理", "得辦理部分驗收", "免辦理驗收"], "a": 3, "ex": "勞務採購<span class=\"ans-hl\">應辦理驗收<\/span>，(4)說「免辦理驗收」錯誤。", "mem": "勞務＝應驗收。"}, {"n": 64, "law": "第24條", "stem": "下列何種採購不允許採統包方式辦理？", "opts": ["建築工程", "勞務採購", "橋梁工程", "財物採購"], "a": 1, "ex": "<span class=\"ans-hl\">勞務採購不得統包<\/span>，(2)正確。", "mem": "勞務＝不得統包。"}, {"n": 67, "law": "採購契約要項", "stem": "依採購契約要項，逾期違約金，以契約價金總額之百分之多少為上限？", "opts": ["百分之十", "百分之二十", "百分之三十", "百分之五十"], "a": 1, "ex": "逾期違約金以契約價金總額之<span class=\"ans-hl\">20%<\/span>為上限。", "mem": "逾期違約金上限＝20%。"}, {"n": 72, "law": "第33條", "stem": "廠商未於投標文件外標封標示廠商名稱及地址，下列何者正確？", "opts": ["仍為有效標", "得補正後有效", "由機關決定是否有效", "無效標，並不得列入家數計算"], "a": 3, "ex": "未標示名稱地址者＝<span class=\"ans-hl\">無效標，並不列入家數計算<\/span>，(4)正確。", "mem": "外標封漏名稱地址＝無效、不計家數。"}, {"n": 79, "law": "第34條", "stem": "機關依採購法辦理採購，下列何者正確？", "opts": ["招標文件得於公告前提供特定廠商參考", "底價於公告時公布", "招標文件於公告前應予保密", "預算金額一律應於招標文件公開"], "a": 2, "ex": "<span class=\"ans-hl\">招標文件於公告前應予保密<\/span>，(3)正確。底價不得公告、不得先給特定廠商。", "mem": "招標文件公告前＝保密。"}, {"n": 91, "law": "計費辦法", "stem": "機關委託廠商辦理資訊業務整體委外服務，其委外時程及契約期間，不得逾幾年？", "opts": ["10年", "5年", "3年", "15年"], "a": 0, "ex": "資訊整體委外之委外時程及契約期間不得逾<span class=\"ans-hl\">10 年<\/span>。", "mem": "資訊整體委外＝≤10年。"}, {"n": 128, "law": "替代方案辦法", "stem": "機關辦理勞務性質之採購，下列何者正確？", "opts": ["不得採選擇性招標", "不得採最有利標", "得依「替代方案實施辦法」規定辦理採購", "一律應訂底價"], "a": 2, "ex": "勞務採購<span class=\"ans-hl\">得依「替代方案實施辦法」辦理<\/span>，(3)正確。", "mem": "勞務＝可用替代方案辦法。"}]}]}];

<script>
const content = document.getElementById('content');
const chipsRow = document.getElementById('chipsRow');
const state = {};
let total = 0;

DATA.forEach(ch=>{
  const qcount = ch.groups.reduce((s,g)=>s+g.qs.length,0);
  total += qcount;
  const chip = document.createElement('a');
  chip.className='chip'; chip.href='#'+ch.id;
  chip.innerHTML = ch.chapter+'<b>'+qcount+'</b>';
  chipsRow.appendChild(chip);

  const sec = document.createElement('section');
  sec.className='chapter'; sec.id=ch.id;
  sec.innerHTML = '<div class="chapter-head"><div class="chapter-num">'+ch.num+'</div>'+
    '<div><div class="chapter-meta">'+ch.meta+'</div>'+
    '<div class="chapter-title">'+ch.chapter+'</div></div></div>';

  ch.groups.forEach(g=>{
    const grp = document.createElement('div');
    grp.className='group';
    grp.innerHTML = '<div class="group-label"><h3>'+g.topic+'</h3>'+
      '<span class="law-tag">'+g.law+'</span></div>'+
      '<div class="memo"><div class="memo-title">速記</div>'+g.memo+'</div>';

    g.qs.forEach(q=>{
      const qid = ch.id+'-'+q.n;
      const card = document.createElement('div');
      card.className='q'; card.id='q-'+qid;
      const optsHtml = q.opts.map((o,i)=>{
        const cls = (i===q.a) ? 'opt correct' : 'opt wrong';
        return '<li class="'+cls+'"><span class="onum">('+(i+1)+')</span><span>'+o+'</span></li>';
      }).join('');
      let foot = '<div class="explain"><div class="e-title">解題分析</div><p>'+q.ex+'</p>';
      if(q.trap) foot += '<div class="trap"><b>陷阱　</b>'+q.trap+'</div>';
      if(q.mem)  foot += '<div class="mem"><b>口訣</b><span>'+q.mem+'</span></div>';
      foot += '</div>';
      card.innerHTML =
        '<div class="q-top">'+
          '<div class="q-badge">'+q.n+'<small>'+q.law+'</small></div>'+
          '<div class="q-stem">'+q.stem+'</div>'+
          '<button class="q-mark" aria-label="標記為已掌握" title="標記為已掌握">✓</button>'+
        '</div>'+
        '<ul class="q-options">'+optsHtml+'</ul>'+
        '<div class="reveal-zone"><button class="show-answer-btn">點此顯示正解與解析</button></div>'+
        '<div class="q-foot">'+foot+'</div>';
      grp.appendChild(card);
      card.querySelector('.q-mark').addEventListener('click',()=>{
        state[qid] = !state[qid];
        card.classList.toggle('mastered', state[qid]);
        updateProgress();
      });
      card.querySelector('.show-answer-btn').addEventListener('click',()=>card.classList.add('reveal'));
    });
    sec.appendChild(grp);
  });
  content.appendChild(sec);
});

const ptotalEl = document.getElementById('ptotal');
if(ptotalEl) ptotalEl.textContent = total;
const statTotalEl = document.getElementById('statTotal');
if(statTotalEl) statTotalEl.textContent = total;
function updateProgress(){
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById('pcount').textContent = done;
  document.getElementById('pfill').style.width = (total? (done/total*100):0)+'%';
}
const selftestBtn = document.getElementById('selftestBtn');
selftestBtn.addEventListener('click',()=>{
  const on = document.body.classList.toggle('selftest');
  selftestBtn.classList.toggle('active', on);
  if(!on) document.querySelectorAll('.q.reveal').forEach(c=>c.classList.remove('reveal'));
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  for(const k in state) delete state[k];
  document.querySelectorAll('.q.mastered').forEach(c=>c.classList.remove('mastered'));
  updateProgress();
});
updateProgress();
</script>
